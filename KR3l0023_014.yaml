body:
  text: 北夢瑣言卷十四唐孫光憲撰李茂貞脅尹殺宰相鳳翔李茂貞跋扈至甚昭宗謂宰相杜讓能曰春秋之義叛而必誅安有甸服之間顯違朝㫖而悖慢如此我若不討四方其謂我何讓能奏曰艱難已來行貞元故事姑息戎臣久矣根牢蔓熾附之者衆一旦難驟革之又京師去岐咫尺人心易以危懼設有陵犯損威愈甚願陛下稍解雷霆而熟計之帝曰政刑弛紊詔令不出都門不欲孱孱守恬而坐因除宰臣徐彥若鎮鳳翔以茂貞為興元尹以嗣覃王率禁軍送彥若或茂貞遷延不受代即以兵攻之軍旅所決一委讓能讓能懇諫不從王師果敗或云此舉乃讓能報私怨也茂貞先以長書與讓能繼上表仍擁兵至臨皋驛請誅宰相帝遂斬樞密使李周曈以徇乃貶讓能仍詔送至軍前茂貞具禮出迎至驛復表請行朝典讓能奏曰朝錯之辜謬及於臣今若歸罪於臣可紓國難帝不得已貶讓能雷州司户參軍遣中使害於驛內識者以讓能臨難無茍免亦得其死也後追贈太尉其子曉貌如削玉有制誥之才仕梁至宰相鳳厯年洛都有變為亂軍誤害時皆歎惜之三鎮擁兵殺二相唐乾寧二年邠州王行瑜㑹李茂貞韓建入覲決謀廢立帝既睹三帥齊至必有異謀乃御樓見之謂曰卿等不召而來欲有何意茂貞等汗流浹背不能對但云南北司紊亂朝政因疏韋昭度討西川失謀李磎麻下為劉崇龜所哭陛下不合違衆用之及令宦官詔害昭度已下三帥乃還鎮內外寃之王行瑜跋扈朝廷欲加尚書令昭度力止之曰太宗以此官㹅政而登大位後郭子儀以六朝立功雖有其名終身退讓今行瑜安可輕授焉因請加尚父至是為行瑜所憾遽罹此害後追贈太師李磎字景望拜相麻出為劉崇龜抱而哭泣改授太子少傅乃上十表及納諫五篇以求自雪後竟登庸且訐崇龜之惡時同列崔昭緯與韋昭度及磎素不相協王行瑜專制朝廷以判官崔鋋入闕奏事與昭緯關通因託鋋致意由是行瑜率三鎮脅君磎亦遇害其子渷有髙才同日罹害磎著書百卷號李書樓後追贈司徒太原李克用破王行瑜後崔昭緯貶而賜死昭皇切齒下詔捕崔鋋亦寃報之一事也儒將成敗古者文武一體出將入相近代裴行儉郭元振裴度韋臯是也然而時有夷險不可一概而論王鐸初鎮荆南黃巢入冦望風而遁他日將兵捍潼關黃巢令人傳語云相公儒生且非我敵無汚我鋒刃自取敗亡也後到成都行朝拜諸道都統髙駢上表目之為敗軍之將正謂是也諫議大夫鄭寶一作賓曾獻書以規其㫖云未知令公以何人為牙爪何士參帷幄當今大盜移國羣雄奮戈幕下非舊族子弟白面郎君雍容談笑之秋也爾後罷軍權鎮滑臺竟有貝州之禍鄭文公畋首倡中興傳檄討賊殺戮黃寇鎮靜關畿一旦部校李昌言脅而逐之尚不能固位至如越州崔璆湖南崔瑾福建韋岫鄆州蔡崇徐方支詳許昌薛能河中李都竇潏鳳翔徐彥若狼狽恐懼求免不暇唯張濬大言自方管葛以無謀之韓建倅用剛之孫揆出征大鹵自貽敗亡爾後朱朴踵為大言驟居相位亦曾上表請破鳳翔所謂以羊將狼投卵擊石幸而不用何過望哉客有謂葆光子曰儒將誠則有之唐自大中已來以兵為戲者久矣廊廟之上恥言韜略以櫜鞬為凶物以鈐匱為凶言就有如盧藩薛能者目為粗才一旦宇內塵驚閭左颷起遽以褒衣博𢃄令押燕頷虎頭適足以取笑耳則韋昭度之憚王建張濬之伐太原是也外藩從事於東一作本省上事河東節度副使李習吉習五代史作襲常應舉不第為李都河中從事都失守習吉自昭義游太原辟為從事習吉好學有筆述雖馬上軍前手不釋卷太原所發箋奏軍書皆習吉所為也因從李克用至渭南令其入奏帝重其文章授諫議大夫使上事北省以榮之竟歸太原復其戎職莊宗即位追贈禮部尚書梁太祖每覽太原書檄遙景重之曰我何不得此人也陳琳阮瑀亦不是過韓建始終韓建兩隨李茂貞迫脅君上殺戮輔相昭宗出居本幸鄜畤建懇迎奉請至華下供億之勞具在勤王録而殺害郯王等八人以孤君上抑其罪也近代史臣駮論勤王録數條且曰韓建不遇時可也而云隄防道路拱衛乘輿欲蓋而彰則禁固之意可知也又與諸道書云語詔書徵赴行在妄也又曽無糾率諸侯述保大定功一作公之志也以為唐運陵替皆有一作由厯數自黃巢既戮蔡賊生焉宗權滅後而朱玫王行瑜繼之才舍茂貞而有韓建所謂一莽雖死十莽復生何天意不祐乎竟為朱溫宰相蜀先主聞之笑曰韓建非豹變之才與朱溫作相宜也葆光子曰華州韓建荆渚成汭勤王奉國識有可嘉于時號為北韓南郭郭即成令冒稱也士大夫可以依賴也古者奉霸主尊本朝德義小虧諸侯不至葵丘之㑹是也成韓位居王輔荷寵於唐朱公有無君之心露問鼎之意建等不能效臧洪泣血糾率同盟亦可以結約親鄰共張聲勢而乃助桀作孽畫足成蛇舍我善鄰陳誠僞室華隂失守既無力以枝梧鄂渚喪師乃無名而陷沒非忠非義吾所謂二公始終謬也向使成令睦漢南諸侯結淮甸雄援汴人篡逆亦恐未暇推之天命即吾不知考之人謀固無所取惜哉孔緯惜鹽鐵印孔緯在中書朱全忠併有數鎮兵力强盛表請鹽鐡印詔下宰相議之緯力爭不從請其下邸吏曰朱公若收鹽鐡印非興兵不可全忠尋止後韓建討太原不利為張濬所誤貶之他日昭宗欲再攻鳯翔以問緯緯曰鳯翔天子西門若自去窟穴受制一面即大事去矣昭宗曰卿是朕賢臣殊未逹時事緯曰陛下以臣為賢是謗臣也臣若賢肯立於陛下之朝因稱疾以太子太師致仕卒於華下神告羅𢎞信子紹威附中和中魏博帥羅𢎞信初為本軍步射小校掌牧圉之事曾宿於魏州觀音院門外其地有神祠俗號曰白須翁巫有宋遷一作千者忽詣𢎞信謂曰夜來神忽有語君不久為此地主𢎞信怒曰欲危我耶他日復以此言來告𢎞信𢎞信因令密之不期歲果有軍變推𢎞信為帥𢎞信狀貌豐偉多力善射雖聲名未振衆已服之纍加至太尉封臨淮王𢎞信卒子紹威繼之與梁祖通歡結親情分甚至先是本府有牙軍八千人豐其衣糧動要姑息時人云長安天子魏府牙軍主使頻遭斥逐由此益驕紹威不平有意翦滅因與汴人計㑹詐令役夫肩籠內藏器甲揚言汴帥葬羅氏之女紹威密令人於兵仗庫斷弓絃共甲襻夜㑹汴人擐甲持戈攻殺牙軍牙軍覺之排闥入庫而弓甲無所施勇也全營殺盡仍破其家人謂牙軍久盛宜其死矣紹威雖豁素心而紀綱無有漸為梁祖陵制竭其帑藏以奉之忽患腳瘡痛不可忍意其牙軍為祟乃謂親吏曰聚六州四十三縣鐵打一箇錯不成也紹威卒其子周翰繼之俄而移鎮滑臺羅氏大去其國矣燕王劉仁恭異夢劉仁恭微時曾夢佛幡於手指飛出或占之曰君年四十九必有旌幢之貴後如其說果為幽帥自破太原軍於安塞城後士兵精强孩視鄰道發管內丁壯號三十萬南取鄴中圖𡊮曹之霸先下甘陵無少長悉坑之初治甘陵城下有鵂鶹數頭飛下幄帳內逐之復來仁恭惡之竟為魏軍汴軍夾攻大敗之殺其名將單可及仁恭單馬而遁于時軍敗於內黃爾後汴帥攻燕亦敗於唐河他日命使聘汴汴帥開宴俳優戲醫病人以譏之且問病狀內黃以何藥可瘥其聘使謂汴帥曰內黃可以唐河水浸之必愈賓主大笑賞使乎之美也北夢瑣言卷十四
