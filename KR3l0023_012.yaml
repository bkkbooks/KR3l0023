body:
  text: 北夢瑣言卷十二唐孫光憲撰盧藩神俊唐盧尚書藩以文學登進士第以英雄自許厯數鎮薨於靈武連帥恩賜弔祭內臣厚希例貺其家事力不充未辦歸裝而天使所求無厭家人苦之親表中有官人於靈前告曰家貧如此將何遵副尚書平生竒傑豈無威靈及此宦者乎俄而館中天使中惡以至於卒是知精魂强俊者可不畏之哉八座從孫尚在江陵嘗聞此說故紀之以警貪貨者楊收不學仙唐相國楊收江州人祖為本州都押衙父直為蘭溪縣主簿生四子發假收嚴皆登進士第收即大拜發以下皆至丞郎發以春為義其房子以柷以乘為名假以夏為義其房子以煚古鼎反為名收以秋為義其房子以巨鏻鑣鑑為名嚴以冬為義其房子以注涉洞為名盡有文學登髙第號曰修竹楊家與靜恭諸楊比於華盛收相少年於廬山修業一日尋幽至深𨼆之地遇一道者謂曰子若學道即有仙分必若作官位至三公終焉有禍能從我學道乎收持疑堅進取之心忽道人之語他日雖登廊廟竟離南荒而殛悲夫薛澤補闕乃楊氏之女孫壻嘗語之張氏子斆壁魚唐張裼尚書有五子文蔚彛憲濟美仁龜皆有名第至宰輔丞郎內一子忘其名少年聞說壁魚入道經函中因蠧食神仙字身有五色人能取壁魚吞之以致神仙而上升張子惑之乃書神仙字碎翦實於瓶中捉壁魚以投之冀其蠧蝕亦欲吞之遂成心疾每一發作竟月不食言語粗穢無所迥回避其家扃閉而守之俟其發愈一切如常而倍餐啜一月食料須品味而飫之多年方謝世是知心靈物也一傷神氣善猶不可况為惡乎即劉闢吞人張子吞神仙善惡不同其傷一也栁大夫不受潤筆李德陽附唐栁大夫玭清亷耿介不以利回家世得筆法蓋公權少師之遺妙也責授瀘州牧禮參東川元戎顧彥朗相公適遇降德政碑顧欲濡染以光刋刻亞台曰惡劄固無所吝若以潤筆先一作見賜即不敢聞命相國欽之書訖竟不干瀆也梁世兖州有下猛和尚聚徒說法檀施雲集時號金剛禪也他日物故建塔樹碑廬嶽道士李德陽善歐書下猛之徒請書碑志許奉一千緡德陽不允乃曰若以一醉相酬得以施展千緡之遺非所望也終不肯書斯亦近代一髙人也楊寅疑相術李皓附唐十軍軍容使開府嚴遵美門客楊寅善𡊮許之術於京城西畿逢一李生亦唐之疏屬隆準龍顔垂手過膝楊生異之說於中尉由是時一作暗有資遺之意其必致非常黃寇犯闕僖宗一作皇幸蜀李生為士民挾持入京升含元殿不踰浹旬尋亦遇害豈大人之相只為一升殿乎莫可知之楊生歎嗟不復言知人之鍳也王蜀先主時有道士李皓亦唐之宗室生於徐州而遊於三蜀詞辨敏捷粗有文章因棲陽平觀為妖人扶持上有紫氣乃聚衆舉事將舉而敗妖輩星散而皓獨罹其禍焉其適長裕者臨卭之大儒也與皓相善不信皓之造妖良由軀幹國姓為羣凶所憑所以多事之秋滅跡匿端無為緑林之嚆矢也先是李皓有書召玉局觀楊德輝赴齊有老道崔無斁自言患聾有道而託算術往往預知吉凶德輝問曰將欲北行何如崔令畫地作字𢎞農乃書北千兩字崔公以千插北成乖字去即乖耳楊生不果去而李皓齊日就擒道士多罹其禍楊之幸免由崔之力也楊鑣偶大姑神史光澤附唐楊鑣收相之子少年為江西推巡優游外幕也屬秋祭請祀大姑神西江中有兩山孤拔號大者為大孤小者為小孤朱崖李太尉有小孤山賦寄意焉後人語訛作姑姊之姑創祠山上塑像艷麗而風濤甚惡行旅憚之每歲本府命從事躬祭鑣預於此行鑣悅大姑偶容有言謔浪祭畢回州而見空中雲霧有一女子容質甚麗俯就楊公呼為楊郎遜詞云家姊多幸蒙楊郎采顧便希回橈以成禮也故來奉迎𢎞農驚怪乃曰前言戲之耳小姑曰家姊本無意輒慕君子而楊郎先自發言茍或中輟恐不利於君𢎞農憂惶遂然諾之懇希一作布從容一月處理家事小姑亦許之楊生歸指揮訖倉卒而卒似有鬼神來迎也薛澤𥙷闕與鑣姻懿常言此事甚詳近者故登州節判史在德郎中子光澤甚聰俊方修舉業自别墅歸乘醉入泰山廟謂神曰與神作第三兒得否自是歸家精神恍惚似有見召踰月而殂也嗚呼幽明道隔人鬼路殊以身許之自貽伊戚將來可為鍳戒也栁氏子幞頭腳許承傑李思益附僕嘗覽栁氏訓序見其家法整肅乃士流之最也栁玭出官瀘州郡洎牽復㳂路染疾至東川通泉縣求醫幕中有昆弟或云􅀈相或云名珮之子省之亞台回面且云不識家人曰是某院郎君堅云不識莫喻尊㫖良久老僕忖之得非郎君幞頭腳乎固宜見怪但垂之而入必不見阻比郎君垂下翹翹之尾果接撫之其純厚皆此類也僕親家栁坤即亞台疏房也僑寓陽安郡伯仲相率省焉亞台先問讀書否修文否茍不如是須學作官我之先人修文成名皆作官業幸勿棄分隂也瀘州郡有栁大夫所造公廨家具皆牢實粗重傳及數政莫知于今存否蜀朝東川節度許存太師有功勳臣也其子承傑即故黔使君禧實之子隨母嫁許然其驕貴僭越少有倫比作都頭軍籍只一百二十有七人是音聲伎術出即同節使行李凡從行之物一切奢大騎碧暖座垂紛錯每修書題印章微有浸漬即必改換書吏苦之流輩以為話端皆推茂刺顧敻為首許公他日有會乃謂顧曰閣下何太談謗顧乃分疏因指同席數人為證顧無以對逡巡乃曰三哥不用草草碧暖座為衆所知至於魚袋上鑄蓬萊山非我唱揚席上愈笑方知魚袋更僭也刺茂州入蕃落為蕃酋害之西川衛前軍將李思益者所著衣服莫非華煥纎麗蜀先主左右羡而怪之先主曰李思益一副衣裳大有所費是要為我光揚軍府仰與江貨場勾當俾其作衣裝也先主又於作院見匠人裹小朵帽子前如鷹觜後露腦枕怪而截其觜也又登樓見行人戴襤􅢹席帽云破普沒反頭爛額是何好事然自務儉素愛淨潔皆此類也蜀朝有小朝士裴璨俸薄且閒一作困或勸求宰一邑裴曰今之畿縣非有仙骨何以得見其愛羡即可知也每云黃寇之後所失已多唯襪頭袴穿靴不傳舊時也僕同院司空監云木圍裹頭於事最便何必油拭火尉日日勞煩此一事不請師古又嫌以銀稜瓷器托裏碗楪徒費功夫又曰措大暮年方婚少女一生之事遺醜可知自非鐵石為心未有不貽他說戒之慎之因述栁氏幞頭引起數事豈資談笑亦足小懲也鐵𥙷闕貞淡唐乾寧中𥙷闕楊貽德華族科名德孤道直不容於時請告華隂方屬京國擾攘乃謀南來藏跡於江陵閭巷僦居不露行止旅舍無烟藜藿不給未嘗隕穫於時成中令延接朝客士有依劉之言𢎞農韜藏不及門宇一旦堂帖追回成令驚訝以為聞聽不至闕申情禮兼以入翰苑秉鈞軸期之𥙷闕曰人之官職又非妄圖令公過飾何當奬遇今宰相何必要某至於垂搜羅之命他日不過作南中一刺史爾此際必有奉擾中令贈三百緡只受三十緡辦裝所剩一作殘却納朝廷號為鐵𥙷闕未久除道州牧却經江陵告成令求十人散從官衣裝五十千行資他無所要成令甚重之他日棲南嶽與元泰布衲遁希禪師同居車箱源雙泉歸本長老得祖印於楊公既歿家人亦終似得懸解之道也本公得禪道於三賢乃鄭起先輩為愚話之張林多戲唐張林本士子擢進士第官至臺侍御為詩小巧多采景於園林亭沼間至如菱葉乍翻人採後荇花初沒舸行時他皆此類受眷於崔相眧緯或謁相庭崔公曰何以久不拜見林曰為飯瓮子熱發崔訝飯瓮不康之語林曰數日來水米不入非不康耶又寒月遺以衣襦問其所需乃曰一衫向下便是張林相國大笑終始優遇也葆光子曰東方朔以詼諧自容婁君卿以唇舌取適非徒然也皆有意焉今世希酒炙之徒託公侯之勢取容茍媚過於優旃自非厚德嚴正之人未有不為此輩調笑也沈尚書非命劉建封附唐沈詢侍郎亞之之子也昆弟二人一人忘其名乘舸泛河為驚湍激船桚梁板漂遞沈子亦漂而死詢鎮潞州寵婢夫人甚妬因配與家人歸秦其婢旦夕只在左右歸秦慚恨伺隙剚刃於詢果罹凶手殺歸秦以充祭亦無及也唐天復中湖南節度使劉建封淫其牽攏官陳之婦陳為同列所戲恥而發怒伺便以蒺一作冷藜擊殺之馬氏有其位於今禁蒺一作冷藜蓋懲彭城之遭罹也淫為大罰昔賢垂戒作人君父得不以子禍奴禍取鑒哉王潛司徒燒紙錢秦威儀附唐王潛司徒與武相元衡有分武公倉卒遭罹潛常於四時爇紙錢以奉之王後鎮荆南有染户許琛一旦一作日暴卒翌日却活乃具榜子詣衙云要見司徒乃通入於階前問之琛曰初被使人追攝至一衙府未見王且領至判官㕔見一官人憑几曰此人錯來自是鷹坊許琛不干汝事即發遣回謂許琛曰司徒安否我即武相公也大有門生故吏鮮有念舊於身後者唯司徒不忘每歲常以紙錢見遺深感恩德然所賜紙錢多穿不得司徒事多㸃檢不至仰為我詣衙具導此意王公聞之悲泣慚訝而鷹坊許琛果亦物故自此選好紙剪錢以奉之此事與楊收相於鄭愚尚書處借錢事同又南嶽道士秦保言威儀勤於焚修者曾白真君云上仙何以須紙錢有所未喻夜夢真人曰紙錢即冥吏所籍我又何須由是嶽中亦信之崔從事為廟神賜藥李氏土地神附閩從事崔員外忘其名正直檢身幕寮所重奉使湖湘復命在道逢寇賊悉遭殺戮唯外郎於倉惶中忽有人引路獲免驅馳逺路復患痁疾行邁之次難求藥餌途次延平津廟夢為廟神賜藥三丸服之驚覺頓愈此亦鬼神輔德也彭城劉山甫自云外祖李公敬彛郎中宅在東都育財坊土地最靈家人張行周事之有應未大水前預夢告張求飲食至其日率其類遏水岸一作頭並不衝圮李宅異事也張璟為靈廟草奏廬山書生張璟乾寧中以所業之桂州欲謁連帥張相至衡州犬嘷灘損船上岸寢於江廟為廟神所責生以素業對之神為改容延坐從容云有王一作巫立仁者罪合族誅廟神為其分理一作疏奏於嶽神無人作奏璟為草之既奏蒙允神喜以白金十餅為贈劉山甫與廖隲校書親見璟說其事甚詳也滻水神正直唐黃寇奔衝有小朝士裴忘其名移挈妻子南趨漢中才發京都其室女路次暴亡兵難揮霍不暇藏瘞其為悲悼即可知也行即浴谷夜聞其女有言不見其形父母怪而詰之女曰我為滻水神之子强暴誘歸其家厥父責怒以妄殺生人遽行笞責兼遜謝撫慰差人送來緣夕旦未有託且欲隨大人南行俾拔茅為苞致於箱笥之中庶以魂識依止飲食語言不異於常爾後白於嚴慈云已有生處悲咽告辭去夫鬼神之事世所難言素滻之靈有義方之訓所謂聰明正直之流也塹杜氏山岡事鮮于仲通唐氏嚴氏附古有宅墓之書世人多尚其事識者猶或非之杜公正倫與京兆宗派不同常蒙輕逺銜之洎公宦逹後因事塹斷杜陵山脉由是諸杜數代不振鮮于仲通兄弟閬州新井縣人崛起俱登將壇望氣者以其祖先墳上有異氣降敕塹斷之裔孫有鮮于嶽者幼年寢處席底有一小蛇蓋新出卵者家人見之以為竒事此侯及壯常有自負之色歷官終于普州安嶽縣令不免風塵其徒戲之曰鮮于蛇也唐峰亦閬州人有墳塋在茂賢草市峰因負販與一術人偕行經其先塋術士曰此墳塋子孫合至公相峰謂曰此即家墳隴也士曰若是君家恐不勝福也一作耶子孫合為賊盜皆不令終峰志之爾後遭遇蜀先主開國峰亦典郡其二道襲官一作等皆至節將三人典郡竟如術士之言何其驗也嚴司空震梓州鹽亭縣人所居枕釜戴山但有鹿鳴即嚴氏一人必殞或一日有親表對坐聞鹿鳴其表曰釜戴山中鹿又鳴嚴曰此際多應到表兄其表兄遽對曰表兄不是嚴家子合是三兄與四兄不日嚴氏子一人果亡是何異也鼠狼智相國張公文蔚莊在東都北一作柏坡莊內有鼠狼穴養四子為蛇所吞鼠狼雄雌情切於穴外坌土恰容蛇頭俟其出穴果入所坌處出頭度其回轉不及當腰齧斷而劈蛇腹銜出四子尚有氣置於穴外銜豆葉嚼而傅之皆活何微物而有情有智若是乎最靈者人胡不思也北夢瑣言卷十二
