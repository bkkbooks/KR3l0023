body:
  text: 北夢瑣言卷七唐孫光憲撰孟浩然趙嘏以詩失意唐襄陽孟浩然與李太白交遊𤣥宗徵李入翰林孟以故人之分有彈冠之望久無消息乃入京謁之一日𤣥宗召李入對因從容說及孟浩然李奏曰臣故人也見在臣私第上令急召賜對俾口進佳句孟浩然誦詩曰北闕休上書南山歸敝廬不才明主棄多病故人疏上意不悅乃曰未曽見浩然進書朝廷退黜何不云氣蒸雲夢澤波撼嶽陽城緣是不降恩澤終於布衣而已宣宗索趙嘏詩其卷首有題秦皇詩其略云徒知六國隨斤斧莫有羣儒定是非上不悅或云孟郊王維於翰林今兩存之鄭綮相詩李程附唐相國鄭綮雖有詩名本無廊廟之望常典廬州吳王楊行密為本州步奏官因有遺闕而笞責之然其儒懦清慎𢎞農常重之昭宗時吳雄據淮海朝廷務行姑息因一作恩盛言鄭公之德由是登庸中外驚駭于時皇綱已紊四方多故相國既無施展事必依違太原兵至渭北天子震恐渴於攘却之術相國奏對請於文宣王諡號中加一哲字其不究時病率此類也同列以其忝竊每譏侮之相國乃題詩於中書壁上其詞曰側坡蛆昆崙蟻子競來拖一朝白雨下無鈍無嘍囉意者以時運將衰縱有才智亦不能康濟當有玉石俱焚之慮也時亦然之相國題老僧詩云日照西山雪老僧門未開凍瓶粘柱礎宿火焰爐灰童子病歸去鹿麑寒入來常云此詩屬對可以稱衡重輕不偏也或曰相國近有新詩否對曰詩思在灀橋風雪中驢背上此處何以得之蓋言平生苦心也李程以日五色賦擢第為河南尹日試舉人有浩虛舟行卷中日五色賦程相大驚慮掩其美伸覽之次服其才麗至末韻侵晚水以芒動俯寒山而秀發程相大咍曰李程賦且在瑞日何為到夜秀發由是浩賦不能陵邁來鵬詩沈光楊敬之附唐進士來鵬詩思清麗福建韋尚書岫愛其才曽欲以子妻之而後不果爾後游蜀夏課卷中有詩云一夜緑荷風剪破賺他秋雨不成珠識者以為不祥是嵗不隨秋賦而卒於通議郎前進士沈光有洞庭樂賦韋八座岫謂朝賢曰此賦乃一片宫商也後辟為閩從事𢎞農楊敬之撰華山賦朱崖李太尉每置座右行坐諷之其略云見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤室九層矣醯雞往來周東西矣蠛蠓紛紜强秦去矣蜂巢聯聯構阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其十一作干載改更興一作與懷悲愁辛苦循其上矣楊氏華隂之茂族冠蓋甚逺此乃寄意於華山而言世事實雄才也李學士賦讖劉昌美勾偉附唐乾寧中劉昌美典䕫州時屬夏潦峽漲湍險俚俗云灧澦大如馬瞿塘不可下於是行旅輟棹而候水平一作濟去焉有朝官李蕘學士挈家自蜀㳂流將之江陵郡牧以水勢正惡且望少駐以圖利涉隴西匆遽殆一作若為人所一作之促召堅請東下不能止之才鼓行橈長揖而别州將目送之際盤渦呀裂破其船而倒李一作卓一家溺死焉或云一行船次共一百二十人皆溺死唯妳嫗一人隔夜為駭浪推送江岸而蘇先是永安監竈戶陳小奴掉空船下瞿塘見崖下有一人裹四縫帽穿白缺衫皂義襴青袴執鐵蒺藜問李公之行邁自云迎候其妳嫗蘇後亦說於刺史云李學士至一官署上㕔事朱門白壁寮吏參賀又聞云此行無妳嫗名遂送出水濱于時具以其事奏聞自後以瞿塘為水府春秋祭之初隴西文賦中有金叉墜井賦至是讖焉世傳云人之正直死為冥官道書云酆都隂府官屬乃人間有德者卿相為之亦號隂仙近代朱崖李太尉張讀侍郎小說咸有判冥之說劉昌美兩典䕫州雲安縣僧元悟曽有蜀川將校王尚書者舍己俸三百千以修觀音堂此像有靈矣乃剩三十千入已一旦物故經七日鄰於腐壞忽然再蘇灌湯藥以輔之言曰初至一官曹見劉行軍即昌美也說云何乃侵用功德錢以舊曽相識放歸須還此錢元悟乃戒門人鬻衣鉢而償之尋復卒也西川孔目官勾偉於其輩最號亷直綿竹縣民王氏子病困入冥因復還魂見冥官謂曰我即勾孔目也家在成都西市曽負人錢三萬未償汝今歸去為我言於家人也王生後訪勾氏子仍以債主姓名言之果為酬還盧詩三遇唐盧延讓業詩二十五舉方登一第卷中有句云狐衝官道過狗觸一作判店門開租庸張濬一作相親見此事每稱賞之又有餓猫臨鼠穴饞犬䑛魚砧之句為成中令汭見賞又有栗爆燒氊破猫跳觸鼎翻句為王先主建所賞嘗謂人曰平生投謁公卿不意得力於猫兒狗子也人聞而笑之盧嘗有詩云不同文賦易為是者一作著之乎復一作後入翰林閣筆而已同列戲之曰不同文賦易為是者之乎竟以不稱職數日而罷也李渷行文卷皮日休莊布附唐晉相李渷磎相之子也文學淵奧迥出輩流于時公相之子弟無能及者應舉時文卷行明易先生書又有答明易先生書朝士覽之不測涯涘即其他文章可知也然恃才躁進竟罹非禍爾後磎相追雪贈太子太師諡曰文司空圖撰行狀渷贈禮部員外郎先是劉崇龜舍人撰磎相麻因而貶黜渷以大彭一作彰先世因贓仰藥撰鸚鵡杯賦李渷酬詞云玉犬吠天關彩童哭仙吏一封紅書為奏塵寰事八極鼇柱傾四溟龍鬛沸長庚冷有芒文曲淡無氣烏輪不再中黃沙瘞腥鬼請帝命真官臨雲啓金匱方與清華宫重正紫極位曠古雨露恩安得借一作惜沾施生人血欲盡欃槍無飽意甚有文義焉又皮日休曽謁歸融尚書不見因撰夾蛇龜賦譏其不出頭也而歸氏子亦撰皮靸鞋賦遞相謗誚皮生後為湖南軍倅亦甚傲誕自號間氣布衣莊布以長書責之行於世也鄭準集軍書唐滎陽鄭準以文筆依荆州成中令常欲比肩陳阮自集其所作為三卷號劉表軍書雖有胸襟而辭體不雅至祝朝貴書云中書令舍人曰草麻通事舍人曰奏可又賀襄州趙令嗣襲其書云不沐浴佩玉而有祁兆不登山取符而無恤封是於慶賀中顯言其庶賤也鄰道之敬其若是乎應舉日詩卷題水牛曰護犢橫身立逢人揭尾跳朝士以為大笑鄭準譏陳詠唐前朝進士陳詠眉州青神人有詩名善奕棊昭宗劫遷駐蹕陜郊是嵗策名歸蜀韋書記莊以詩賀之又有鄉人拓善者屬和韋詩其略云讓德已聞多士伏沽名還得世人聞譏其比滌器當壚也謬稱馮副使涓詩以涓多諧戲故也或云蜀之拓善者作此詩假馮公之名也潁川嘗以詩道自負謁荆幕鄭準準亦自負雄筆謂潁川曰今日多故不暇操染有三數處回緘祈為假手潁川自旦及暮起草不就蓋欲以髙之其詩卷首有一對語云隔岸水牛浮鼻渡傍溪沙鳥㸃頭行京兆杜光庭先生謂曰先輩佳句甚多何必以此為卷首潁川曰曽為朝貴見賞所以刻於卷首章都是假譽求售使然也王超箋奏石欽若許存附唐末鳯翔判官王超推奉李茂貞挾曹馬之勢箋奏文檄恣意翺翔王蜀先主初下成都馮涓節制判掌其奏箋嵗久轉㕔以掌記辟韋莊郎中於權變之間未甚愜㫖閬州人王保晦有文才而無體式然其切露直致易為曉悟加以鳯翔用王超箋奏超以一本舊族思偶風雲每遇飛章言僞而辨蜀先主愛之以二王書題表藳示長樂公公乃致書遜謝倍加贊賞其要曰有眼未見有耳未聞蓋譏其阻兵恃强失事君去就王超後為興元留後遇害有鳯鳴集三十卷行於世後又有名石欽若者體效其筆為劉知俊判官隨軒降蜀不能謙退逺害賓主爭露鋒穎竟同誅之閲其緘題表章行行然宜其見忌而取禍也許存初背荆州成中令降蜀先主有意殺之親吏栁修業勸其謙靜每立大功而皆託疾由是獲免於先主之世即彭城之舊寮不若髙陽之小吏矣一作也王超全集三十卷今只見三卷聞於盧卿宏也李商𨼆草進劒表蜀庾傳昌顧雲附李商𨼆員外依彭陽令狐公楚以箋奏受知相國危急有寶劒嘗為君上所賜將進之命李起草不愜其㫖因口占云前件劒武庫神兵先皇特一作所賜既不合將歸一作於泉下又不宜留在人間時人服其簡當彭陽之子綯繼有韋平之拜似疏隴西未嘗展分重陽日義山詣宅於㕔事上留題其略云十年泉下無消息九日樽前有所思郎君官重施行馬東閣無因許再窺相國覩之慚悵而已乃扃閉此㕔終身不處也蜀中庾傳昌舍人始為永和府判官文才敏贍傷於冗雜因候相國張公有故未及見庾怒而歸草一啓事僅數千字授於謁者拂袖而去他日張相謂朝士曰庾舍人見示長箋不可多得雖然曽聞其草角抵牒詞動乃數幅譏其無簡當體要之用也鈔本有尺有所短寸有所長向聞於古人也十四字黃籙壇場星辰備位顧雲博士為髙燕公草齊詞云天靜則星辰可摘奇險之句施於至敬可乎唐末亂離渴於救時之術孔相國緯每朝士上封事不暇周覽但曰古今存亡某知之矣未審所陳利害其要如何蓋鄙其不達變也國子司業于晦曽上崔相國公允啓事數千字上至堯舜下及隋唐一興一替歷歷可紀其末散漫殊非簡略所以儒生中通變者鮮矣裴晉公臨終進先帝所賜玉帶表文與令狐公事頗同未知孰是舊朝士多云李義山草進劒表令狐公曰今日不暇多云信口占之髙崇文相國詠雪唐髙相國崇文本薊州將校也因討劉闢有功授西川節度使一旦大雪諸從事吟賞有詩渤海鄙言多呼人為􅐴兒恐是姣字此日筵上謂賓客曰某雖武夫亦有一詩乃口占云崇文崇武不崇文提戈出塞號將軍那個􅐴兒射雁落白毛空裏落紛紛其詩著題皆謂北齊敖曹之比也太尉駢即其曾孫也鎮蜀日以蠻蛋侵暴乃築羅城城四十里朝廷雖加恩賞亦疑其固護或一日聞奏樂聲知有改移乃題風箏寄意曰夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又被移將别調中旬日報到移鎮渚宫洞庭湖詩李洞包賀盧延讓顧況附湘江北流至嶽陽達蜀江夏潦後蜀漲勢髙遏住湘波讓而退溢為洞庭湖凡濶數百里而君山宛在水中秋水歸壑此山復居於陸唯一條湘川而已海為桑田於斯驗也前輩許棠過洞庭詩最為首出爾後無繼斯作詩僧齊已駐錫巴陵欲吟一詩竟未得意有都押衙者蔡姓而忘其名戲謂已公曰題洞庭者某詩絶矣諸人幸勿措詞已公堅請口劄押衙抑揚朗吟曰可憐洞庭湖恰到三冬無髭鬚以其不成湖也諸僧大笑之進士李洞慕賈島欲鑄而頂戴嘗念賈島佛而其詩體又僻于賈復有包賀者多為粗鄙之句至於苦竹筍抽青橛子石榴樹挂小瓶兒又云霧是山巾子船為水靸鞋又云棹搖船掠鬢風動竹捶胸雖好事托以成之亦空穴來風之義也盧延讓哭邊將詩曰自是磠砂發非干炮石傷牒多身上職盎大背邊瘡人謂此是打脊詩也世傳逸詩云窗下有時留客宿室中無事伴僧眠號曰自落便宜詩顧況著作披道服在茅山有一秀才行吟曰駐馬上山阿久思不得顧曰何不道風來屎氣多秀才云賢莫無禮顧曰是況其人慚惕而退僕早嵗嘗和南越詩云曉厨烹淡菜春杼織穜花牛翰林覽而絶倒莫喻其㫖牛公曰吾子只知名安知淡菜非雅物也後方曉之學吟之流得不以斯為戒也髙蟾以詩策名胡曽羅𨼆附進士髙蟾詩思雖清務為奇險意疏理寡實風雅之罪人薛許州謂人曰倘見此公欲贈其掌然而落第詩曰天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上不向春一作東風怨未開蓋守寒素之分無躁競之心公卿間許之先是胡曽有詩曰翰苑何時休嫁女文章早晚罷生兒上林新桂年年發不許平人折一枝羅𨼆亦多怨刺當路子弟忌之由是渤海策名也愚嘗覽李賀歌詩篇慕其逸才奇險雖然嘗疑其無理未敢言於時輩或於奇章公集中奇章集中僧孺給事中見杜子微牧有言長吉若使稍加其理即奴僕命騷人可也是知通論合符不相逺也韋杜氣槩李頻附杜荀鶴曽得一聯詩云舊衣灰絮絮新酒竹篘篘時韋相國說右司員外郎寄寓荆州或語於韋公曰我道印將金鎖鎖簾用玉鈎鈎即京兆大拜氣槩詩中已見之矣或有述李頻詩於錢尚父曰只將五字句用破一生心尚父曰可惜此心何所不用而破於詩句苦哉梁震無祿唐荆南節判司空董與京兆杜無𨼆即滑臺杜慆常侍之子洎蜀人梁震俱稱進士謁成中令欲希薦送有薛少尹者自蜀㳂流至渚宫三賢嘗訪之一日薛尹亞謂司空曰閣下與京兆勿議求名必無所遂杜亦不壽唯大賢忽為人縶維官至朱紫如梁秀才者此舉必捷然登第後一命不沾也後皆如其言梁公却思歸蜀重到渚宫江路梗紛未及西泝淮師寇江陵渤海王邀至府衙俾草檄書欲辟於府幕堅以不仕為志渤海敬諾之二紀依棲竟麻衣也薛尹之言果驗耶夏侯生說劉僕射事廣南劉僕射崇龜常有台輔之望必謂罷政便期直上羅浮處士夏侯生有道彭城重之因問將來之事夏生言其不入相發後三千里有不測之事洎歸闕至中路得疾而薨劉山甫亦蒙夏生言示五年行止事無不驗蓋飲啄之有分也曹相夢剃度唐曹相國確判計亦有台輔之望或夢剃度為僧心甚惡之有一士占夢多驗相國召之具以所見語一作話之此人曰前賀侍郎旦夕必登庸出家者號剃度也無何杜相出鎮江西而相國大拜也元德感福建道以海口黃崎岸橫石巉峭常為舟楫之患閩王琅邪王審知思欲制置憚於力役乾寧中因夢金甲神自稱吳安王許助開鑿及覺話於賓寮因命判官劉山甫躬往設一作致祭具述所夢之事三奠未終海內靈怪具見山甫乃憩於僧院憑髙觀之風雷暴興見一物非魚非龍鱗黃鬛赤凡三日風雷止霽已别開一港甚便行旅當時録奏賜號甘棠港閩從事劉山甫乃中朝舊族也著金溪閒談十二卷愚嘗略得披覽而其本偶亡絶無人收得海隅迢遞莫可搜訪今之所集云聞於劉山甫即其事也十不記其三四惜哉劉道濟幽窗夢光化中有文士劉道濟止於天台山國清寺夢見一女子引生入窗下有側柏樹葵花遂為伉儷後頻於夢中相遇自不曉其故無何於明州奉化縣古寺內見一窗側柏葵花宛是夢中所游有一客官人寄寓於此室女有美才貧而未聘近中心疾而生所遇乃女之魂也蓋女子及笄不有所歸乃父兄之過也又有彭城劉生夢入一倡婦家與諸輩狎飲爾後但夢便及彼處自疑非夢所遇之姬芳香常襲衣蓋心邪所致聞于劉山甫也北夢瑣言卷七
