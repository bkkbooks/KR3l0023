  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0023_WYG_011-1a, image: WYG1036/WYG1036-0075a.png}
body:
  text: 北夢瑣言卷十一唐孫光憲撰張直方譽裴休唐金吾大將軍張直方西班倜儻勳臣也好接賔客歌妓絲竹甲於他族與裴相國休相對相國始麻衣就試執金慕其風采因裴造謁執金欵待異禮他日朝中盛稱裴秀才文藝朝賢訝之相國恐涉雜交不遑安處自是不敢更歷其門執金頻召不往或曰裴秀才方謀進取慮致物譽非是偃蹇一日又召傳語曰若不妨及即更奉薦裴益悚惕薛侍郎紙裹鷂子唐薛昭緯侍郎恃才與地鄰於傲物常以宰輔自許切於大拜于時梁太祖已兼四鎮兵力漸大有問鼎之心速於傳禪薛公銜命梁國一作園梁祖令客將約回乃謂謁者曰大君有命無容却回速轡前邁既至夷門梁祖不獲已須出迎接見薛公標韻詞辨方始改觀自是宴接莫不欵曲一日梁祖話及鷹鷂薛公秪對盛言鷙鳥之俊梁祖欣然謂其亦曾放弄歸館後傳語送鷂子一頭薛生致書感謝仍對來人戒僮僕曰令公所賜真一作直須愛惜果一作可以紙裹安鞲袋中來人失笑聞於使衙進士團所由倒罰崔狀元唐進士崔昭矩為狀元有進士團所由動靜舉罰一日所由疏失狀元笞之逡巡所由謝伏一作杖于階前對諸進士曰崔十五郎不合於同年前面瞋決所由請罰若干博陵無言以對程賀為崔亞持服唐崔亞郎中典眉州程賀以鄉役差充㕔子其弟在州曾為小書吏崔公見賀風味有似儒生因詰之曰爾公讀書乎賀降階對曰薄涉藝文崔公指一物俾其賦詠雅有意思處分令歸選日裝寫所業執贄甚稱奬之必稱進士依崔之門更無他岐凡二十五舉及第每入京館於博陵之第常感提拔之恩亞卒之日賀為崔公縗服三年人皆美之髙太尉駢請留蠻宰相事唐南蠻侵軼西川苦無亭障自咸通已後劍南苦之牛叢尚書作鎮為蠻寇憑陵無以抗拒髙公自東平移鎮成都蠻酋搏蜀城掌武先選驍鋭救急人背神符一道蠻覘知之望風而遁爾後僖宗幸蜀深疑作梗乃許降公主蠻王以連姻大國喜幸逾常因命宰相趙隆眉楊竒鯤段義宗來朝行在且迎公主髙太尉自淮海飛章云南蠻心膂唯此數人請止而鴆之迄僖宗還京南方無虞用髙公之䇿也楊竒鯤輩皆有詞藻途中詩云風裏浪花吹又白雨中嵐色洗還青江鷗聚處忩前見林狖啼時枕上聽此際自然無限趣王程不敢暫留停甚清美也夏侯相以術而殂唐相國夏侯公孜富貴後得彭素之術甚有所益出鎮蒲中悅一娼妓不能承奉以致尾閭之泄因而致卒有夏侯長官者本反初僧也曾依相國門庭亂離後挈家寄於鳯州山谷尋亦物故惟寡妻幼子而已夏嫗獻此術於節使滿存相公大獲濡濟其子名籍學吟詩入西川依託勳臣為幕下從事時人號為夏侯驢子乃世濟其鄙猥也僕聞之於强山人甚詳亦嘗與籍相識籍子壻羅嶠與僕相知亦多蓄姬妾疑其染夏氏之風然夏侯長官者得非相國之師乎張金吾威勢取術唐金吾大將軍張直方一旦開筵命朝士看乾水銀㸃制不謬衆皆歎羡以謂清河曾遇至人良久張公大笑曰已非所能有自來矣頃任桂府團練使逢一道士藴此利術就而求之終不可得乃令健卒縛於山中以死脅之道士驚怕但言藥即多獻術則不傳唯死而已由是得藥縱其他適今日奉呈唯成丹也非已能也蔡畋虛誕何法成附唐髙駢鎮成都甚好方術有處士蔡畋者以黃白干之取瓦一片研丹一粒半塗入火燒成半截紫磨金乃竒事也蔡生自負人皆敬之以為地仙燕公求之不得久而乖露乃是得藥於人眩惑賣弄為元戎笞殺之王先主時有何法成者小人也以賣符藥為業其妻微有容色居在北禪院側左院有毳衲者因與法成相識出入其家令賣藥銀就其家飲啖而已法成以其內子餌之而求其法此僧祕惜遷延未傳乃令其妻冶容而接之法成自外還家掩縛欲報巡吏此僧驚懼因謬授其法并成藥數兩釋縛而竄法成聞一作得此術以致發狂大言於人誇解利術未久聞於蜀後主召入苑中與𥙷軍職然不盡僧法他日藥盡遽屬更變伶俜而已偶免謬妄之誅也彭韜光者與何生切鄰兼得其事為余話之申屠别駕術禍髙駢鎮維揚有申屠别駕懷至術為吕用之譖毁一旦作竄燕公命吏齎長限牒所在尋捕至襄州禪院中遇之擒得申生寄襄獄縶維申生告獄吏要見督郵韋公吏以告之韋遽面見屏人曰某身上有化金藥欲獻元戎劉公巨容可乎韋審之遂非時入謁因得道逹㸃甎瓦半葉以呈之劉公歎訝乃虛以判獄而匿之僖皇在蜀降天使至峴山即田令孜弟也劉公乘醉將藥金誇衒於中使中使回聞於田中尉洎劉司空朝覲行在與申生偕往藏𨼆此人不令他適田軍容銜之於導江莊加害劉申皆不幸也有一子號申司馬居朗州尚存㸃汞藥在身荆南節判司空董太監得申生四粒藥㸃四汞奉一百千以慰好竒之心也王蜀時有一士著緑布衫常在街衢仍棲逆旅巡使蕭懷武欲求其術堅確不與遂於馬院打殺之蓋不能慎持所致也宗小子藥妖唐世長安有宗小子者解黃白術唯在平康狎游與西川節度使陳敬瑄微時游處因色失歡他日陳公遭遇出鎮成都京國亂離僖皇幸蜀宗生避地亦到錦江然畏潁川知之遂旅遊資中郡銷聲斂跡惟恐人知寓應真觀修一爐大丹未竟宗生解六壬每旦運式看一日吉凶無何失聲便謀他適走至內江縣潁川差人吏就所在害之所修藥道士收得傳致數家皆不利人莫知何也李璧尚書戮律僧唐李璧尚書出鎮東川有律僧一作師忘其名臨壇度人四方受具者奔走師仰檀施雲集由是鞅掌嗜欲之心熾焉一旦發露前後女童為尼者呈身之物殆一百四十五人八座戮之葆光子嘗見同僚王行軍說幽州有壇長近八十歲即都校之元昆也每歸俗家以其衰老令小青扶侍因而及亂遂要反初以青為偶乃謂偶曰平生不謂有此歡暢悔知之晚也軍府怪而笑之僕有門徒僧不欲斥其名經論甚博未有乖露他日預臨壇之列尼輩參請號曰依止自是醜聲盈耳亦不以為耻嗚呼如來制戒為入道之門茍非其人反為聚淫叢藪信乎道不虛行也一本作律乎律乎道不虛行崔元亮降雲鶴趙駕仙何景沖梁威儀附唐崔元亮曾典眉州每公退具簡履以朝太上焚修精至不舍晝夜嘗於州衙開黃籙道場為民祈水旱疾疫而已散齊之晨必降祥雲鸞鶴州民咸覩亮典湖州修齊亦降仙鶴太白為贊至今眉州每歲設黃籙齊凡執一作職事軍校及茶酒厮役祗承皆知齊法次第道士羅昭然壽一百一十三歲預崔牧之齊席跨驢出街墜驢而腳在鐙內因拖曵而死也又王蜀時玉局觀道士趙駕仙上官道士忘其名住青城山修齊入壇行法事其厮僕卧而驚魘問師何在人問之乃曰適見四人著緋自天而下曵二道士於壇前鞭背二十問者止之令勿言比趙駕仙與上官道士相次患發背而斃又有何景沖作道門威儀好食蒜上壇行法事時有蒜氣後於青城修齊度江船覆溺死斯蓋罔道不恭為天罰也成中令鎮荆南請道士梁威儀行法事俯伏奏章頓首存想因之不起乃醉睡也成公斥之毁廢道場斯亦何趙之流也大約荆湘僧道赴齊皆恣洪飲俚人不以為非欲求降鍳安可得也關三郎入關唐咸通亂離後坊巷訛言關三郎鬼兵入城家家恐悚罹其患者令人寒熱戰栗亦無大苦𢎞農楊玭挈家自駱谷路入洋源行及秦嶺回望京師乃曰此處應免關三郎相隨也語未終一時股栗斯又何哉夫喪亂之間隂厲旁作心既疑矣邪亦隨之關妖之說正謂是也愚幼年曾省故里傳有一夷迷鬼魘人閭巷夜聚以避之凡有忩隙悉皆塗塞其鬼忽來即撲人驚魘須臾而止希慕求進唐自大中後進士尤盛封定鄉丁茂圭場中頭角舉子與其交者必先登第而二公各二十舉方成名何進退之相懸也先是李都崔雍孫瑝鄭嵎四君子蒙其盼睞者皆因進升故曰欲得命通問瑝嵎都雍葆光子曰士無華腴寒素雖瓌意琦行奧學雄文茍不資發揚無以昭播是則希顔慕藺馳騁利名者不能免也垂血淚唐進士殷保晦妻封夫人皆中朝士族也殷公歷官臺省始舉進士時文卷皆內子為之動合規式中外皆知良人倜儻疏放善與人交未嘗以文章為意黃寇犯闕夫妻遭難初封夫人就刃殷公失聲雙血被面其從母為尼親見其禍泣言於姻親愚於殷之中表聞之方信古人云淚盡繼之以血哀痛之極也心疾不妨文章李氏子附唐世劉崇望弟兄五人內四人皆登進士第仕至將相丞郎其元昆崇彛不及第官至省郎生五男每院各與一人為後崇彛留一男少有才思一旦心疾唯染翰章制誥褒貶朝中卿相咸托其實骨肉間懼聞于外旋取燼之宛為掌誥之美竟廢于時鄙夫蜀鄉與前簡刺李詠使君有分隴右有一子年十四掌握管草詞指揮天曹地府隂隙之事落翰如飛家君憂懼亦苦戒之此子乃曰但為我父勿預我事他日墜井而死心為靈臺既嬰風恙而才思倫序斯又何哉北夢瑣言卷十一
