body:
  text: 北夢瑣言小説家類一雜事之屬提要臣等謹案北夢瑣言二十卷宋孫光憲撰光憲字孟文自號葆光子十國春秋作貴平人而自題乃稱富春考光憲自序言生自岷峨則當為蜀人其曰富春蓋舉郡望也仕唐為陵州判官旋依荆南高季興為從事後勸高繼沖以三州歸宋太祖嘉之授黃州刺史以終五代史荆南世家載之甚明舊以為五代人者誤矣所著有荆臺集橘齋集玩筆傭集鞏湖編玩蠶書續通厯等書自宋代已散佚惟是書獨傳於後其曰北夢瑣言者以左傳稱田於江南之夢而荆州在江北故以命名蓋仕高氏時作也所載皆唐及五代士大夫逸事每條多載某人所説以示有徵蓋用杜陽雜編之例其記載頗猥雜敘次亦頗冗沓而遺文瑣語往往可資考證故宋李昉等編太平廣記多採其文朝公武讀書志載光憲續通厯十卷輯唐及五代事以續馬總之書參以黃巢李茂貞劉守光按巴堅案按巴堅原作阿保機今改正吳唐閩廣吳越兩蜀事迹太祖以所紀多不實詔毁其書而此書未嘗議及則語不甚誣可知矣世所行者凡二本一為明商維濬稗海所刻脫誤殆不可讀近時揚州新刻乃元華亭孫道明所藏猶宋時陜西刋板差完整有緒故今以揚州本著録不用商氏本云乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀北夢瑣言序唐自廣明亂離祕籍亡散武宗已後寂寞無聞朝野遺芳莫得傳播僕生自岷峨官於荆郢咸京故事每愧面牆遊處之間專於博訪頃逢故鳳翔楊玭少尹多話秦中平時舊説常記於心他日渚宫見元澄中允欵狎笑語多符其説元公謂舊族一二子弟曰諸賢生在長安聞事不逮富春此則存好問之所宏益也厥後每聆一事未敢孤信三復參校然始濡毫非但垂之空言亦欲因事勸戒三紀收拾筐篋爰因公退咸取編連先以唐朝逹賢一言一行列於談次其有事類相近自唐至後唐梁蜀江南諸國所得聞知者皆附其末凡纂得事成二十卷禹貢云雲土夢作又傳有畋於江南之夢鄙從事於荆江之北題曰北夢瑣言瑣細形言大即可知也雖非經緯之作庶勉後進子孫俾希仰前事亦絲麻中菅蒯也通方者幸勿多誚焉
