body:
  text: 北夢瑣言卷四唐孫光憲撰趙令公紅拂子唐襄州趙康凝令公世勳嗣襲人質甚偉酷好修容前後垂鏡以整冠櫛往往以家諱刑人相國崔公允出鎮湖南由峴首趙令逢迎開宴崔相從容而規之曰聞令公以文字刑人甚無謂也聞名心瞿但有顰蹙豈可笞責及人耶俄而近侍以紅拂子於烏巾上拂之相國又曰此尤不可也陪寮俯首而已天水其後漢南失守已而奔吳路由夏口杜洪念公郊迓以主座遜之遽尸其位其不識去就皆此類也竟罹禍於淮甸宜乎薛氏子具軍儀唐薛尚書能以文章自負纍出戎鎮常鬱鬱歎惜因有詩謝淮南寄天柱茶其落句云粗官乞與真拋卻賴有詩名合得嘗意以節將為粗官也鎮許昌日幕吏咸集令其子具櫜鞬參諸幕客幕客怪驚八座曰俾渠消災時人以為輕薄蓋不得本分官矯此以見志非輕薄也孫偓相通簡唐相國孫公偓寬裕通簡不事矯異常語於親友曰凡人持己務在得中但士行無虧不必太苦以我之長彰彼之短以我之清彰彼之濁幸勿為之後謫居衡山情抱坦然不以放逐而懷戚戚每對客座而厮僕輩紛詬毆曳仆於面前相國凝然似無所睹謂客曰若以怒心逢彼即方寸自撓矣其性度皆此類也相國曽乘軺至蜀詣杜光庭先生受籙乃曰嘗遇至人話及時事每有髙棲之約爾後雖登台輔竟出官於南嶽有詩寄杜先生其要句云蜀國信難遇楚鄉心更愁我行同范蠡師舉效浮丘他日相逢處多應在十洲唐末朝逹罹榖水白馬驛之禍唯相國獲免焉栁玭大夫賞牟黁唐栁大夫玭直清重德中外憚之謫授瀘州郡守先詣東川庭參具櫜鞬元戎顧相彥朗堅卻之亞台曰朝廷本用見責此乃軍府舊儀顧公不得已而受之赴任路由渝州有牟黁秀才者即都校牟居厚之子文采不髙執所業謁見亞台奬飾甚勤甥姪從行以為牟子卷軸不消見遇亞台曰巴蜀多故土豪倔起斯乃押衙之子獨能慕善茍不誘進渠即退志以吾稱之人必榮之由此減三五貟草賊不亦善乎子弟竊笑而服之孫揆尚書鋸解劉知俊附唐末朝廷圍太原不克以宰相張濬為都統華帥韓建為副使澤潞孫揆尚書以本道兵㑹伐軍容使楊復恭與張相不叶逗撓其師因而自潰由是貶張相為繡州牧孫尚書為太原所執詬罵元戎李公克用以狗豬代之李公大怒俾以鋸解雖加苦楚而鋸齒不行八座乃謂曰死狗豬解人須用板夾然後可得行汝何以知之由此施板而鋸方行未絶間罵聲不歇何乃壯而不怖斯則君子之儒必有勇也近者劉知俊自梁奔秦自秦奔蜀驍暴之聲天下咸聞焉蜀先主坐其慘酷而誅之受戮日章皇萬端乞命不暇行刑者嗟而笑之比孫帥何勇怯之不侔也孫揆尚書少年不慧涕淚狼籍蒙然而已十五嵗適然一變非唯時俊乃烈士也崔允相腋文唐崔相國慎猷亷察浙西日有瓦棺寺持法華經僧為門徒或有術士言相國面上氣色有貴子問其妊娠之所在夫人洎妾媵間皆無所見相國徐思之乃召曾侍更衣官妓而示術士曰果在此也及載誕日腋下有文相次分明即瓦棺僧名也因命其小字緇郎年七嵗尚不食肉一日有僧請見乃掌其頰謂曰既愛官爵何不食肉自此方味葷血即相國允也崔事一說云是終南山僧兩存之諸重德好尚唐朱崖李太尉與同列欵曲或有徵其所好者掌武曰喜見未聞言新書䇿崔魏公鉉好食新䭃頭以為珍美從事開筵先一夕前必到使院索新煮䭃頭也杜豳公每早食饙飯乾脯崔侍郎安潛好看鬭牛雖各有所美而非近利與夫牙籌金埒錢癖榖堆不亦逺乎畢舅知分蜀楊會附唐畢相諴家本寒微其渭陽為太湖縣伍伯伍伯即今號雜職行杖者相國恥之俾罷此役為除一官纍遣致意竟不承命特除選人楊載宰此邑參辭特於私第延坐與語期為落此猥籍津送入京楊令到任具逹台旨伍伯曰某下賤豈有外甥為宰相耶楊令堅勉之乃曰某每嵗公稅享六十緍事例錢茍無敗闕終身優渥不審相公欲為致何官職楊令具以聞相國歎賞亦然其說竟不奪其志也近者蜀相庾公傅素與其從弟凝績曾宰蜀州唐興縣郎一作良吏有楊㑹者庾氏之昆弟深念之洎迭秉蜀政為楊㑹除長馬以酬之楊㑹曰某之吏役逺近皆知忝冒為官寧掩人口豈可將數千一作子家供待而博一作簿一虛名長馬乎雖強假軍職除授檢校官竟不舍縣役亦畢舅之次也楊蔚使君三典洋源唐楊蔚使君典洋州道者陳休復每到州多止於紫極宫宏農甚思一見而潁川輒便他適乃謂道士曰此度更來便須申報或一日再至遽令申白俄而州將擁斾而至方遂披揖宏農曰嚮風久矣幸獲祗奉敢以將來祿算為請勿訝造次潁川呼人為卿乃謂州牧曰卿三為刺史了更無言州牧不懌以其曾典兩郡至此三也自是常以見任為終焉之所爾後秩滿無恙不喻其言無何又授此州亦終考限罷後又除是郡凡三任竟殞於是邦三為刺史之說果在於此乎楊公季弟玭為愚話之妖人為稱陳帝師唐軍容使田令孜擅權有回天之力嘗致書於許昌為其兄陳敬瑄求兵馬使職節將崔侍中安潛不允爾後崔公移鎮西川敬瑄與師立牛勉羅元果以打毬爭三川敬瑄獲頭籌制授右蜀節旄以代崔公中外驚駭報狀云陳僕射之命莫知誰何青城縣彌勒㑹妖人彌勒會北中金剛禪也窺此聲勢乃僞作陳僕射行李云山東盜起車駕必謀幸蜀先以陳公走馬赴任乃樹一魁妖共翼佐之軍府未喻亦差迎候至近驛有指揮索白馬四匹察事者覺其非常乃羈縻之未供承間而真陳僕射亦連轡而至其妖人等悉擒縛而俟命潁川俾隱而誅之識者曰陳帝師一作僕射由閹官之力無㳙塵之效盜處方鎮始為妖物所憑終以自貽誅滅非不幸也哭麻劉舍人事唐李相磎髙才奧學冠絶羣彥為朋黨所排洎登巖廊似涉由徑雖然亦才授也制下之日劉舍人崇龜抱麻而哭之李相斥其祖禰條上其事具表論之又以彭城先德受賄飲鴆乃作鸚鵡杯賦醜詞訐切人為寒心朝士有識者閲其表曰何必多言但不云倒䇿側龜於君前有誅彭城子何所逃刑時以為然蔡京尚書拔顧氏昆弟唐蔡京尚書為天德軍使衙前小將顧彥朗彥暉知使宅市買八座有知人之鑒或一日俾其子叔向巳下備酒饌於山亭召二顧賜宴八座俄而即席約令勿起二顧惶惑莫喻其意八座勉之曰公弟兄俱有封侯之相善自保愛他年願以子孫相依因遷其職級洎黃冦犯闕顧彥朗領本軍立收復功除東川加使相蔡叔向兄弟往依之請叔向為節度副使仍以丈人行拜之軍府大事皆咨謀焉顧相薨其弟彥暉嗣之亦至使相陸扆相六月及第盧光啓附唐陸相扆舉進士屬僖宗再幸梁洋隨駕至行在於時奔避勞止又時當六月而相國䇿名爾後在翰林暑月苦於蒸溽同列譏之曰今日好造天榜以其進取非時也然相國文才重德名冠一時朝中陸氏三人號曰三陸即相國洎希聲及威乃三人也盧相光啓先人伏刑爾後兄弟修飾赴舉因謂親知曰此乃開荒也然其立性周謹進取多塗初舉子一卷即進取諸事皆此類也䇿名後􅏡歷臺省受知於租庸張濬清河出征并汾盧每致書疏凡一事别為一幅朝士至今效之蓋八行重疊别紙自公始也唐末舉人不問士行文藝但勤於請謁號曰精切亦楷法於范陽公爾其族弟汝弼嘗為張相一作濬出征判官傳檄四方其略云致赤子之流離自朱邪之版蕩自謂人曰天生朱邪赤子供我之筆也俊邁亦有族昆之風吳融侍郎文筆唐吳融侍郎䇿名後曾依相國太尉韋公昭度以文筆求知每起草先呈皆不稱旨吳乃祈掌武親密俾逹其誠且曰某幸得齒在賓次唯以文字受眷雖愧荒拙敢不著功未聞愜當反甚憂懼掌武笑曰吳校書誠是藝士每有見請自是吳家文字非干老夫由是改之果愜上公之意也散版出官寓於江陵為僧貫休撰詩序以唐來唯元白休師而已又祭陸龜蒙文即云海內文章止魯望而已自相矛盾於時不免識者所譏破天荒解唐荆州衣冠藪澤每嵗解送舉人多不成名號曰天荒解劉蛻舍人以荆解及第號為破天荒爾來余知古關圗常修乃荆州之居人也率有髙文連登上科關即衙前將校之子也及第歸鄉都押已下為其張筵乃指盤上醬甌戲老校曰要校一作拔卒為者其人以醋樽進之曰此亦校一作拔卒為者也席人大噱關圗妻即常修妹才思婦也有祭夫文行於世成令公為蛇繞身唐荆州成令公汭領蔡州軍戍江陵為節度使張璝謀害之遂率本都奔於秭歸一夜為巨蛇繞身幾至於殞乃曰茍有所負死生唯命逡巡蛇亦亡去爾後招輯户口訓練士卒㳂流而鎮渚宫尋授節旄撫綏凋殘勵精為理初年居民唯一十七家末年至萬户勤王奉國通商務農有足稱焉朝廷號北韓南郭韓即華州韓建成令初姓郭後歸本姓有孔目官賀隱者亦返俗僧也端貞儉約始為腹心凡有闕政賴其規贊自賀𨼆物故率由胸襟加以騁辨陵人又多矜伐為識者所鄙婦翁竺知章乃餅匠也言多不遜又元子微過皆手刃之竟無系嗣樓船之役幕僚結舌終致鄂渚之敗惜哉張濬相破賊唐黃巢犯闕僖宗幸蜀張相國濬白身未有名第時在河中永樂莊居里有一道士或麻衣或羽帔不可親狎一日張在村路前行後有喚張三十四郎駕前待爾破賊回顧乃是此道士一作人相國曰某一布衣耳何階緣而能破賊乎道士勉其入蜀適遇相國聖善疾苦未果南行道者乃遺兩粒丹曰服此可十年無恙相國得藥奉親所疾痊復後歷登台輔道者亦不復見破賊之說何其驗哉薛澄州弄笏羅九臯附唐薛澄州昭緯即保遜之子也恃才傲物亦有父風每入朝省弄笏而行旁若無人好唱浣溪紗詞知舉後有一門生辭歸鄉里臨岐獻規曰侍郎重德某乃受恩爾後請不弄笏與唱浣溪紗即某幸也時人謂之至言有小吏常學其行步揖遜公知之乃召謂曰試於庭前學得似則恕爾罪於是下亷擁姬妾而觀之小吏安詳傲然舉動酷似笑而舍之路侍中巖在西蜀嘗夏日納凉於毬場㕔中使院小吏羅九臯巾裹步履有似裴條郎中大貂遙見促召衫帶遍視方知其非因笞之西嶽神斃張簴唐張䇿早為僧敗道歸俗後為梁相先在華山雲臺觀修業觀側有莊其弟簴亦輕易道教因脫䙝服挂於天尊臂上云借此公為我掌之須臾精神恍忽似遭毆擊痛呌狼狽或頓或起如有人拖曵之狀歸至别業而卒斯人也必黨於釋氏而輕侮道尊人之無禮自貽隂殛非不幸也與嘉州崔使君開尹真君石函事同開石函為冥官所録奪算見宣室志李載仁郎中目睹為愚話之栁婢譏蓋巨源唐栁僕射仲郢一作賢鎮郪城有一婢失意將婢於成都鬻之蓋巨源使君乃西川大校纍典雄郡一作大郡宅在苦竹溪女儈具以栁婢言導蓋公欲之乃取歸其家女工之具悉隨之日夕賞其巧技或一日蓋公臨街窺窗栁婢在侍通衢有鬻綾羅者從窗下過召婢就宅蓋公於束縑內選擇邉幅舒卷揲之第其厚薄酬酢可否栁婢失聲而仆似中風恙命扶之而去一無言語但令輿還女儈家翌日而瘳詰其所苦青衣曰某雖賤人曾為栁家細婢死則死矣安能事賣絹牙郎乎蜀都聞之皆嗟歎也清族之家率由禮門蓋公暴貴未知士風為婢僕所譏宜矣哉趙師儒與栁大夫唱和唐栁玭大夫之任瀘州泝舟經馬驍鎮土豪趙師儒率鄉兵數千憑髙立寨刑訟生殺得以自專本道署以軍職聞五馬經過乃棹扁舟被褐衫把杖子迎接參狀云百姓趙師儒亞台以其有職非𨽻屬邑怪而辭之師儒曰巴蜀亂離某懷集鄉人拒他盜非敢僭幸妄徼戎職亞台欣而接之乃駐旌斾館於寨中供億豐備欽禮彌勤師儒亦有詩句皆陳素心亞台悉為和之睹其清儉不覺嗟歎曰我他年若登廊廟必為斯人而致節察蓋賞其知分任真也祖系圗進士榜禪門有祖系圗得佛心印者皆次列之進士有登科記懷將相才者咸編綴之而名實相違玉石混雜疑誤後人良可怪也唐進士宇文翃雖士族子無文藻酷愛上科有女及笄真國色也朝之令子弟求之不得時竇璠年逾耳順方謀繼室其兄諫議叵有氣熖能為人致登第翃嫁一作娉女與璠璠為言之元昆果有所獲相國韋公說即其中表甚鄙之因滑臺杜尚書宅遭火幾爇神柩家人云老鼠尾曳火入庫內因而延燎京兆謂宇文曰魚將化龍雷為燒尾近日老鼠亦有燒尾之事用以譏之葆光子嘗試一僧備諳謬妄一旦擁徒說法自言出世安知他日不預祖系乎是則宇文翃登科後人何以知之悲夫溫李齊名溫庭雲字飛卿或云作筠字舊名岐與李商隱齊名時號曰溫李才思艷麗工於小賦每入試押官韻作賦凡八叉手而八韻成多為鄰鋪假手號曰救數人也而士行有缺縉紳薄之李義山謂曰近得一聨句云逺比趙公三十六年宰輔未得偶句溫曰何不云近同郭令二十四考中書宣宗嘗賦詩上句有金步搖未能對遣未第進士對之庭雲乃以玉條脫續之宣宗賞焉又藥名有白頭翁溫以蒼耳子為對他皆此類也宣宗愛唱菩薩蠻詞令狐相國假其新撰密進之戒令勿泄而遽言於人由是疏之溫亦有言云中書堂內坐將軍譏相國無學也宣皇好微行遇於逆旅溫不識龍顔傲然而詰之曰公非司馬長史之流帝曰非也又謂曰得非大參簿尉之類帝曰非也謫為方城縣尉其制詞曰孔門以德行為先文章為末爾既德行無取文章何以補焉徒負不羈之才罕有適時之用云云竟流落而死也杜豳公自西川除淮海溫庭雲詣韋曲杜氏林亭留詩云卓氏壚前金線栁隋家堤畔錦帆風貪為兩地行霖雨不見池蓮照水紅豳公聞之遺絹一千匹吳興沈徽云溫舅曾於江淮為親表檟楚由是改名焉庭雲又每嵗舉場多借舉人為其假手一作多為舉人假手沈詢侍郎知舉别施鋪席授庭雲不與諸公鄰比翌日簾前謂庭雲曰向來䇿名者皆是文賦託於學士某今嵗場中並無假託學士勉旃因遣之由是不得意也崔氏女失身為周寶妻末山尼盧氏女附浙西周寶侍中博陵崔夫人乃乾符中時相之姊妹也少為女道士或云寡而冠帔自幽獨焉大貂素以豪俠聞知崔有容色乃踰垣而竊之宗族亦莫知其存沒爾後周除浙右其內亦至國號乃具車馬偕歸崔門曰昔者官職卑下未敢先言此際叨塵亦不相辱相國不得已而容之此事鳯翔楊少尹說之甚詳近代江南鍾令內子乃盧肇貟外之女也亂離失身弟兄有在班行者恥之乃曰小娘子何不自殺而偶非丈夫也仙傳有徐仙姑居南嶽魏夫人壇羣僧調之乃自顛仆此乃修道而靈官所衛也已末山尼開堂說法禪師鄧隱峰有道者也試其所守中夜挾刃入禪堂欲行強暴尼憚死失志隱峰取去禪服集衆僧以曉之其徒立散王蜀先主部將張勍暴橫鞭人之胸典眉州有一少尼姿容明悟講無量夀經張欲逼辱以死拒之不肯破戒因而詬罵張乃折其齒與其父同沈於蟇頤津也崔氏女末山尼以畏懦而茍全徐仙姑用道力而止暴講經尼以守戒而隕命是知女子修道亦有一段障難而况冶容誨淫者哉孫棨舍人著北里志叙朝賢子弟平康狎游之事其旨似言盧相攜之室女失身於外甥鄭氏子遂以妻之殺家人而滅口是知平康之游亦何傷於年少之流哉崔禹昌不識牛唐世梁太祖未建國前崔禹昌擢進士第有别業在汴州管內禹昌敏俊善接對初到夷門希梁祖意請陳桑梓禮梁祖甚喜以其不相輕薄甚蒙管領常預賓次或陪䙝戲梁祖以其有莊墅必藉牛乃問曰莊中有牛否禹昌曰不識得牛意是無牛以時俗語不識得有對之梁祖大怒曰豈有人不識牛謂我是村夫即識牛渠則不識如此輕薄何由可奈幾至不測後有人言方漸釋怒張曙戲杜荀鶴唐右補闕張曙吏部侍郎褧之子禕之姪文章秀麗精神敏俊甚有時稱所生母常戴玉天尊黃巢亂離莫知存沒或有於枯骸中頭上見有玉天尊以曙未訪遺骸不合進取以此阻之後於裴贄侍郎下擢進士第官至右補闕曾戲同年杜荀鶴曰杜十四仁賢大榮幸得與張五十郎同年荀鶴答曰張五十郎大榮幸得與荀鶴同年天下只聞杜荀鶴名字豈知張五十郎耶彼此大咍是知虛名不足定人優劣曙有擊甌賦其警句云董雙成青瑣鸞驚啄開珠網穆天子紅韁馬解踏破瓊田又有鄠郊賦叙長安亂離亦哀江南悲甘陵之比區區之荀鶴不足擬倫北夢瑣言卷四
