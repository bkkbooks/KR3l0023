body:
  text: 北夢瑣言卷十五唐孫光憲撰披褐至殿門天復元年鳳翔李茂貞請入覲奏事朝廷允之蓋軍容使韓全誨與之交結昭宗御安福樓茂貞涕泣陳匡救之言時崔允密奏曰此姦人也未足為信陛下宜寬懷待之翌日宴於夀春殿茂貞肩輿衣駝褐入金鸞門易服赴宴咸以為前代跋扈未有此也時韓全誨深相交結崔允懼之自此亦結朱全忠竟致汴州迎駕與鳳翔連兵劫遷入洛之始識者以王子𢃄召戎崔允比之先是茂貞入闕焚燒京城是宴也俳優安轡新號茂貞為火龍子茂貞慚惕俯首宴罷有言他日須斬此優轡新聞之請假往鳳翔求救茂貞遙見詬之曰此優窮也胡為敢來轡新對曰只要起居不為求救近日京中且賣麩炭可以取濟茂貞大笑而厚賜赦之也朱全忠迎駕於鳳翔軍容使韓全誨以駕幸鳳翔李茂貞比懷挾帝以令諸侯之意懼朱全忠之盛也西川王公建亦有此慮乃結汴州同起軍助其迎駕汴軍傳一作傅城州一作川軍乃攻興元其帥王萬洪以無救援遂降成都由是山南十四州並為蜀有方變謀却助鳳翔於時命掌書記韋莊奉使至軍前朱公大怒自此與西川失歡而汴帥軍罷韓建賣李巨川李巨川有筆述歷舉不第先以仕僞一作為襄王與唐彥謙俱貶於山南褒帥楊守亮優待之山南失守隨致仕楊軍容復恭與守亮同奔北投太原導行者引出華州復恭為韓建挫辱楊罵為奴以短褐䝉之斃於枯木守亮檻送至京斬於獨栁樹京城百姓莫不沾涕此即南山一丈黑本姓訾黃巢時多救護導引朝士令趨行在人有逃黃巢而投附皆濟之由是人多感激也巨川為韓建副使朱令公軍次於華用張濬計先取韓建其幕客張策攜印率副使李巨川同詣轅門請降朱公謂曰車駕西幸皆公所教也建曰某不識字凡朝廷章奏鄰道書檄皆巨川為之因斬之識者謂韓建無行求解怒於朱公遂為所賣時人寃之巨川有子慎儀仕後唐為翰林學士唯張策本與張濬有分攜印而降叶濬之謀後仕至梁相朱公既得韓建以兄呼之尋奏移許昌一作田梁鳳厯初亦遇害也天子賜勳臣詩德宗皇帝好為詩以賜容州戴叔倫文宗宣宗皆以詩賜大臣昭宗駐蹕華州以歌辭賜韓建以詩及楊栁枝辭賜朱全忠所賜一也或以敬或以憚受其賜者得不求其義焉朱令公為昭宗攏馬汴帥朱公再圍鳳翔與茂貞軍戰于虢縣西槐林驛大敗岐軍橫尸不絶鮑氣聞於十里昭宗遂殺宦官韓全誨已下二十二人首宣示茂貞亦斬其義子繼筠首以送於是車駕還宫朱令俯首馬前請罪涕泣攏帝馬行千步帝為之動容至京師以宰相崔允判六軍乃下詔誅宦官第五可範已下七百一十人又鳳翔駕前宰相盧光啓等一百餘人並賜自盡天復三年汴人擁兵殺宰相崔允京兆尹鄭元規劫遷車駕移都東洛既入華州百姓呼萬歲帝泣謂百姓曰百姓勿唱萬歲朕無能與爾等為主也㳂路有思帝鄉之詞乃曰紇干山頭凍殺雀何不飛去生處樂況我此行悠悠未知落在何所言訖泫然流涕行至陜府內宴皇后自捧玉盆以賜全忠內人唱歌全忠將飲酒韓建躡其足全忠懼辭醉而退至榖水而殺內人可證及隨駕五百人自是帝孤立矣昭宗遇弒昭宗遷都至洛左右並是汴人雖有尊名乃是虛器如在籠檻鬱鬱不樂朱全忠以諸侯盡有匡復之志慮帝有奔幸之謀時護駕朱友諒等聚兵殿庭訴以衣食不足帝方勞諭友諒引兵升殿帝顛仆入內軍士躡而追之帝叱曰反耶友諒曰臣非敢無禮奉元帥之令帝奔入御厨以庖人之刀斬數輩竟為亂兵所害內人李漸榮裴正一等弒帝投刃而死又以朱友諒氏叔琮扇動軍情請誅朱友諒氏叔琮以成濟之罪歸之友諒等臨刑訴天曰天若有知他日亦當如我後全忠即位為子友圭所殺竟如其言請殺德王輝王嗣位社宴德王裕已下諸王子孫並密為全忠所害德王帝之兄曾册皇太子劉季述等廢昭宗册為皇帝季述等伏誅令歸少陽院全忠以德王眉目疏秀春秋漸盛全忠惡之請崔允密啓云太子曾竊寶位大義滅親昭宗不納一日駕幸福先寺謂樞密使蔣元暉曰德王吾之愛子何故頻令吾廢之又欲殺之言訖淚下因齧其中指血流全忠聞之宴罷盡殺之謀害衣冠輝王即位天佑中朱全忠以舊朝逹官尚在班列將謀篡奪先俾翦除凡在周行次第貶降舊相裴樞獨孤損崔逺陸扆王溥大夫趙崇王替等於滑州白馬驛賜自盡時宰相臣栁璨性隂狡貪權惡樞等在己之上與全忠腹心樞密使蔣元暉太常卿張廷範密友交結而害樞等俄而廷範轅裂元暉與栁璨及弟瑶瑊相繼伏誅先是故相張濬一家並害而棄尸黃河朱公謀主李振纍應進士舉不第尤憤朝貴時謂朱全忠曰此清流輩宜投於黃河永為濁流全忠笑而從之爾朱榮河隂之戮衣冠不是過也俄而輝王禪位封濟隂王於曹州遇鴆而崩唐祚自此滅矣誣何太后朱全忠先以蔣元暉為樞密使伺帝動靜積慶何太后以昭宗見害之後常恐不保旦夕曽使宫人阿秋面召元暉屬戒所乞它日傳禪之後保全子母性命言發無不涕零先是全忠速要傳禪召元暉到汴州責以太遲元暉以傳禪先須封國授九錫之命俟次第行之全忠怒曰我不要九錫看作天子否元暉歸奔洛陽與宰相商量為趙殷衡誣譖云與太后交通欲延唐祚乃令殷衡逼殺太后及宫人而誅蔣元暉時人寃之趙殷衡後改姓孔名循亦莫知其實是何姓仕後唐明宗為宣徽使出為許昌滄州兩鎮時人知其狡譎傾險莫不憚之為堂叔母侍疾唐天祐三年拾遺充史館修撰崔瑑進狀以堂叔母在孟州濟源私莊抱疾加甚無兄弟奉養無强近告投兼以年將七十地絶百里闕視藥膳不遑曉夕遂乞假躬往侍疾勑㫖依允時人義之或曰避禍而享義名者亦智也秦宗權訴不反黃巢破後蔡州秦宗權繼為反逆兵力强鋭又復稱僭山東諸郡苦之十年之間屠膾生聚汴帥朱全忠盡莭禦之宗權為部將申叢擒而折足囚縛朱全忠具表檻送至京京兆尹孫揆率府縣吏閲之宗權即檻中舉首曰宗權非反也大尹哀之觀者因以為笑李摩雲擲鉢從事李罕之河陽人也少為桑門無賴所至不容曾乞食於滑州酸棗縣自旦至晡無與之者擲鉢于地毁僧衣投河陽諸葛爽為卒罕之即僧號便以為名素多力或與人相毆毆其左頰右頰流血爽尋署為小校每遣討賊無不擒之蒲絳之北有摩雲山設堡栅于上號摩雲寨前後不能攻取時罕之下焉自此號李摩雲纍歷郡侯河南尹節將官至侍中卒於汴州荆南成汭之流也自唐至梁下闕北夢瑣言卷十五
