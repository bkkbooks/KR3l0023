body:
  text: 北夢瑣言卷十八唐孫光憲撰楊千郎莊宗異母弟存乂即郭崇韜女壻伏誅先是郭崇韜既誅之後朝野駭惋議論紛然莊宗令閹人察訪外事言存乂於諸將坐上訴郭氏之無罪其言怨望又於妖術人楊千郎家飲酒聚㑹攘臂而泣楊千郎者魏州賤民自言得墨子術於婦翁能役使隂物帽下召食物果實之類又蒱博必勝人有拳握之物以法必取又說煉丹乾汞易人形破扃鐍貴要間神竒之官至尚書郎賜紫其妻出入宫禁承恩用事皇弟存乂常朋淫於其家至是與存乂同罹其禍娠子能語後唐明宗皇帝微時隨蕃將李存信巡邊宿於雁門逆旅逆旅媪方娠帝至媪慢不得具食腹中兒語謂母曰天子至宜速具食聲聞于外媪異之遽起親奉庖爨敬事尤謹帝以媪前倨後恭詰之曰公貴不可言也問其故具道娠子腹語事帝曰老媪遜言懼吾辱耳後果如其言明宗不伐明宗始在軍中居常唯治兵仗不事生産雄武謙和臨財尤廉家財屢空處之晏如也太祖欲試以誠召於泉府命恣意取之所取不過束帛數緡而已所得賜與必分部下戰勝凱還儕類自伐帝徐言曰人戰以口我戰以手衆皆心服其能明宗獨見莊宗晏駕明宗皇帝為將相推舉霍彥威孔循上言唐運已衰請改國號明宗謂藩邸近侍曰何為改正朔左右奏曰先帝以錫氏宗屬為唐雪寃讐為昭宗皇帝後國號唐今朝之舊人不欲殿下稱唐請更名號耳明宗泣下曰吾十三事獻祖洎太祖至先帝冒刃血戰為唐室雪寃身編宗屬武皇功業即吾功業也先帝天下即吾天下也兄亡弟紹於意何嫌運之衰隆吾當身受於是不改正朔人服帝之獨見也莊宗諸弟遇害趙在禮作亂諸將擁明宗入闕未到間從馬直郭從謙攻興教門帝母弟存渥從上戰及宫車晏駕存渥與劉皇后同奔太原至風谷為部下所殺劉皇后欲出家為尼旋亦殺之存霸先除北京留守亦自河中至太原兵衆請殺存霸以安人心符彥超不能禁時存霸已翦髮衣僧衣謁彥超願為山僧竟不免也存紀存確匿於南山民家人有以報安重誨重誨曰主上已下詔尋訪帝之仁德必不加害不如密㫖殺之果併命於民家後明宗聞之切讓重誨傷惜久之劉皇后笞父莊宗劉皇后魏州成安人家世寒微太祖攻魏州取成安得后時年五六嵗歸晉陽宫為太后侍者教吹笙及笄姿色絶衆聲伎亦所長太后賜莊宗為韓國夫人侍者後誕皇子繼岌寵待日隆他日成安人劉叟詣鄴宫見上稱夫人之父有內臣劉建豐認之即昔日黃䰅丈人后之父也劉氏方與嫡夫人爭寵皆以門族誇尚劉氏恥為寒家白莊宗曰妾去鄉之時妾父死於亂兵是時環尸而哭妾固無父是何田舍翁詐僞及此乃於宫門笞之其實后即叟之長女也莊宗好俳優宫中暇日自負蓍囊藥篋令繼岌破帽相隨似后父劉叟以醫卜為業也后方晝眠及造其卧內自稱劉衙推訪女后大恚笞繼岌然為太后不禮復以韓夫人居正無以發明大臣希㫖請冊劉氏為皇后議者以后出於寒賤好興利聚財初在鄴都令人設法禆販所鬻樵蘇果茹亦以皇后為名正位之後凡貢奉先入後宫唯寫佛經施尼師他無所賜闕下諸軍困乏以至妻子餓殍宰相請出內庫俵給后將出粧具銀盆兩口皇子滿喜等三人令鬻以贍軍一旦作亂亡國滅族與夫褒姒妲己無異也先是莊宗自為俳優名曰李天下雜於塗粉獶雜之間時為諸優朴扶摑搭竟為嚚婦恩伶之傾玷有國者得不以為前鑒劉后以囊盛金合犀帶四欲於太原造寺為尼㳂路復通皇弟存渥同簀而寢明宗聞其穢即令自殺明宗誅諸凶明宗即位之初誅租庸使孔謙歸德軍節度使元行欽鄧州節度溫韜太子少保段凝汴州麴務辛庭蔚李繼宣等孔謙者魏州孔目吏莊宗圖霸以供饋兵食謙有力焉既為租庸使曲事嬖幸奪宰相權專以聚斂為意剝削為端以犯衆怒伏誅元行欽為莊宗愛將出入宫禁曽無間隔害明宗之子從璟以是伏誅段凝事梁以姦佞進身至節將末年綰軍權束手歸朝溫韜凶惡發掘西京陵寢莊宗中興不置其罪厚賂伶官閹人與段凝皆賜國姓或擁旄鉞明宗采衆議而誅之辛庭蔚開封尹王瓚之牙將也朱友貞時廷蔚依瓚勢曲法亂政汴人惡之李繼宣汴將孟審澄之子亡命歸莊宗劉皇后蓄為子時宫掖之間穢聲流聞此四凶帝在藩邸時惡其為人故廢罷之莊宗皇帝為唐雪恥號為中興而溫韜毁發諸帝寢陵宜加大辟而賜國姓付節旄由是知中興之說謬矣韓伊二妃夏夫人附莊宗皇帝嫡夫人韓氏後為淑妃伊氏為德妃契丹入中原石氏乞降宰相馮道尊册契丹主大張宴席其國母后妃列坐同宴王嬙蔡姬之比也夫人夏氏最承恩寵後嫁契丹托雲名李贊華所謂東丹王即安巴堅長子先歸朝後除滑州節度使性酷毒侍婢微過即以刀刲火灼夏氏少長宫掖不忍其凶求離婚歸河陽節度夏魯竒家今為尼也無官酬勳亂離以來官爵過濫封王作輔狗尾續貂天成初桂州節度觀察使馬爾即湖南馬殷之弟本無功德品秩已髙制詞云爾名尊四輔位冠三師既非品秩升遷難以井田增益此要語也議者以名器假人至此賈誼所以長歎息也明宗命相明宗入朝安重誨用事取謀於孔循舊相豆盧革韋說出官孔循不欲以河朔人入相極薦崔協而任圜力爭之云崔協者少識文字時人呼為無字碑有李琪者學際天人奕代軒冕論才校藝可敵時輩百人讒夫巧沮忌害其能必舍李琪而相崔協如棄蘇合之丸取蛣蜣之轉也重誨笑而止然以孔循故終相之帝曰馮書記先帝判官與物無競可以相矣由是道與協並命而舍李琪識者惜之明宗睿相明宗遣皇子從榮出鎮鄴都或一日上謂安重誨曰從榮左右有詐宣朕令㫖不接儒生儒生多懦恐鈍志相染朕方知之頗駭其事今此皇子方幼出臨大藩故選儒雅賴其禆佐今聞此姦險豈朕之所望也鞫其言者將戮之重誨曰若遽行刑又慮賔從聞後稍難安處且望嚴戒遂止明宗惡貪吏明宗皇帝尤惡貪貨鄧州留後陶玘為內鄉縣令成歸仁所論稅外科配貶嵐州司馬掌書記王惟吉奪歷任告敕配綏州長流百姓亳州刺史李鄴以贓穢賜自盡面戒汝州刺史萇蕳為其貪暴汴州倉吏犯贓內有史彥珣舊將之子又是駙馬石敬瑭親戚王建立奏之希免死上曰王法無私豈可徇親由是皆就戮誅不孝緱氏縣令裴彥文事母不謹誅之襄邑人周威父為人所殺不雪父寃有狀和解明宗降敕賜死安重誨枉殺任圜任圜昆弟五人曰圜圓圖回團雍穆有裕風采俱異圜美姿容有口辨負籌略平蜀後除黔南不行天成初入相簡拔賢俊杜絶幸門憂國如家切於功名而安重誨忌之常㑹於私第有妓善歌重誨求之不得嫌隙漸深俄罷三司除太子太保歸磁州致仕因朱守殷作亂立遣人稱制害之受命之日神氣不撓中外寃痛清泰中贈右僕射北夢瑣言卷十八
