body:
  text: 北夢瑣言卷三唐孫光憲撰盧肇為進士狀元唐相國李太尉德裕抑退浮薄奬拔孤寒於時朝貴朋黨掌武破之由是結怨而絶於附會門無賓客唯進士盧肇宜春人有竒才每謁見許脫衫從容舊例禮部放榜先稟朝廷恐有親屬言薦會昌三年王相國起知舉先白掌武乃曰某不薦人然奉賀今年榜中得一狀元也起未喻其旨復遣親吏於相門偵問吏曰相公於舉子中獨有盧肇久接從容起相曰果在此也其年盧肇為狀頭及第時論曰盧雖受知於掌武無妨主司之公道也戲改畢諴相名唐相畢諴吳鄉人詞學器度冠於儕流擢進士未遂其志嘗謁一受知朝士者希為改名以期亨逹此朝士譏其鹺賈之子請改為諴字相國欣然受而謝之竟以此名登第致位台輔前之朝士慙悔交集也段相踏金蓮夏侯相附唐段相文昌家寓江陵少以貧窶修進常患口食不給每聽曾口寺齋鐘動輒詣謁餐為寺僧所厭自此乃齋後扣鐘冀其晚屇而不逮食也後入登台座連出大鎮拜荆南節度有詩題曽口寺云曽遇闍黎飯後鐘蓋為此也富貴後打金蓮花盆盛水濯足徐相商致書規之鄒平曰人生幾何要酬平生不足也夏侯孜相國未偶伶俜風塵蹇驢無故墜井每及朝士之門舍逆旅之館多有齟齬時人號曰不利市秀才後登將相何先塞而後通也或云王播相公未遇題揚州佛寺詩及荆南人云是段相亦兩存之李固言相國為栁表所誤唐李固言生於鳳翔莊墅雅一作惟性長厚未習參謁始應進士舉舍於親表栁氏京第諸栁昆仲率多戲謔以相國不諳人事俾習趨揖之儀俟其磬折密於烏巾上帖文字云此處有屋僦賃相國不覺及出朝士見而笑之許孟容守常侍朝中鄙此官號曰貂郤固不能為人延譽也相國始以所業求知謀於諸栁諸栁與導行卷去處先令投謁許常侍相國果詣騎省髙陽公慙謝曰某官緒極間冷不足發君子聲采雖然已藏之於心又覩烏巾上文字知其朴質無何來年許公知禮闈李相國居狀頭及第是知栁氏之戲侮足致隴西之速遇也杜邠公不恤親戚杜邠公悰位極人臣富貴無比嘗與同列言平生不稱意有三其一為澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿塘左右為駭浪所驚呼喚不暇渴甚自潑湯茶喫也鎮荆州日諸院姊妹多在渚宫寄寓貧困尤甚相國未嘗拯濟至於節臘一無沾遺有乘肩輿至衙門詬罵者亦不省問之凡蒞方鎮不理獄訟在鳯翔洎西川繫囚畢政無輕無重任其殍殕人有從劒門拾得裹漆器文書乃成都具獄案牘略不垂愍斯又何心哉未嘗薦賢時號禿角犀李光顔太師選佳壻李太師光顔以大勳康國品位穹崇愛女未聘幕僚謂其必選佳壻因從容語次盛譽一鄭秀才詞學門閥人韻風流異常冀太師以子妻之他日又言之太師謝幕僚曰李光顔一健兒也遭遇多一作君難偶立微功豈可妄求名族乎某已選得一佳壻諸賢未見乃召客司小將指之曰此即某女之匹也超三五階軍職厚與金帛而已從事許當曰李太師建定難之勳懷弓藏之慮武寧保境止務圗存而欲結援名家非其志也與夫侯景求婚王謝何其逺哉王特尚書與太師宅重疊姻戚常語之王文公叉手睡司空圗附王文公凝清修重德冠絶當時每就寢息必叉手而臥慮夢寐中見先靈也食餺飥麵不過十八片曾典絳州於時司空圗侍郎方應進士舉自别墅到郡謁見後更不訪親知閽吏遽申司空秀才出郭矣或入郭訪親知即不造郡齋琅琊知之謂其專敬愈重之及知舉日司空一捷列第四人登科同年訝其名姓甚暗所圗太速有鄙薄者號為司徒空琅琊知有此説因召一榜人開筵宣言於衆曰某叨忝文柄今年榜帖全為司空先輩一人而已由是聲采益振爾後為御史分司舊相盧公攜訪之乃留詩曰氏族司空貴官班御史雄老夫如且在未可歎途窮其為名德所重也如此河中餞劉相瞻唐相國劉公瞻其先人諱景本連州人少為漢南鄭司徒掌箋劄因題商山驛側泉石滎陽竒之勉以進修俾前驛換麻衣執贄之後致解薦擢進士第歷臺省瞻相孤貧有藝雖登科第不預急流任大理評事日饘粥不給嘗於安國寺相識僧處謁餐留所業文數軸置在僧几致仕劉軍容遊寺見此文卷甚竒之憐其貧窶厚有濟恤又知其連州一作山人朝無強援謂僧曰某雖間廢能為此人致宰相爾後授河中少尹幕寮有貴族浮薄者蔑視之一旦有命徵入蒲尹張筵而祖之浮薄幕客呼相國為尹公曰歸朝作何官職相國對曰得路即作宰相此郎大笑之在席亦有異其言者自是以水部貟外知制誥相次入翰林以至大拜也王屋匡一上人細話之李氏瑞槐趙令公櫺棗附唐相國李公福河中永樂有宅庭槐一本抽三枝直過當舍屋脊一枝不及相國同堂昆弟三人曰石曰程皆登宰執唯福一人歷鎮使相而已近者石晉朝趙令公瑩家庭有檽棗樹婆娑異常四逺俱見有望氣者詣其鄰里問人云此家合有登宰輔者里叟曰無之然趙令先德小字相之兒得非此應乎術士曰王氣方盛不在身當其子孫爾後中令由太原判官大拜出將入相則前言果效矣一作也凡士之宦逹非止一途或以才升或由命遇則盛衰之氣亦隨人而效之向者槐棗異常豈非王氣先集耶不然何榮茂挺特拔聳之如是也隴西事得於李載仁大夫天水事得於長陽宰康張甚詳悉也髙太尉決禮佛僧唐渤海王太尉髙公駢鎮蜀日因巡邉至資中郡舍於刺史衙對郡山頂有開元佛寺是夜黃昏僧禮讚螺唄間作渤海命軍候悉擒械之來晨笞背斥逐召將吏而謂之曰僧徒禮念亦無罪過但以此寺十年後當有秃丁數千作亂我以是厭之其後土人皆髠髮執兵號大髠小髠據此寺為寨陵脅州將果叶渤海之言得於資中處士王迢王中令鐸拒黃巢唐王中令鐸重德名家位望崇顯率由文雅非定亂之才鎮渚宫為都統以禦黃巢冦兵漸近先是赴鎮以姬妾自隨其內未行本以妬忌忽報夫人離京在道中令謂從事曰黃巢漸以南來夫人又自北至旦夕情味何以安處幕僚戲曰不如降黃巢公亦大笑之洎荆州失守復把潼關黃巢差人傳語云令公儒生非是我敵請自退避無汚鋒刃於是棄關隨僖皇播遷於蜀再授都統收復京都大勳不成竟罹非命時議曰黃巢過江髙太尉不能拒捍豈王中令儒懦所能應變乎落都統後有詩其要云敕一作黜詔已聞來闕下檄書猶未遍軍前亦志在其中也黃巢起廣州自號義軍百萬都統上表先陳犯闕之意其詞云儻便歸降必有升奬朝廷恥笑路侍中巾裹唐路侍中巖風貌之美為世所聞鎮成都日委執政於孔目吏邉咸日以妓樂自隨宴於江津都人士女懷擲果之羡雖衛玠潘嶽不足為比善巾裹蜀人見必效之後乃翦紗巾之腳以異於衆也閭巷有袨服修容者人必譏之曰爾非路侍中耶嘗過鬻豚之肆見儈豕者謂屠者一作生曰此豚端正路侍中不如用之比方良可笑也以官妓行雲等十人侍宴移鎮渚宫日於合江亭離筵贈行雲等感恩多詞有離魂何處斷煙雨江南岸至今播於倡樓也李勳尚書發憤趙觀文附薛能尚書鎮鄆州見舉進士者必加異禮李勳尚書先德為衙前將校八座方為客司小子弟亦負文藻潛慕進修因舍歸田里未踰嵗服麻衣執所業於元戎左右具白其行止不請引見元戎曰此子慕善才與不才安可拒之某今自見其人質清秀復覽其文卷深器重之乃出郵巡職牒一通與八座先德俾罷職司間居恐妨令子修進爾後果䇿名第􅏡歷清顯出為鄆州節度也八座事得王屋山僧匡一甚詳近代進士趙觀文及桂州小軍杜狀元及第乃才舉也鄭愚尚書錦半臂唐鄭愚尚書廣州人雄才奧學擢進士第􅏡歷清顯聲稱烜一作赫然而性本好華以錦為半臂崔魏公鉉鎮荆南滎陽除廣南節制經過魏公以常禮延遇滎陽舉進士時未嘗以文章及魏公門此日於客次換麻衣先贄所業魏公覽其卷首尋已賞歎至三四不覺曰真銷得錦半臂也又以魏公故相合具軍儀廷參不得已而授一作使之魏公曰文武之道備見之矣其欽服形於辭色也或曰滎陽因醉眠左右見一白豬蓋杜征南蛇吐之類韋宙相足穀翁唐相國韋公宙善治生江陵府東有别業良田美産最號膏腴而積稻如坻皆為滯穗大中初除廣州節度使宣宗以番禺珠翠之地垂貪泉之戒京兆從容奏對曰江陵莊積穀尚有七十堆固無所貪宣皇曰此可謂之足穀翁也李當尚書竹籠崔珏二子附唐李當尚書鎮南梁日境內多有朝士莊産子孫僑寓其間而不肖者相效為非前政以其各有階緣弗克禁止閭巷苦之八座嚴明有斷處分寬織篾籠召其尤者詰其家世譜第在朝姻親乃曰郎君籍如是地望作如此行止無乃辱於存亡乎今日所懲賢親眷聞之必賞老夫一作安勉旃遽命盛以竹籠沈於漢江由是其儕惕息各務戢斂也崔珏侍御家寄荆州二子凶惡節度使劉都尉判之曰崔氏二男荆南三害不免行刑也吳行魯溫溲器厲圗南附唐吳行魯尚書彭州人少年事內官西門軍容小心畏慎每夜溫溲溺器以奉之深得中尉之意或一日為洗足中尉以腳下文理示之曰如此文理爭教不作十軍容使行魯拜曰此亦無憑某亦有之執厮僕之役乃脫屨呈之中尉嗟歎謂曰汝但忠孝我終為汝成之爾後假以軍職除彭州刺史為盧耽相公西川行軍司馬禦蠻有功歷東西川山南三鎮節旄除西川制云為命代之英雄作人中之祥瑞譏之也厲圗南為西川副使隨府罷職行魯欲延辟之圗南素薄行魯聞之大笑曰不能翦頭刺面而趨侍健兒乎自使院乘馬不歸私第直出北郭家人遽結束而追之張雲起居為成都少尹常出輕言為行魯鴆殺之崔侍中省刑獄唐崔侍中安潛崇奉釋氏鮮茹葷血唯於刑辟常自躬親雖僧人犯罪未嘗屈法於廳事前慮囚必溫顔恤惻以盡其情有大辟者俾先示以判語賜以酒食而付於法鎮西川三年唯多蔬食宴諸司以麵及蒟蒻之類染作顔色用象豚肩羊臑膾炙之屬皆逼真也時人比於梁武而頻於宅使堂前弄傀儡子軍人百姓穿宅觀看一無禁止而中壼預政以玷盛德惜哉劉蛻舍人不祭先祖唐劉舍人蛻桐廬人早以文學應進士舉其先德戒之曰任汝進取窮之與逹不望於汝吾若沒後慎勿祭祀乃乘扁舟以漁釣自娛竟不知其所適不審是隱者為復是漁師莫曉其端倪也紫微歷登華貫出典商於霜露之思於是乎止臨終亦戒其子如先考之命蜀禮部尚書纂即其息也嘗與同列言之君子曰名教之家一作中重於喪祭劉氏先德是何人斯茍同隱逸之流何傷菽水之禮紫微以儒而進爵比通侯遵乃父之緒言紊先王之舊制以時一作報本之敬能便廢乎大彭通人抑有其説時未喻也杜審權相斥馮涓大中四年進士馮涓登第榜中文譽最髙是嵗暹羅國起樓厚齎金帛奏請撰記時人榮之初官京兆府參軍恩地即杜相審權也杜有江西之拜制書未行先召長樂公密話垂延辟之命欲以南昌箋奏任之戒令勿泄長樂公拜謝辭出宅速鞭而歸於通衢遇友人鄭賨見其喜形於色駐馬懇詰長樂遽以恩地之辟告之滎陽尋捧刺詣京兆門謁賀具言得於馮先輩也京兆嗟憤而鄙其淺露洎制下開幕馮不預焉心緒憂疑莫知所以亷車發日自灞橋乘肩輿門生咸在長樂拜别京兆公長揖馮曰勉旃由是囂浮之譽遍於搢紳竟不通顯中間有涉交通中貴愈招清議官止祠部郎中眉州刺史仕蜀至御史大夫不肖子三變唐咸通中荆州有書生號唐五經者學識精博實曰鴻儒旨趣甚髙人所師仰聚徒五百輩以束修自給優遊卒嵗有西河濟南之風幕寮多與之遊常謂人曰不肖子弟有三變第一變為蝗蟲謂鬻莊而食也第二變為蠧魚謂鬻書而食也第三變為大蟲謂賣奴婢而食也三食之輩何代無之薛保遜輕薄薛保遜名家子恃才與地凡所評品士子以之升降時號為浮薄相國夏侯孜一作公尤惡之其堂弟因名保厚以異之由是不睦內子盧氏與其良人操尚略同因季父薛監來省盧新婦出參俟其去後命水滌門閾薛監知而大怒經宰相疏之保遜因謫授澧州司馬凡七年不代夏侯孜一作公出鎮魏相謨登庸方有徵拜而殞於郡愚曽睹薛文數幅其一云餞交親於灞上止逆旅氏見數物象人詰之口輒動皆云江淮嶺表州縣官也嗚呼天之生民為此輩笞撻又觀優云緋胡折窣一作推宰莽轉而出衆人皆笑唯保遜不會其輕物皆此類也盧虔灌罷夔州以其為姊妹夫徑至澧州慰省回至郵亭回望而笑曰豈意薛保遜一旦接軍事李判官打楊栁枝乎澧州老軍將周藹舊曾服事備言之陳會螳蜋賦蜀之士子莫不酤酒慕相如滌器之風也陳會郎中家以當壚為業為不掃街官吏毆之其母甚賢勉以進修不許歸鄉以成名為期每嵗餱糧紙筆衣服僕馬皆自成都齎致郎中業八韻唯螳蜋賦大行太和元年及第李相固言覽報狀處分廂界收下酒斾闔其户家人猶拒之逡巡賀登第乃聖善奬訓之力也後為白中令子壻西川副使連典彭漢兩郡而終劉僕射荔枝圗唐劉僕射崇龜以清儉自居甚招物論嘗召同列餐苦蕒一作馬饆饠朝士有知其矯乃潛問小蒼頭曰僕射晨餐何物蒼頭曰潑生吃了也朝士聞而哂之又鎮番禺效吳隱之為人京國親知貧乏者顒俟濡救但畫荔枝圗自作賦以遺之後薨於嶺表扶護靈櫬經渚宫家人鬻海珍珠翠於市時人譏之趙大夫號無字碑張䇿附唐趙大夫崇凝清介門無雜賓慕王濛劉真長之風也標質堂堂不為文章號曰無字碑每遇轉官舊例各舉一人自代亞台未嘗舉人云朝中無可代己也世亦以此少之梁相張䇿嘗為僧返俗應舉亞台鄙之或曰劉軻蔡京得非僧乎亞台曰劉蔡輩雖作僧未為人知翻然貢藝有何不可張䇿衣冠子弟無故出家不能參禪訪道抗迹塵外乃於御簾前進詩希望恩澤如此行止豈掩人口某十度知舉十度斥之清河公乃東依梁主而求際會蓋為天水拒棄竟為梁相也北夢瑣言卷三
