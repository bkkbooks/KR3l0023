body:
  text: 北夢瑣言卷二唐孫光憲撰皮日休獻書咸通中進士皮日休進書兩通其一請以孟子為學科其略云臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子不異道者孟子也舍是而子者必斥乎經史為聖人之賊也云云文多不載請廢莊列之書以孟子為主有能通其義者其科選同明經也其二請以韓文公愈配饗太學其略曰臣聞聖人之道不過乎求用用於生前則一時可知也用於死後則萬世可知也云云又云孟子荀卿翼傳孔道以至於文中子文中子之道曠矣其幾於室授者唯韓愈焉蹴及楊墨蹂踐釋老故得孔道炳然如日星焉吾唐以來一人而已茍不得在二十一賢之數列則典禮未為備也日休先字逸少後字襲美襄陽竟陵人也業文隱鹿門山中自號間氣布衣大中榜未及第禮部侍郎鄭愚以其貌不揚戲之曰子之才學甚富如一日何休對曰侍郎不可以一日廢二日謂不以人廢言也舉子咸推伏之官至國子博士寓蘇州與陸龜蒙為文友著文藪十卷皮子三卷黃冦中遇害其子為錢尚父吳越相宰相怙權溫庭筠附宣宗時相國令狐綯最受恩遇而怙權尤忌勝已以其子滈不解而第為張雲劉蛻崔瑄疊上疏疏之宣宗優容綯出鎮維揚上表訴子之寃其略云一從先帝久次中書得臣恩者謂臣好不得臣恩者謂臣弱臣非美酒美肉安能啖衆人之口時以執己之短取誚於人或云曽以故事訪於溫岐對以其事出南華且曰非僻書也或冀相公燮理之暇時宜覽古綯益怒之乃奏岐有才無行不宜與第會宣宗私行為溫岐所忤乃授方城尉所以岐詩云因知此恨人多積悔讀南華第二篇又李商隱綯父楚之故吏也殊不展分商隱憾之因題廳閣落句云郎君官重施行馬東閣無因許再窺亦怒之官只止使下貟外也江東羅隱亦受知於綯畢竟無成有詩哭相國云深恩無以報底事是柴荆以三才子怨望即知綯之遺賢也駱山人告王庭湊唐田宏正之領鎮州三軍殺之而立王庭湊即王武俊支屬也庭湊生於别墅嘗有鳩數十隻朝集庭樹暮集簷下有里人駱德播異之及長駢脅善隂符鬼谷之書歷軍職得士心曾使河陽回在中路以酒困寢於路隅忽有一人荷䇿而過熟視之曰貴當列土非常人也僕者寤以告庭湊庭湊馳數里及之致敬而問自云濟源駱山人也向見君鼻中之氣左如龍而右如虎龍虎氣交王在今秋子孫相繼滿一百年又云家之庭合有大樹樹及於堂是其兆也是年果為三軍扶立為留後歸别墅而庭樹婆娑暗北舍矣墅西飛龍山神庭湊往祭之將及祠百步有人具冠冕折腰於庭湊及入廟神乃側坐至今面東起宇尚存焉庭湊清儉公正忠於朝廷勤於軍民子孫世嗣為鎮帥至朱梁時王鎔封趙王為部將張文禮滅之授任致冦唐馬植相公曾鎮安南安撫軍民懷柔蠻獠廢珠池尚儉素李琢後鎮是邦用法大酷軍城逺出而屬南蠻六七年間勞動兵役咸通七年髙駢收復之先是荆徐間征役拒蠻人甚苦之有舉子聞許卒二千沒於蠻鄉有詩刺曰南荒不擇吏致我交趾覆聯綿三四年致我交趾辱懦者鬭則退武者兵益黷軍容滿天下戰將多金玉刮得齊民瘡分為猛士祿雄雄許昌師忠武冠其族去為萬騎風住為一川肉時有踐卒回千門萬户哭哀聲動閭里怨氣成山谷誰能聽鼓聲不忍看金鏃念此堪淚流悠悠潁川緑吟此詩有以見一作知失於授任為國家生事大東之苦斯其類乎髙駢開海路王審知開海附安南髙駢奏開本州海路初交趾以北距南海有水路多覆巨舟駢往視之乃有橫石隱隱然在水中因奏請開鑿以通南海之利其表略云人牽利楫石限橫津才登一去之舟便作九泉之計時有詔聽之乃召工者啖以厚利竟削其石交廣之利民至今賴之以濟焉或言駢以術假雷電以開之未知其詳葆光子嘗聞閩王王審知患海畔石崎為舟楫之梗一夜夢吳安王即伍子胥也許以開導乃命判官劉山甫躬往祈祭三奠才畢風雷勃興山甫憑髙觀焉見海中有黃物可長千百丈奮躍攻擊凡三日晴霽見石港通暢便於泛涉於時録奏賜名甘棠港即渤海假神之力又何怪焉亦號此地為天威路實神功也放孤寒三人及第科松蔭花事附咸通中禮部侍郎髙湜知舉榜內孤貧一作負者公乘億賦詩三一作二百首人多書於屋壁許棠有洞庭詩尤工時人謂之許洞庭最竒者有聶夷中河南中都人少貧苦精於古體有公子家詩云種花於西園花發青樓道花下一禾生去之為惡草又詠田家詩云父耕原上田子斸山下荒六月禾未秀官家已修倉又云鋤禾一作田當日午汗滴禾下土誰念盤中餐粒粒皆辛苦又云二月賣新絲五月糶新穀醫得眼前瘡剜却心頭肉我願君王心化為光明燭不照綺羅筵只照逃亡屋所謂言近意逺合三百篇之旨也盛得三人見湜之公道也葆光子嘗有同寮示我調舉時詩卷內一句云科松為蔭花因譏之曰賈浪仙云空庭唯有竹間地擬栽松吾子與賈生春蘭秋菊也他日赴逹官牡丹宴欄中有兩松對植立命斧斫之以其蔭花此侯席上於愚有得色默不敢答亦可知也文宗重王起王文懿公起三任節鎮􅏡歷省寺贈守太尉文宗頗重之曾為詩寫於太子之笏以揚之又畫儀形於便殿師友目之曰當代仲尼雖歷外鎮家無餘財知其甚貧詔以仙韶院樂官逐月俸錢五百貫給之起昧於理家俸入其家盡為僕妾所有耄年寒餒故加給焉于時識者以起不能陳遜而與伶人分俸利其茍得此為短也葆光子曰士人之家唯恥一作恐貨殖至於荷畚執耒灌園鬻蔬未有祿代耕豈空器而為養安可忘甘苦不逮晨昏今之世祿囂薄不能撙節稍豐則飫其狗彘少一作似歉則困彼妻孥而云安貧吾無所取唯衣與食所謂切身儻德望名品未若王相國者得不思儉而足用乎北夢瑣言卷二
