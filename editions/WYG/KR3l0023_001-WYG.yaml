body:
  text: 北夢瑣言卷一唐孫光憲撰宣宗稱進士唐宣宗皇帝好儒雅每直殿學士從容未嘗不論前代興亡頗留心貢舉嘗於殿柱上自題曰鄉貢進士李某或宰相出鎮賦詩以贈之詞皆清麗凡對宰臣言政事即終日忘倦洎僖宗皇帝好蹴毬鬭雞為樂自以能於歩打謂俳優石野猪曰朕若作歩打進士亦合得一狀元野猪對曰或遇堯舜禹湯作禮部侍郎陛下不免且落第帝笑而已原其所好優劣即聖政可知也李太尉英俊太尉李徳裕幼神俊憲宗賞之坐於膝上父吉甫每以敏辯誇於同列武相元衡召之謂曰吾子在家所嗜何書意欲探其志也徳裕不應翌日元衡具告吉甫因戲曰公誠涉大癡耳吉甫歸以責之徳裕曰武公身為帝弼不問理國調隂陽而問所嗜書者成均禮部之職也其言不當所以不應吉甫復告元衡大慙由是振名鄭光免稅宣宗舅鄭光勅賜雲陽鄠縣兩莊皆令免稅宰臣奏恐非宜詔曰朕以光元舅欲優異之初不細思是免其賦爾等每於匡救必盡公忠親戚之間人所難議茍非愛我豈盡嘉言事事能如斯天下何憂不治有始有卒當共守之尋罷葆光子同寮嘗買一莊喜其無稅乃謂曰天下莊産未有不征同寮以私券見拒爾後子孫為縣宰定稅求祈不暇國舅尚爾庶寮胡為再興釋教武宗嗣位宣宗居皇叔之行密游外方或止江南名山多識髙道僧人初聽政謂宰相曰佛者雖異方之教深助理本所可存而勿論不欲過毁以傷令徳乃遣下詔㑹昌中靈山古跡招提棄廢之地並令復之委長吏擇僧之髙行者居之唯出家者不得妄度也懿宗即位唯以崇佛為事相國蕭倣裴坦時為常侍諫議上疏極諫其畧云臣等聞元祖之道用慈儉為先素王之風以仁義是首相沿百世作則千年至聖至明不可易也如佛者生於天竺去彼王宫割愛中之至難取滅後之殊勝名歸象外理出塵中非為帝王所能慕也廣引無益有損之義文多不録文理婉順與韓愈元和中上請除佛骨表不異也懿皇雖聽覽稱奬竟不能止末年迎佛骨纔至京師俄而晏駕識者謂大喪之兆也鄭氏女廬墓唐大中年兖州奏先差赴慶州行營押官鄭神佐陣沒其室女年二十四先亡父未行營已前許嫁右驍雄軍健李元慶未受財禮阿鄭知父神佐陣沒遂與李元慶休親截髪往慶州北懐安鎮收亡父遺骸到兖州瑕丘縣進賢鄉與亡母合𦵏訖便於塋内築廬識者曰女子適邉取父遺骸合𦵏烈而且孝誠可嘉也廬墓習於近俗國不能禁非也廣引禮經而證之日本國王子棊唐宣宗朝日本國王子入貢善圍棊帝令待詔顧師言與之對手王子出本國如楸玉局冷暖玉棊子盖玉之蒼者如楸玉色其冷暖者言冬暖夏凉人或過說非也王子至三十三下師言懼辱君命汗手死心始敢落指王子亦凝目縮臂數四竟伏不勝逥謂禮賓曰此第㡬手答曰其第三手也王子願見第一手禮賓曰勝第三可見第二勝第二可見第一王子撫局歎曰小國之一不及大國之三此日本人猶不可輕况中國之士乎葆光子曰蜀簡州刺史安重霸黷貨無厭部民有油客子者姓鄧能棊其力粗贍安輙召與對敵只令立侍每落一子俾其退立於西北牖下俟我算路然後一作始進之終日不下十數子而已鄧生倦立且飢殆不可堪次日又召或有諷鄧生曰此侯好賂本不為棊何不獻效而自求退鄧生然之以中金十鋌獲免良可笑也駮杜預大中時工部尚書陳商立漢文帝廢䘮議立春秋左傳學議以孔聖修經褒貶善惡𩔖例分明法家流也左丘明為魯史載述時政惜忠賢之泯滅恐善惡之失墜以日繋月修其職官本非扶助聖言縁飾經㫖盖太史氏之流也舉其春秋則明白而有實合之左氏則叢雜而無徵杜元凱曾不思夫子所以為經當與詩書周易等列丘明所以為史當與司馬遷班固等列取二義乖剌不侔之語㕘而貫之故㣲㫖有所未周婉章有所未一文多不載又睹呉郡陸龜蒙亦引啖助趙匡為證正與陳工部義同葆光子同寮王公貞範精於春秋有駮正元凱之謬條緒甚多人咸一作或訝之獨鄙夫嘗以陳陸啖趙之論竊然之非茍合也唯義所在李太尉抑白少傅白少傅居易文章冠世不躋大位先是劉禹錫太和中為賓客時李太尉徳裕同分司東都禹錫謁於徳裕曰近曾得白居易文集否徳裕曰累有相示别令收貯然未一披今日為吾子覽之及取看盈其箱笥沒於塵坌既啓之而復卷之謂禹錫曰吾於此人不足久矣其文章精絶何必覽焉但恐逥吾之心其見抑也如此衣冠之士一作内並皆忌之咸曰有學士才非宰臣器識者於其答制中見經綸之用為時所排此賈誼在漢文之朝不為卿相知人皆惜之葆光子曰李衛公之抑忌白少傅舉𩔖而知也初文宗命徳裕朝中朋黨首以楊虞卿牛僧孺為言楊牛即白公宻友也其不引翼義在於斯非抑文章也慮其朋比而掣肘也牛僧孺竒士相國牛僧孺字思黯或言牛仙客之後居宛葉之間少單貧力學有倜儻之志唐永貞中擢進士第時與同輩過政事堂宰相謂曰掃㕔奉候僧孺獨出曰不敢衆聳異之元和初登制科歴省郎中書舎人御史中書門下平章事揚州建州兩鎮東都留守左僕射先是撰周秦行記李徳裕切言短之大中初卒未賜諡後白敏中入相乃奏定諡曰簡白居易曰文葆光子曰僧孺登庸在徳裕之先又非忌才所能掩抑今以牛之才術比李之功勲自然知其臧否也且周秦行記非所宜言徳裕著論而罪之正人覽記而駭之勿謂衛公掩賢妬善牛相不罹大禍亦幸而免令狐滈預抜文解唐大中末相國令狐綯罷相其子滈應進士舉在父未罷相前預拔文解及第諫議大夫崔宣上疏述滈弄父權勢傾天下以舉人文卷須十月前送納豈可父身尚居於樞務男私拔其解名干撓主司侮弄文法恐姦欺得路孤直杜門云云請在御史臺推勘疏留中不出葆光子曰令狐公在大中之初傾陷李太尉唯以附㑹李紳而殺呉湘又擅改元和史又言賂遺閹宦殊不似徳裕立功於國自儉立身掎其小瑕忘其大美洎身居巖廟别無所長諫官上章可見之矣與朱崖之終始殆難比焉劉三復記三生事唐太和中李徳裕鎮浙西有劉三復者少貧苦學有才思時中一作王人賫御書至以賜徳裕徳裕試其所為謂曰子可為我草表能立就一作搆或歸以創之三復曰文理貴中不貴其速徳裕以為當言三復又請曰漁歌樵唱皆傳公述作願以文集見示徳裕出數軸與之三復乃體而為表徳裕嘉之因遣詣闕求試果登第歴任臺閣三復能記三生事云曾為馬常患渴望驛而嘶傷其蹄則心連痛後三復乗馬過磽确之地必為緩轡有轍石必去之其家不施門限慮傷馬蹄也其子鄴勅賜及第登廊廟上表雪徳裕以朱崖神櫬歸𦵏洛中報其先恩也士大夫美之禿角犀杜邠公悰司徒佑之孫父曰從郁歴選補畿令悰尚憲宗岐陽公主累居大鎮復居廊廟無他才未嘗延接寒素甘食竊位而已有朝士貽書於悰曰公以碩大敦龎之徳生於文明之運矢厥謨猷出入隆顯極言譏之文多不録時人號為禿角犀凡蒞藩鎮未嘗斷獄繫囚死而不問宜其責之嗚呼處髙位而妨賢享厚禄以豐己無功於國無徳於民富貴而終斯又何人也子孫不享何莫由斯魏文貞公笏唐文宗皇帝謂宰相曰太宗得魏徵采拾闕遺弼成聖政今我得魏謩於疑似之間必極匡諫雖不敢希及貞觀之政庶㡬處無過之地今授謩右補闕委舎人善為之詞又問謩曰卿家有何圗書謩曰家書悉無唯有文貞公笏在文宗令進來鄭覃在側曰在人不在笏文宗曰卿渾未曉但甘棠之義非要笏也北夢瑣言卷一
