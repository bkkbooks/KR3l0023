body:
  text: 北夢瑣言卷十三唐孫光憲撰草賊號令公王中令鐸落都統除滑州節度使尋罷鎮以河北安靜於楊全玫有舊避地浮陽與其都統幕客十來人從行皆朝中士子及過魏樂彦禎禮之甚至鐸之行李甚侈從客侍姬有輦下昇平之故態彦禎有子曰從訓素無賴愛其車馬姬妾以問其父之幕客李山甫以咸通中數舉不第尤私憤於中朝貴達因令圖之俟鐸至甘陵以輕騎數百盡掠其槖裝姬僕而還鐸與賔客皆遇害及奏朝廷云得貝州報某日有殺刼一人姓王名令公其忽誕也如此彦禎子尋為亂軍所殺得非瑯琊公訴于上帝乎王重榮逐兩帥河中節度使王重榮始為牙將黄巢犯闕元戎李都奉偽畏重榮黨附者多因薦為副使一日忽謂都曰凢人受恩只可私報不可以公徇令公助賊䧟一邦於國不忠而又日加箕斂衆口紛然倐忽變生何以遏也遽命斬其偽使都無以對因以軍印授重榮而去及都至行在朝廷又以前京兆尹竇潏間路至河中代都為帥重榮迎之潏前為京兆尹有慘酷之名時謂之墮疊及至翌日集軍校于庭謂曰天子命重臣作鎮將遏賊衝安可輕議斥逐令北門出乎且為惡者必一兩人而已爾等可言之潏不知軍校皆重榮之親黨也衆皆不對重榮乃自屏肅佩劍歴階而上謂潏曰為惡者非我而誰召潏之僕吏控馬及階請依李都前例速去之潏不敢仰視乃躍馬復由北門而出重榮破黄巢有功正授節制封郡王與田令孜結怨他日為部將常行儒殺之時號鐵條以其剛也鄭文公報恩鄭文公畋字台文父亞曾任桂管觀察使畋生於桂州小字桂兒時西門思恭為監軍有詔徵赴闕亞餞於北郊自以衰年因以畋託之曰他日願以桂兒為念九泉之下不敢忘之言訖泫然流涕思恭誌之及為神策軍中尉亞已卒思恭使人召畋館之于第年未及冠甚愛之如甥姪因選師友教導之畋後官至將相黄巢之入長安西門思恭逃難於終南山畋以家財厚募有勇者訪而獲之以歸岐下温清侍膳有如父焉思恭終於畋所畋葬於鳯翔西岡松柏皆手植之未幾畋亦卒葬近西門之墳百官皆造二隴以弔之無不墮淚咸服其義也韓簡聽書李茂貞附魏博節度使韓簡性麄質每對文士不曉其說心常恥之乃召一孝亷令講論語及講至為政篇明日謁諸從事曰僕近知古人淳樸年至三十方能行立外有聞者無不絶倒秦王李茂貞請三傳王利甫講春秋利甫古僻性狷然演經義文亹亹堪聽茂貞連月聽之不倦利甫後寄褐於道門改名晝卒於洛中也武臣未必輕儒但未睹通儒多逢鄙薄之輩沮其學善也惜哉孟方立陳桑梓禮羅虬附昭義軍節度使孟方立邢州平鄉人也少以勇力𨽻於本軍為裨將廣明中潞帥髙潯攻諸葛爽於河陽方立出天井關為前鋒時潯為大將劉廣所逐廣忌方立留戍于關後廣為潞人所殺三軍乃以方立為帥因有首丘之思遂移軍於邢州用法平正人皆附之始拜墳墓於鄉里詣縣令里所陳桑梓之敬有識者賞焉姪遷嗣為潞帥降太原葆光子曰羅虬累舉不第務於躁進因罷舉依於宦官典台州晝錦也常以展墓勉謁邑宰横笏傲然宰曰某雖塵吏不逹事體然使君豈不看松柏下人乎譏其無桑梓之敬曾武人之不若也虬有俊才嘗見雕隂官妓比紅兒詩他無聞也雷電救王鎔景福中幽州帥李匡威率兵救鎮州軍次博水會軍亂推其弟匡儔充留後諸軍皆散乃以書報弟付之軍政南欲赴闕泊於陸澤鎮州趙王王鎔以匡威救難失國因請稅駕於常山府郭以中離變會匡威有幕客李貞抱自闕囘與匡威相遇同登寺樓觀鎮州山川之美有愛戀之意乃謀託親忌王鎔既造之逼以兵仗同詣理所乃入自子城東門門内有鎔親騎營中之卒忽掩其外關復於闕垣中有一人識是王鎔遽挾于馬上肩之而去匡威格鬭移時與貞抱俱死鎔年十六七疎瘦當與匡威並轡之時雷電忽起雨雹交下而屋瓦皆飛拔大木數株明日鎔但覺項偏痛乃因有力者所挾不勝其苦故也訪之則曰墨君和鼓刀之士也天意㝠數信然鎔自脱此難更在位三十餘年不有神明扶持何以獲免李全忠蘆生三節唐乾符末范陽人李全忠少通春秋好鬼谷子之學曾為棣州司馬忽有蘆一枝生於所居之室盈尺三節焉心以為異以告别駕張建章建章積書千卷博古之士也乃曰昔者蒲洪以池中蒲生九節為瑞乃姓蒲後子孫昌盛蘆者茅也合生陂澤之間而生於室非其常也君後必有分茅之貴三節者傳節鉞三人公可誌之全忠後事李可舉為戎校諸將逐可舉而立全忠累加至檢校太尉臨戎甚有威政全忠死子匡威嗣匡威為三軍所逐弟匡儔為太原所攻挈家赴闕至滄州景城為盧彦威所害先是匡威少年好勇不拘小節自布素中以飲博為事漁陽士子多忌之曾一日與諸游俠輩釣于桑乾赤欄橋之側自以酒禱曰吾若有幽州節制分則獲一大魚果釣得魚長三尺人甚異焉有馬都一作郁下同者少負文藝匡威曾問其年都一作郁曰弱冠後兩周星傲形於色後匡威繼父為侯首召焉一作馬都問曰子今弱冠後幾周星歳都但頓顙謝罪匡威曰好子之事吾平生所愛也何懼之有因署以府職其濶逹多如此𩔖故人多附之葆光子嘗見范陽熟人說李匡儔妻張氏國色也其兄匡威為帥强婬之匡儔按劍而俟夜深妻廻出步輦為其夫殺之匡威羞見其弟及將校或言欲將兵救援鎮州既出城三軍立匡儔為帥匡威遂稱欲歸朝覲行次常山又有刼質王鎔之事匡儔移牒王鎔往復指陳終不及婬穢之事諱國惡也張建章泛海遇仙張建章為幽州行軍司馬後歴郡守尤好經史聚書至萬卷所居有書樓但以披閲清淨為事經渉之地無不理焉曾齎府戎命往渤海遇風濤乃泊其船忽有青衣泛一葉舟而至謂建章曰奉大仙命請大夫建章乃應之至一大㠀見樓臺巋然中有女仙處之侍翼甚盛器食皆建章故鄉之常味也食畢告退女仙謂建章曰子不欺暗室所謂君子人也忽患風濤之苦吾令此青衣往來導之及還風濤寂然往來皆無所懼又囘至西岸經太宗征遼碑半在水中建章則以帛包麥屑置于水中摸而讀之不欠一字其篤學也如此薊門之人皆能說之于時亦聞於朝廷葆光子曾遇薊門軍校姓孫忘其名細話張大夫遇水仙蒙遺鮫綃自齎而進好事者為之立傳今亳州太清宫道士有收得其本者且曰明宗皇帝有事郊丘建章鄉人掌東序之寳其言國璽外唯有二物其一即建章所進鮫綃篋而貯之軸之如帛一作著以紅線三道劄之亦云夏天清暑展開可以滿室凜然邇来變更莫知何在北夢瑣言卷十三
