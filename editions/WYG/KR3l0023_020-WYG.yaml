body:
  text: 北夢瑣言卷二十唐孫光憲撰見馬撫髀上問范延光見管馬數對曰見管馬軍三萬五千上撫髀歎曰朕從戎四十年太祖在太原時騎軍不過七千先皇帝與汴軍校戰自始至終馬數纔萬今有鐵馬三萬五千不能使九州混一是吾養卒練士將帥之不至也老者馬將奈何延光以馬數多國力虚耗為言上亦然之受賂曲法鎮州市人劉方遇家財數十萬方遇妻田氏早卒田之妹為尼常出入方遇家方遇使尼長髮為繼室有田令遵者方遇之妻弟也善貨殖方遇以所積財令令遵興殖也方遇有子年幼二女皆嫁方遇疾卒子幼不能督家業方遇妻及二女以家財素為令遵興殖乃聚族合謀請以令遵姓劉為方遇繼嗣即令鬻劵人安美為親族請嗣劵書即定乃遣令遵服斬衰居喪而二女初立令遵時先邀每月供財二萬及後求取無厭而石李二女夫使二女詣本府論訴云令遵冒姓奪父家財令遵下獄石李二夫族與本府要吏親黨上至府帥判官行軍司馬隨使都押衙各受方遇二女賂錢數千緡而以令遵與姊及書劵安美同情共盜俱棄市人知其寃府帥李從敏令妻來朝懼事發令内地彌縫侍御史趙都嫉惡論奏明宗驚怒下鎮州委副使符蒙按問果得事實自親吏髙知柔及判官行軍司馬及通貨僧人婦人皆棄市惟從敏初欲削官停任中官哀祈竟罰一季俸議者以受賂曲法殺人而八議之所不及失刑也安重誨誅後王貴妃用事故也因事納諫馮道對太子食有邪蒿師傅以其名邪令去之况人事乎上退問羣臣邪蒿之義范延光對無名之役不急之務且宜罷之自安重誨伏誅而宦者孟漢瓊連宫掖之勢居中用事人皆憚之因宰臣奏對延光等深言邪蒿春冰虎尾之戒欲驚悟上意也上聖體乖和馮道對寢膳之間動思調衞因指御前果實曰如食桃不康翌日見李而思戒可也初上因御李暴得風虛之疾馮道不敢斥言因奏事諷悟上意秦王輕佻秦王重榮之為元帥輕佻淺露狎近浮薄列坐將帥而與判官論詩未躋大位而許人禍福由是中外忌憚竟及誅敗上聞重榮伏誅悲駭㡬落御榻氣絶復蘇者再由是不豫轉増以至晏駕自云我今日自作劉窟頭也沈徽曲江吟温顗附吳興沈徽乃温庭筠諸甥也嘗言其舅善鼓琴吹笛亦云有絃即彈有孔即吹不獨柯亭爨桐也制曲江吟十調善雜畫每理髮則思來輙罷櫛而綴文也有温顗者乃飛卿之孫憲之子仕蜀官至常侍無他能唯以隱僻繪事為克紹也中間出官旋游臨邛欲以此獻於州牧為謁者拒之然温氏之先貌陋時號鍾馗顗之子郢魁形克肖其祖亦以姦􅁾而流之姜誌認父姜誌許昌人自小亂離失其父母爾後仕蜀至武信軍節度使先是廐中圉人姜春者事之多年頻罹鞭朴一旦告老于國夫人請免馬廐之役而丐食於道路夫人愍之詰其鄉貫姻親兼云有一子隨軍入川莫知存亡其小字身上記驗一一述之果誌之父也洎父子相認悲號殞絶誌乃授父杖俾笞其背以償昔日所誤之事舉國嗟歎之此事川蜀皆知王氏子知前生唐四方館王鄑尚書自西京亂離挈家入蜀㳂嘉陵江下至利州百堂寺前其弟年七嵗忽云我曽有經一卷藏在此寺石龕内因令家人相隨訪獲之木梳亦存寺僧曰此我童子也較其所夭之年與王氏之子所生之嵗果騐也其前生父母尚存及長仕蜀官至令録數任即王鄂近聞殁於雅斜往往靈語説事如平生又言我為隂官云云即記前生不誣也舒溥三斥三遇舒溥者萬州人粗解書記事前恩州刺史李希元往廣州謁嗣薛王歸裝甚豐于時蜀兵部毛文晏侍郎宣徽宋光葆開府前陵州王洪使君皆未宦達舒子竊資而奉之爾後三人繼登顯秩而恃此階縁多行無禮於恩牧因笞而遣之始依陵州王洪奏授井研令尋為王公所鄙次依宋開府亦以不恭見棄轉薦於嘉牧顧珣珣承奉貴近誤奏為團練判官賜緋轉員外郎未久失意復疎之俾其入貢仍假一表希除畿邑實要斥逺之邸吏知意表竟不行淹留經年乃經唐陳狀只望本分入貢之恩澤之相庭其北靣因依莫測本末優與擬議轉檢校工部郎中所謂三斥三遇也愚甞覽吳武陵為李吉甫相所誤致及第因𩔖而附之于何博士髙諷附于何博士相國駙馬悰之子仕蜀至五縳無他才俊止以貴公子享俸禄而已恥其官卑詣執政陳啓自述門閥其末云昔年入貢在花樹韋吏部先徳之前即韋莊相也今日通班在新津馮長官小男之後即少常鋭也執政愍而慰之有髙諷者自云太尉諸孫覉旅三川而多忤物每歎歉求官不遂徧告人曰何不還我羅城來葢以掌武所築蜀人安之其疎濶皆如此也韋巽尫鈍周仁矩附韋巽大尉昭度之子也尫懦蒙鈍率由婢嫗仕蜀先主以其事舊優容之以至卿監或為同列所譏云三公門前出死狗巽曰死狗門前出三公又能酬酢也周仁矩者即蜀相庠之子為駙馬都尉有才藻而庸劣國亡後與貧丐者為伍俾一人先道爵里於市肆酒坊之間人有哀者日獲三二百錢與其徒飲噉而已成都人皆嗟歎之中令忍欲王彦章附唐鳳翔李曮令公收蜀充饋運使於蜀城東門外下營魏王與郭侍中入居蜀宫玉帛子女他人無復見矣中令寂寞無以遣適潁川陳昭符仕蜀累剖竹符早在歧山微有階縁而得候謁因求一美人以獻之有蕭夫人者乃蜀先主之寵愛也曽賜與鳳翔歸降指揮使王胡忘其名賜名丞弇王胡乃歧王賜姓連彥字卒後蕭氏寡而無子其容態明悟國人具聞陳致媒氏誘之而獻抱衾之夕中令於忩隙中窺之歎其妍妙乃詰所來左右方以王胡為對中令止之曰王胡背恩投蜀誠不可容然其向來吾之子姪矣此事不可遽令約迴時有知者皆重中令少年而忍欲復禮誠貴達人難事潁川每為愚話之周彥章本姓王以軍功為金吾衞使後主采選宫妓王有女甚美因命内人欲選入宫王乃按劒曰某是先皇令與周氏作義男本姓王為衆所聞也豈有王氏女而事王氏乎因召左右小軍將無婦者以女衣襟結之便為夫妻爾後國變王乃領兵於大安樓前脅後主誅君側韓昭等即其事也何見鬼王蜀時閬州人何奎不知何術而言事甚效既非卜相人號何見鬼蜀之近貴咸神之鬻銀之肆有患白癩者傳於兩世矣何見之謂曰爾所苦我知之矣我為嫁娉少環釧釵箆之屬爾能致之乎即所苦立愈矣白癩者欣然許之因謂曰爾家必有他人舊功徳或供養之具存焉亡者之魂無依故遣為此􅑂但去之必瘳也患者歸視功徳堂内本無他物忖思久之老母曰佛前紗忩乃重圍時他人之物曽取而置之得非此乎遽令撤去仍脩齋懺其疾遂痊竟受其鐶釧之贈何生未遇不汲汲於官宦末年祈於大官自布衣除興元少尹金紫兼妻邑號子亦賜緋不之任便歸閬州而卒預知死期也雖術數通神而名器逾分識者知後主之政悉此𩔖也孫􅆑齋嘉州夾江縣人孫雄人號孫􅆑齋其言事亦何奎之流偽蜀主歸命時内官宋愈昭將軍數員舊與孫相善亦神其術將赴洛都咸問其將來昇沈孫俛首曰諸官記之此去無災無福但行及野狐泉已來税駕處曰孫雄非聖人耶此際新舊使頭皆不見矣諸官皆疑之爾後量其行邁合在咸京左右後主罹偽詔之禍莊宗遇鄴都之變所謂新舊使頭皆不得見之驗也愚同席備見説故記之馮見鬼遂寧有馮見鬼忘其名似有所睹知人吉凶潁川陳絢為武信軍留後而劉令公知俊交替摭其舊事叠有奏論馮生謂潁川曰府主雖號元戎前無旌節所引殆不久乎幸勿憂也未踰嵗而彭城伏誅有官人林泳者本閩人也甞謂僚友曰安有生人而終日見鬼乎無聽其妖馮聞之甚不平或一日對衆謂之曰閣下為官多不克終葢曽殺一女人為祟以公禄夀未盡莫致其便我能言其姓名公信之乎於是慚懼言誠於馮生許為解其寃也他皆𩔖此休公真率沙門貫休鍾離人也風騷之外精於筆劄舉止真率誠髙人也然不曉時事往往詆訐朝賢他亦不知已之是􅁘非􅁘荆州成中令問其筆法非􅁘休公曰此事湏登壇而授非草草而言成令銜之乃遽於黔中因病以鶴詩寄意曰見説氣清邪不入不知爾病自何來以詩見意也馮涓大夫有大名於人間淪落於蜀自比杜工部意謂他人無出其右休公初至蜀先謁韋書記莊而長樂公後至遂與相見欣然撫掌曰我與你阿叔有分長樂怒而拂袖他日謁之竟不逢迎乃曰此阿師似我禮拜也自是頻投刺字終為閽者所拒休公謂韋公曰我得得為渠入蜀何意見怪道門杜先生亦以此疎之國清寺律僧嘗許具蒿脯未得間姜侍中宅有齋律僧先在焉休公次至未揖主人大貎乃拍手謂律僧曰乃蒿餅子何在其他皆此𩔖通衢徒步行嚼果子未甞跨馬時人甚重之異乎廣宣栖白之流也北夢瑣言二十卷富春孫光憲纂集唐末後梁後唐石晉時事此書乃武林忻悦學家藏陜刋舊本今歸成芥庵夏隱君中間刋誤舛訛如日曰纂簒歡歎雖難關闕禍福等字可以意改餘不敢强以俟别本訂之至正二十四年嵗次甲辰五月七日寫起至二十七日庚寅輟卷華亭在家道人孫道明識于泗北村居映雪齋時年六十又八也連日梅雨時雨西南二鄉皆成巨浸豐年未卜今日喜晴聊書記耳丙辰五月侍疾於家因假琴川書屋所藏吳方山抄本核過吳本元缺第二十卷此本不知從何得也二十六日小暑節葉石君識北夢瑣言卷二十
