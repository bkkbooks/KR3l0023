body:
  text: 北夢瑣言卷六唐孫光憲撰吳湘事劉漢宏附唐李紳性剛直在中書與李衛公相善為朋黨者切齒鎮淮海日吳湘為江都尉時有零落衣冠顔氏女寄寓廣陵有容色相國欲納之吳湘强委禽焉於是大怒因其婚娶時財聘甚豐乃羅織執勘准其俸料之外有陳設之具坐贓奏而殺之懲無禮也宣宗初在民間備知其屈登極後與二李不叶者導而進狀訴寃衛公以此出官朱崖路由澧州謂寄寓朝士曰李二十誤我也馬植曾為衛公所忌出為外任吳湘之事鞫於憲臺扶風時為中憲得行其志焉吳湘乃澧州人顔尋歸澧陽孀獨而終舊説浙東難理十分公事紳相曉得五六唯劉漢宏曉得七分其他亷使及三四而已蓋公之才難得也已裴相生於于闐國事雙峯禪師文如海道士附唐裴相公休留心釋氏精於禪律師圭峯密禪師得達摩頓門密師注法界觀禪詮皆相國撰序常被毳衲於歌妓院持鉢乞食自言曰不為俗情所染可以説法為人每發願世世為國王宏䕶佛法後于闐國王生一子手文有相國姓字聞於中朝其子弟欲迎之彼國勅㫖不允也雙峯禪師聚徒千人談𤣥之盛無能及也一旦惑於民女而敗道焉是知淫為大罰信矣相國李公蔚始與師善為致一宰而已道士文如海注莊子文詞浩博懇求一尉與夫湯惠休廖廣宣㫖趣共卑也惜哉韋氏女配劉謙事丞相韋公宙出鎮南海有小將劉謙者職級甚卑氣宇殊異乃以從猶女妻之其内以非我族類慮招物議諷諸幕寮請諫止之丞相曰此人非常流也他日吾子孫或可依之謙以軍功拜封州刺史韋夫人生子曰𨼆曰巖𨼆為廣帥巖嗣之奄有嶺表四府之地自建號曰漢改名龑在位經二紀而終次子嗣即京兆知人之鑒非謬也田布尚書傳唐通義相國崔魏公鉉之鎮淮揚也盧丞相耽罷浙西張郎中鐸罷常州俱過維揚謁魏公公以暇日與二客私欵方奕有持狀報女巫與田布尚書偕至泊逆旅某亭者公以神之至也甚異之俄而復曰顯驗與他巫異請改舍於都候之􅅟署公乃趣召巫者至至乃與神遇拜曰謝相公公曰何謝神曰布有不肖子黷貨無厭郡事不治當犯大辟賴相公隂徳免焉使布之家廟血食不絶者公之恩也公矍然曰異哉某之為相也未嘗以機密損益於家人忽一日夏州節度使奏銀州刺史田鐬犯贓罪私造鎧甲以易市邊馬布帛帝赫然怒曰贓罪自别議且委以邊州所宜防盜以甲資敵非反而何命中書以法論將盡赤其族翌日從容謂上曰鐬贓罪自有憲章然是宏正之孫田布之子宏正首以河朔請一作詣朝覲奉吏員布亦繼一作然父之欵布㑹征淮西繼以忠孝伏劒而死今若行法論罪以固邊圉未若因事宏貸激勸忠烈上意乃解止黜授逺郡司馬而某未嘗一出口於親戚私昵已將忘之今神之言正是其事乃命廊下表而見焉公謂之曰君以義烈而死奈何區區為愚婦人所使乎神憮然曰某常負此嫗八十萬錢今方忍耻而償之乃宿債爾公與二客及監軍使幕下共償其未足代付之自言事不驗神乃辭去梁相國李公琪傳其事且曰嗟乎英特之士負一女子之債死且如是而況於負國之大債乎竊君之禄而不報盜君之柄而不忠豈一作宜其未得聞於斯論耶一作也而崔相國出入將相殆三十年也宜哉李太尉請脩狄梁公廟事李徳裕太尉未出學院盛有詞藻而不樂應舉吉甫相俾親表勉之掌武曰好騾馬不入行由是以品子叙官也吉甫相與武相元衡同列事多不叶每退公詞色不懌掌武啟白曰此出之何難乃請脩狄梁公廟於是武相漸求出鎮智計已聞於早成矣愚曽覽太尉三朝獻替録真可謂英才竟罹朋黨亦獨秀之所致也同昌公主事宣宗希兾遐齡無儲嗣宰臣多有忤㫖者懿宗藩邸常懷危慄後郭美人誕育一女未踰月卒適值懿皇傷憂之際皇女忽言得活登極後鍾愛之封同昌公主降韋保衡恩澤無比因有疾湯藥不效而殞醫官韓宗昭康守商等數家皆族誅劉相國瞻上諫懿皇不聴懿皇嘗幸左軍見觀音像陷地四尺問左右對曰陛下中國之天子菩薩即邊地之道人上悦之冦入京郭妃不及奔赴行在乞食於都城時人乃嗟之同昌公主奢華事見蘇鶚杜陽雜編侯昌業表唐自廣明後閹人擅權置南北廢置使軍容田令孜有回天之力中外側目而王仙芝黄巢剽掠江淮朝廷憂之左拾遺侯昌業上䟽極言時病留中不出命於仗内戮之後有傳侯昌業䟽詞不合事體其末云請開揭諦道塲以消兵厲似為庸僧偽作也必若侯昌業以此識見犯上宜其死也李常侍遇道術隴西李涪常侍福相之子質氣古淡一作泊光化中與諸朝士避地梁川小貂日㳺鄰寺以散鬱陶寺僧有爽公者因與小貂相識每晨他出或赴齋請茍小貂在寺即不扄鏁其房請其宴息久而彌篤乃曰李常侍在寺爭忍闔扉乎或一日從容謂小貂曰世有黄白之術信乎好之乎貂曰某雖未嘗留心安敢不信又安敢輙好僧曰貧道之每拂曙出寺為脩功徳因縁也仰常侍徳豈敢秘惜小貂辭遜再三竟得其術爾後最受三峯胡相國及崔相恩知每遇二公載誕之辰乃獻銀藥盂子此外雖家屢空終不自奉亦不傳於子孫遂平宰李璩乃嫡孫也嘗為愚話之廣成杜光庭先生常云未有不脩道而希得仙術茍得之必致禍矣唯名行謹潔者往往得之即李貂之謂也陸相公勸酒事朱進士酒狂東臯子劉虚白附陸相扆出典夷陵時有士子脩謁相國與之從容因命酒勸此子辭曰天性不飲酒相國曰誠如所言已校五分矣蓋平生悔吝若有十分不為酒困自然減半也朱秀才慶餘遂寧府人舉進士有楊貴妃别明皇賦最佳然狂於酒隴州防禦使鞏咸乃蜀將也朱生以鄉人下第謁之鞏亦使酒新鑄一劒乃曰如何得一漢試之朱便引頸俄而身首異處惜哉死非其所即陸公之戲誠哉善言也東臯子王勣字無功有杜康廟碑醉鄉記備言酒徳竟陵人劉虚白擢進士第嗜酒有詩云知道醉鄉無户税任他荒却下丹田世之嗜酒者茍為孔門之徒得無違吿誡乎裴鄭立襄王事唐僖宗再幸梁洋朱玫立襄王宰相蕭遘裴澈鄭匡圖等同奉之洎破偽主而僖皇反正裴鄭等皆罹大辟始具兵衛四圍矛槊森然裴相猶戲曰天子之牆數仞也蕭遘相就河中賜毒握之在手自以主上舊恩希貶降久而毒爛其手竟飲之而終田軍容檄韋太尉唐太尉韋公昭度舊族名人位非忝竊而沙門僧澈承恩為人潛結中禁京兆與一二時相皆因之大拜悟達國師知元乃澈之師也嘗鄙之諸相在西川行在每謁悟達皆申跪禮國師揖之請於僧澈處喫茶後掌武伐成都田軍容致檄書曰伏以太尉相國頃因和尚方始登庸在中書則開鋪賣官居翰苑則借人把筆蓋謂此也朱李驟進唐李師望乃諸宗屬也自負才術欲以方面為己任因旅游邛蜀備知南蠻之勇怯遂上書希割西川數州於臨邛郡建定邊軍節度詔㫖允之乃自鳳翔少尹擢領此任于時西川大將嫉其分裂巡屬乃隂通一作致意南詔於是蠻軍為近界鄉豪所導侵軼蜀川元戎竇滂不能遏截師望亦尋受貶黜隴西又云因任華陽捕賊光化中朱朴自毛詩博士登庸恃其口辯可以立致太平由藩邸引導聞於昭宗遂有此拜對敭之日面陳時事數條每言臣為陛下致之洎操大柄無以施展自是恩澤日衰中外騰沸内優曰俳優穆刀陵作念經行者至御一作獅前曰若是朱相即是非相翌日出官時人曰拔士為相自古有也君子一作此不恥其言之不出恥躬之不逮況唐末䘮亂天下阻兵雖負奇才不能謀畫而朱公一儒生以區區辯給欲整其亂祗自取辱焉涓縷未申而教樂僮吹篳篥甚為識者所責也李羣玉輕薄事韋沆李璩附唐李羣玉校書字文山澧州人有詩名散逸不樂應舉親友强之一上而已嘗受知於相國河東裴公休為其延譽因進詩授𢎞文館校書終於荆襄間然多狎酒徒疑其為張祜之流李少逢善夷謫官澧陽備知其行止因為紀之乃清介髙節之人非輕率之士疑為同人所謗或曰曽為荆之幕下假書題謁澧吏艾使君李謂艾侯曰小子困甚幸使君痛救之州將以一作戒其輕脱所濟不厚也又近年京兆韋沆者衣纓舊族亦攻古文流落不偶而没於世隴西李璩乃福相之曽孫也常宰襄州鄉樂縣京兆僑于是邑常來干擾李亦祗奉不厭一旦謂李宰曰客有相勉且求一邑以救饑寒室人聞之大怒曰人喚郎為長官即得喚我作長官夫人即不可隴西聞而鄙薄亦笑亦怒也以歌詞自娛蜀相韋莊晉相和凝附先是李逺以曽有詩云人事三盃酒流年一局棊唐宣宗以其非牧人之才不與郡守宰相為言然始俞允蜀相韋莊應舉時遇黄冦犯闕著秦婦吟一篇内一聯云内庫燒為錦繡灰天街踏盡公卿骨爾後公卿亦多垂訝莊乃諱之時人號秦婦吟秀才他日撰家戒内不許垂秦婦吟障子以此止謗亦無及也晉相和凝少年時好為曲子詞布於汴洛洎入相專託人収拾焚毁不暇然相國厚重有徳終為艶詞玷之契丹入夷門號為曲子相公所謂好事不出門惡事行千里士君子得不戒之乎又云長日唯消一局棊兩存之劉蜕奏令狐相宣宗以政事委相國令狐公君臣道契人無間然劉舍人每訐其短密奏之宣宗留中但以其事規於相國而不言其人姓名其間以丞相子拔解就試疏略云號曰無解進士其實有耳未聞云云又以子弟納財賄疏云白日之下見金而不見人云云丞相憾之乃俾一人為其書吏謹事之紫㣲託以腹心都不疑慮乃為一經業舉人致名第受賂十萬為此吏所吿由是貶之君子曰彭城公將欲律人先須潔已安有自負贓汚而發人之短乎宜其不躋大位也先是令狐相自以單族每欲繁其宗黨與崔盧抗衡凡是富家率皆引進皇籍有不得官者欲進狀請改姓令狐時以此少之陸龜蒙追贈薛許州附唐吳郡陸龜蒙字魯望舊名族也其父賔虞進士甲科浙東從事侍御史家于蘇臺龜蒙㓜精六籍弱冠攻文與顔蕘皮日休羅𨼆吳融為益友性髙潔家貧思養親之禄與張博為吳興廬江二郡倅著吳興實録四十卷松陵集十卷笠澤叢書五卷丞相李公蔚盧公攜景重之羅給事寄陸龜蒙詩云龍樓李丞相昔嵗仰髙文黄閣今無主青山竟不焚蓋嘗有徵聘之意唐末以左拾遺授之詔下之日疾終光化三年贈右補闕吳侍郎融傳貽史右補闕韋莊撰誄文相國陸希聲撰碑文給事中顔蕘書皮日休博士為詩皮冦死浙中方干詩名著於吳中陸未許之一旦頓作詩五十首裝為方干新製時輩吟賞降仰陸謂曰此乃下官效方干之作也方詩在模範中爾奇意精識者亦然之薛許州能以詩道為己任還劉徳仁卷有詩云百首如一首卷初如卷終譏劉不能變態乃陸之比也顔給事墓銘顔給事蕘謫官没於湖外嘗自草墓誌性躁急不能容物其誌詞云寓于東吳與吳郡陸龜蒙為詩論之交一紀無踰龜蒙卒為其就木至穴情禮不缺其後即故諫議大夫髙公丞之故丞相陸公扆二君於蕘至死不變其餘面交皆如攜手過市見利即解攜而去莫我知也復有吏部尚書薛公貽矩兵部侍郎于公兢中書舍人鄭公撰三君子者余今日已前不變不知異日見余骨肉孤㓜復如何哉李磎行狀梁補闕附司空圖侍郎撰李公磎行狀以公有出倫之才為時輩妬忌罹於非横其平生著文有百家著諸心要文集三十卷品流誌五卷易之心要三卷注論語一部明無為上下二一作三篇義説一篇倉卒之辰焚於賊火時人無所聞也惜哉陽春白雪世人寡和豈虚言也葆光子曰唐代韓愈栁宗元洎李翺李觀皇甫湜數君子之文陵轢荀孟穅秕顔謝其所宗仰者唯梁浩補闕而已乃諸人之龜鑑而梁之聲采寂寂豈陽春白雪之流乎是知俗譽喧喧者宜鑒其濫吹也白太傅墓誌盧鄭二相附白太傅與元相國友善以詩道著名時號元白其集内有詩輓元相云相看掩淚俱無語别後傷心事豈知想得咸陽原上樹已抽三丈白楊枝洎自撰墓誌云與彭城劉夢得為詩友殊不言元公時人疑其隙終也鄭文公畋與盧相攜親表也閥閲相齊詞學相均同在中書因公事不叶揮霍間言語相擠詬不覺硯瓦翻潑謂宰相鬭擊亦不然也竟以此出官矣内官改創職事竇給事附古者閹官擅權專制者多矣其間不無忠孝亦存簡編唐自安史已來兵難薦臻天子播越親衛戎柄皆付大閹魚朝恩竇文塲乃其魁也爾後置左右軍十二衛觀軍容處置樞密宣徽四院使擬於四相也十六宫使皆宦者為之分卿寺之職以權為班行備員而已供奉官紫綬入侍後軍容使楊復恭俾其襴笏宣導自𢎞農改作也嚴遵美内謁之最良也嘗典戎唐末致仕居蜀郡鄙叟庸夫時得親狎其子仕蜀至閤門使曾為一僧致紫袈裟僧來感謝書記所謝之語於掌中方屬炎天手汗模糊文字莫辨折腰一作行膝而趨汗流喘乏只云伏以軍容寂無所道抵掌視之良久云貌寢人微凡事無能嚴公曰不敢退而大咍嚴公物故蜀朝册贈命給事中竇雍堅不承命雖偏霸之世亦不茍且士人多之羅顧升降方干附唐羅給事𨼆顧博士雲俱受知於相國令狐公顧雖鹺商之子而風韻詳整羅亦錢塘人鄉音乖剌相國子弟每有宴㑹顧獨與之丰韻談諧莫辨其寒素之士也顧文賦為時所稱而切於成名嘗有啟事陳於所知只望丙科盡處竟列名於尾株之前也令狐召學士話於梁震先輩愚於梁公處聞之羅既頻不得意未免怨望竟為貴子弟所排契濶東歸黄冦事平朝賢議欲召之韋貽範沮之曰某曽與之同舟而載雖未相識舟人吿云此有朝官羅曰是何朝官我腳夾筆可以敵得數輩必若登科通籍吾徒為秕穅也由是不果召詩人方干亦吳人也王龜大夫重之既延入内乃連下兩拜亞相安詳以答之未起間方又致一拜時號方三拜也李琪書樹葉梁李相國琪唐末以文學策名仕至御史昭宗播遷衣冠蕩析因與𢎞農楊玢藏跡於荆楚間楊即􅑴蜀琪相盤桓於夷道之清江自晦其迹號華原李長官其堂兄光符宰宜都嘗厭薄之琪相寂寞每臨流踞石摘樹葉而試草制詞吁嗟怏悵而投於水中梁祖受禪徵入拜翰林學士尋登廊廟爾後宜都之子彬羇旅渚宫因省相國乃數厥父之所短而遣之矣杜荀鶴入翰林平曽賈島附唐杜荀鶴嘗游梁獻太祖詩三十章皆易曉也因厚遇之洎受禪拜翰林學士五日而卒朱崖李太尉奬拔寒俊至於掌誥率用子弟乃曰以其諳練故事以濟緩急也如京兆者一篇一詠而已經國大手非其所能幸而殂逝免貽伊恥也制貶平曽賈島以其僻澀之才無所采用皆此類也樂工關小紅石潨附唐昭宗刼遷百官蕩析名娼伎兒皆為强諸侯有之供奉彈琵琶樂工號關别駕小紅者小名也梁太祖求之既至謂曰爾解彈陽下采桑乎關伶俛而奏之及出又為親近者俾其彈而送酒由是失意不久而殂復有琵琶石潨者號石司馬自言早為相國令狐公見賞俾與諸子渙湚連水邊作名也亂後入蜀不𨽻樂籍多㳺諸大官家皆以賓客待之一日㑹軍校數員飲酒石潨以胡琴擅塲在坐非别音者諠譁語笑殊不傾聴潨乃撲槽而詬曰某曽為中朝宰相供奉今日與健兒彈而不蒙我聽何其苦哉于時識者亦歎訝之䘮亂以來冠履顛倒不幸之事何可勝道豈獨賤伶云乎哉孫内子蕭惟香附唐樂安孫氏進士孟昌期之内子善為詩一旦併焚其集以為才思非婦人之事自是專以婦道内治孫有代夫詩贈人白蠟燭曰景勝銀釭香比蘭一作自古清香勝蕙蘭一條白玉逼人寒他時紫禁春風夜醉草天書仔細看又聞琴詩曰玉指朱絃軋復清湘妃愁怨最難聴初疑颯颯凉風動又似蕭蕭暮雨零近若流泉來碧嶂逺如𤣥鶴下青㝠夜深彈罷堪惆悵霧濕叢蘭月滿庭又代謝崔家郎君酒詩曰謝將清酒寄愁人澄澈甘香氣味真好是緑窓明月夜一盃摇蕩滿懷春又台州盤􅀈村有一婦人蕭惟香有才思未嫁於所居牕下與進士王元宴相對因奔瑯琊復淫冶不禁王舍於逆旅而去遂私接行客託身無所自經而死店有數百首詩所謂才思非婦人之事誠然也哉聞於劉山甫北夢瑣言卷六
