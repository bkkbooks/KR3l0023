body:
  text: 北夢瑣言卷九唐孫光憲撰孟宏微躁妄唐孟宏微郎中誕妄不拘宣宗朝因次對曰陛下何以不知有臣不以文字召用上怒曰卿何人斯朕耳全不知有卿翌日上謂宰臣曰此人躁妄欲求翰林學士大容易哉於是宰臣歸中書貶其官示小懲也又嘗忿狷擠其弟落井外議喧然乃致書吿親友曰懸身井半風言沸騰尺水丈波古今常事與鄭諷鄰居諷為南海從事因墻頽中郎一作郎中夾入牆界五六尺一作丈知宅者有狀請退其所侵判其狀曰海隅從事少有生還地勢尖斜打牆夾入平生操履率皆如是不遭擯棄幸矣楊收相報楊元价唐楊相國收貶死嶺外于時鄭愚尚書鎮南海忽一日客將報云楊相公在客次欲見鄭尚書八座驚駭以𢎞農近有後命安得此來乃接延之楊相國曰某為軍容使楊元价所譖不幸遭害今已得請於上帝賜隂兵以復仇欲托尚書宴犒兼借錢十萬緡滎陽諾之唯錢辭以軍府事多許其半楊相曰非銅錢也燒時幸勿著地滎陽曰若此則固得遵副從容間長揖而滅滎陽令於北郊具酒饌素錢以祭之楊相猶子有典壽陽者見相國乗白馬臂朱弓撚彤矢有朱衣天吏控馬謂之曰上帝許我讐殺楊元价我射著其腳必死也俄而抄本有一中字楊中尉暴染腳疾而殂蜀毛文錫司徒先德前潮一作湖牧龜範曾趨事鄭尚書熟詳其事愚於毛氏子聞之劉山甫題天王唐彭城劉山甫中朝士族也其先宦於嶺外侍從北歸泊船於青草湖登岸見有北方毘沙門天王因詣之見廟宇摧頽香燈不續山甫少年而有才思元隨張處權請郎君詠之乃題詩曰壞牆風雨幾經春草色盈庭一座塵自是神明無感應盛衰何得卻由人是夜夢為天王所責自云我非天王南嶽神也主張此池一作地汝何相侮俄而驚覺而風浪斗起倒檣絶纜沈溺在即遽起悔過令撤詩牌然後已山甫自序韋宰相功徳騐陳㣲附蜀路白衛嶺多虎豹噬人有選人京兆韋亡其名唐光化中調授巴南宰常念金剛經赴任至泥溪遇一女人著緋衣挈二子偕行同登此山前路嶺頭行人相駐叫譟見此女人乃赤貍大蟲也逡巡與韋分路而去韋終不覺蓋持經之力也成都府廣都縣人陳微自少年常誦金剛經與胥姓馬者有隙一旦事故亡匿馬生揚言欲追捕之陳乃礪一匕首行坐相隨儻遇馬生必能刺之誓不受其執録一作僇字或一日行於村路蓊薈間馬胥伏而掩之陳抽刀一揮馬生仰倒由是獲脱至前方悟手之所揮乃刀鞘及歸所匿處刀刃宛在本不偕行馬胥亦無所傷何其異也刺血寫經僧唐咸通中西川僧法進刺血寫經聚衆教化寺所司申報髙燕公判云斷臂既是凶人刺血必非善事貝多葉上不許塵埃俗子身中豈堪腥膩宜令出境無得惑人與一繩遞出東界所司不喻繩文賜錢一千送出東郭幸而誤免後卒於荆州玉泉寺成令公擲杯珓事荆州成令公汭唐天復中准詔統軍救援江夏舟楫之盛近代罕聞已決行期不聴諫諍師次公安縣寺有二金剛神土人號曰二聖亦甚有靈中令艤舟而謁之炷香䖍誠冥禱勝負以求杯珓隂陽之兆凡三十擲皆不吉乃謂所信孔目官楊師厚曰卦之不吉如之何師厚對曰令公數年造船旌旗已啟中路而退將何面目回見軍民於是不得已而進竟有破陣之敗身死家破非偶然也向使楊子察人之情幸其意怠一言而止則成氏滅亡未可知也白蓮女惑蘇昌逺唐中和中有士人蘇昌遠居蘇臺屬邑有小莊去官道十里吳中水鄉率多荷芰忽見一女郎素衣紅臉容質絶麗閲其明悟若神仙中人自是與之相狎以莊為幽會之所蘇生惑之既甚嘗以玉環贈之結殷勤或一日見檻前白蓮花開敷榮殊異俯而翫之見花房中有物細視之乃所贈玉環也因折之其妖遂絶鬼神無形必憑於物精氣所附非菡萏之能哉聞於劉山甫栁鵬舉誘五絃妓唐龍紀中有士人栁鵬舉遊杭州避雨於伍相廟見一女子抱五絃云是錢大夫家女僕鵬舉悦之遂誘而奔藏於舟中為廂吏所捕其女僕自縊而死或一日卻到栁處栁亦知其物故驚訝其來女僕具道其情因以魂偶一作謁經時而去見劉山甫閒談中雲芳子魂事李茵僖宗幸蜀年有進士李茵襄州人奔竄南山民家見一宫娥自云宫中侍書家雲芳子有才思與李同行詣蜀具述宫中之事兼曾有詩書紅葉上流出御溝中即此姬也行及綿州逢内官田大夫識之乃曰書家何得在此逼令上馬與之前去李甚怏悵無可一作以奈何宫娥與李情愛至深至前驛自縊而死其魂追及李生具道憶戀之意迨數年李茵病瘠有道士言其面有邪氣雲芳子自陳人鬼殊途吿辭而去聞於劉山甫芻靈祟唐文徳中小京官張忘其名寓蘇臺子弟少年時在丈人陸評事院往來為一美人所悦來往多時心疑之尋病瘠遇開元觀吳道士守元曰子有不祥之氣授以一符果一冥器婢子背書紅英字在空舍柱穴中因焚之其妖乃絶聞於劉山甫髙燕公神筆淮海小將姓朱忘其名有女未嫁為鬼物所祟常呼韓郎往來如生人唯不見形奉外舅姑禮自云天朝神朱以異事不敢𨼆秘乃吿府主髙燕公公唯書名俾朱歸帖於女房門上其邪來見咨嗟言别而去聞於劉山甫魚𤣥機徐月英附唐女道魚𤣥機字蕙蘭甚有才思咸通中為李億補闕執箕帚後愛衰下山𨽻咸宜觀為女道士有怨李公詩曰易求無價寳難得有心郎又云蕙蘭銷歇歸春浦楊栁東西伴客舟自是縱懷乃娼婦也竟以殺侍婢為京兆尹温璋殺之有集行於世江淮間有徐月英亦娼者其送人詩云惆悵人間事久違兩人同去一人歸生憎平望亭前水忍照鴛鴦相背飛一本又有云枕前淚與階前雨隔箇閒牕滴到明亦有詩集金陵徐氏諸公子寵一營妓卒乃焚之月英送葬謂徐公曰此娘平生風流没亦帶焰時號美戲也唐末有北里誌其間即孫尚書儲數賢平康狎游之事或云孫棨舍人所撰李氏女唐廣明中黄巢犯闕大駕幸蜀衣冠蕩析冦盜縱横有西班李將軍女奔波隨人迤邐達興元骨肉分散無所依托適值鳳翔奏將軍董司馬者乃晦其門閥以身托之而性甚明敏善於承奉得至於蜀尋訪親眷知在行朝始謂董生曰䘮亂之中女弱不能自濟幸蒙提挈以至於此失身之事非不幸也人各有偶難為偕老請自此辭董生驚愕遂下其山矣識者謂女子之智亦足稱也見劉山甫閒談馮藻慕名唐馮藻常侍肅之子涓之叔父世有科名小貂文采不髙酷愛名第已十五舉有相識道士謂曰先輩某曽入靖觀之此生無名第但有官職也亦未之信更應十舉已二十五舉矣姻親勸令罷舉且謀官職藻曰譬如一生無成更誓五舉亦無成遂三十舉方就仕歴官卿監峽牧終於騎省何浮名之引人而輕禄仕之如是也李涪尚書改切韻唐李涪尚書福相之子以開元禮及第亦一作不為小文好著述朝廷重其博學禮樂之事諮禀之時人號為周禮庫蓋籍於舊典也廣明以前切韻多用吳音而清青之字不必分用涪改切韻一有其上聲全刋吳音當方進而聞於宰相僉許之無何巢冦犯闕因而寢止于今無人敢以聲韻措懷也然曾見韻銓鄙駮切韻改正吳音亦甚覈當不知八座於此又何䂓製也惜哉古之製字卷紙題名姓號曰名紙大中年薛保遜為舉塲頭角人皆體傚方作門狀洎後仍以所懷列於啟事隨啟詣公相門號為門狀門啟雖繁於名紙各便於時也書云謹祗候起居郎某官即是起居在前某官在後至今顛倒無人改更矣有朝廷改之亦美事也穆李非命唐監察李航福相之子美茂洽暢播於時流黄巢後扶侍聖善歸東都别墅與御史穆延晦同行宿於虢州公館翌日脩謁郡牧張存即王拱下部將也謂典客曰我受穆家恩命今穆侍御經過必須展分報答也典客詣館話於穆生因修狀謁謝張公大怒且曰此言得自何人具以典謁為對乃斬謁者穆生驚怪失意歸館尋遣人就而害之李監察不喻方抱憂惶俄亦遇害將以滅口于時李公遶聖善所憩之牀無以求活竟同非命他日兄弟訴寃夢航謂骨肉間曰張存已得請於上帝不日即死果為拱所誅葆光子嘗讀李肇國史補曰李公沂曾放死囚他日道次遇之其人感恩延歸其家與妻議所酬之物妻嫌數少此人曰酬物少不如殺之李公急走遇俠士方免此禍常以為虚誕今張存翻害穆李即史補之説信非虚誕也怪哉王給事剛鯁唐王祝給事名家子以剛鯁自任仍以所尚垂訓子孫嫌人柔弱一作懦又素有物力殖利極豐黄冦前嘗典常州京國亂離盤旋江湖甚有時望急詔徵回歸裝極厚水陸分載行至甘棠王拱帥于是邦不式王命兇暴衆聞以夕拜將來必居廊廟延奉勤至夕拜鄙其武人殊不降接拱乃於内㕔盛張宴席備列珍翫簾下妓樂齊列其内子亦映簾共拱立乃斂容向夕拜曰某雖武夫叨忝旄鉞今日多幸獲遇軒蓋經過不棄末宗願居子姪之列即榮幸也夕拜不允堅抗再三拱勃然作色曰給事王程有限不敢淹留俄而罷宴處分兩轄速請王給事離館暗授意㫖並令害之一家上下悉投黄河獲其囊三四百籠以舟行没溺聞奏朝廷多故舍而不問夕拜有一子此際行至襄州無故投井而卒雖陜帥狂暴亦未喻天意也葆光子曰剛有立事時有用舍以柔濟剛不爽權變當衰亂之世須適時之宜王公儻受其致敬庸何傷哉但卻其賂即善也履尾滅族悲夫裴楊操尚唐楊収段文昌皆以孤進貴為宰相率愛奢侈楊相女適裴坦長子嫁資豐厚什器多用金銀坦尚儉聞之不樂一日與國號及兒女輩到新婦院臺上用碟盛果實坦欣然視碟子内乃卧魚犀遽推倒茶臺拂袖而出乃曰破我家也他日収相果以納賂竟至不令宜哉出腹不生養盧侍郎盧氏衣冠第一歴代未嘗知舉乾符中盧攜在中書歉宗人無掌文柄乃擢羣從陜虢觀察使盧渥知禮闈是嵗十二月黄巢犯闕僖皇播遷舉子星散迨収復京都裴贄連知三舉渥有羨色趙崇大夫戲之曰閤下所謂出腹不生養主司也一本無養字張興師決門僧唐相國張濬二子一曰義師即小字也本名格為蜀相一曰興師忘其名後號李將軍名儼與父達軍機於淮海亦遇害也格與興師昆弟俊邁而尚矯譎皆有父風興師㓜年出宅門見其門僧忘其名傳相國處分七笞之其僧邂逅莫知何罪俄而相國召僧坐安見其詞色不懌因問之僧以郎君傳相國處分見怪未知罪名相國驚駭慚謝以兒子狂駭幸師慈悲回至堂前喚興師怒責之且曰汝見僧何罪而敢造次對曰今日雖無罪過想其向來𨼆惡不少是以笞之相國不覺失笑此卷第十九條載陜虢觀察使盧渥與八卷陜州亷使盧沆事同疑沆渥自是一人孫氏偶不照而重出耳北夢瑣言卷九
