  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0023_WYG_008-1a, image: WYG1036/WYG1036-0056a.png}
body:
  text: 北夢瑣言卷八唐孫光憲撰李太尉與段少常書唐李太尉德裕左降至朱崖著四十九論叙平生所志嘗遺段少常成式書曰自到崖州幸且頑健居人多養雞往往飛入官舍今且作祝雞翁爾謹狀吉甫相典忠州泝流之任行次秭歸地名雲居臺在江中掌武誕於此處小名臺郎以其地而命名也孫僕射酹酒裴迪附唐孫㑹宗僕射即偓相大王父也宅中集内外親表開宴有一甥姪聞朝官後至及中門見緋衣官人衣襟前皆是酒汚咄咄而出不相識洎即席説與主人咸訝無此官沈思之乃是行酒時於堦上酹酒草草傾潑也自此每酹酒側身恭跪一酹而已自孫氏始也今人三酹非也有裴迪者贄相之堂弟無文學於荆南投筆事趙司徒為虞緫小將對客側身一酹趙公未喻朝賢間風規極怪之笞七下何不幸也二朝士以名取戲唐張裼尚書朝望既髙號為流品與韋相保衡有分韋言於同列以其名裼裼訓袒衣也又詩云載衣之裼裼即小兒褓衣乃綳帶也方欲因事改之未幾韋相流貶竟不大拜韋嘗問立名之由裼以少孤為無學問親表所誤也後唐姚相名洎善談吐仍多辯㨗表兄弟崔沂侍郎戲之曰洎訓肉汁胡為名洎無以酬之然洎亦訓至雖然古人以名貽誚者多矣妨事者有焉至如仙客仙童齊丘用礪希斆人過亦無取焉其複名須依義訓唯單名易諱者善矣裼公生五子彛憲文蔚知名文蔚後登庸也張仁龜隂責唐張裼尚書典晉州外貯所愛營妓生一子其内子蘇氏號塵外妬忌不敢取歸乃與所善張處士為子居江津間常致書題問其存亡資以錢帛及漸成長教其讀書有人吿以非處士之子爾父在朝官髙因竊其父與處士緘劄不吿而遁歸京國裼公已薨至宅門僮僕無有識者但云江淮郎君兄弟皆愕然其嫡母蘇夫人塵外泣而謂諸子曰誠有此子吾知之矣我少年無端致其父子死生永隔我罪多矣家眷聚泣取入宅齒諸兄弟之列名仁龜有文性好學脩詞應進士舉及第歴侍御史因奉使江浙於候館自經而死莫知所為先是張處士悵恨而終必有㝠訴罹此禍也柱史為楊鉅侍郎愛壻也裴相國及第後進業唐相國裴公恒太和八年李漢侍郎下及第自以舉業未精遽此叨忝未嘗曲謝座主辭歸鄠縣别墅三年肄業不入城嵗時恩地唯啟狀而已至於同年鄰於謝絶掩關勤苦文格乃變然始到京重獻恩門文章詞采典麗舉朝稱之後至大拜為時名相也夫世之干禄先資名第既得之後鮮不替懈自非篤於文學省顧賔實者安能及斯裴公廟堂之期有以見進徳之無斁也侯泳忤豆盧相唐咸通中舉子侯泳有聲采亦士流也而闕於恭慎豆盧琢罷相守僕射乗閒詣僧院放僕乗他適而於僧宇獨坐皤然一叟也泳自外入門殊不顧揖傲岸據榻謂叟曰大參長史乎叟曰非也又問曰令録乎亦曰非也逺州刺史乎亦曰稍髙又曰少卿監乎答曰更向上侯生矍然不安處疑是丞郎怱遽而出至門見僕御肩輿旋至方知是豆盧公也歸去後自咎悚惕貢一長牋首過賴先曽有卷投獻閽者通入泳乃自陳乖疎公亦遜謝恕其不相識也留而命酒凡勸十盂乃小懲也仍云雖不奉訝然凡事更宜在意侯生仍慚灼無以自容先是豆盧家昆弟飲清酒而已侯氏盛饌而飲此日每飲一杯迴首摘席經咀之幾不濟所謂雅責也盧沆遇宣宗私行賈島附唐陜州亷使盧沆在舉場甚有時稱曽於滻水逆旅遇宣宗皇帝微行意其貴人斂身迴避帝揖與相見沆乃自稱進士盧沆帝請詩卷袖之乗驢而去他日對大臣語及盧沆令主司擢第沆不自安恐僭冒之辱宰臣問沆與王上有何階縁沆乃具陳因由時亦不訝以其文章非叨忝也沆後自亷察入朝知舉遇黄冦犯闕不及終場趙崇大夫戲之曰出腹不生養主司也初盧家未嘗知舉盧相攜恥之拔為主文竟不果也賈島遇宣宗微行問秀才名對曰賈島帝曰久聞詩名島曰何以知之後言於宰臣與平曽相次謫授長江尉所謂不識貴人也顧非熊再生唐著作郎顧況字逋翁好輕侮朝士貶在江外多與僧道交游時居茅山暮年有一子即非熊前身也一旦暴亡況追悼哀切所不忍言乃吟曰老人䘮愛子日暮泣成血老人年七十不作多時别非熊在㝠間聞之甚悲憶遂以情吿㝠官皆憫之遂商量卻令生於況家三嵗能言㝠間聞父苦吟卻求再生之事歴歴然長成應舉擢進士第或有朝士問即垂泣而言之王定保摭言云人傳況父子皆有所遇不知所適由此而言信有之矣張曙起小悼唐張禕侍郎朝望甚髙有愛姬早逝悼念不已因入朝未回其猶子右補闕曙才俊風流因増大阮之悲乃製浣溪紗其詞曰枕障薰爐隔繡幃二年終日兩相思好風明月始應知天上人間何處去舊歡新夢覺來時黄昏微雨畫簾垂置於几上大阮朝退憑几無聊忽睹此詩不覺哀慟乃曰必是阿灰所作阿灰即中諫小字也然於風教還亦不可以其叔姪年顔相似恕之可耳諺曰小舅小叔相追相逐謔戲固不免也張裼尚書無忌諱唐張裼尚書恃才直道外仍有至性及第後歸東都一日髣髴見其亡親謂曰去得也遂辦裝入京果登朝籍不爽隂吿也東都柏坡有莊而多髙大屋宇中庭有土堆若冡人言其下時有樂聲本主鬻之不售八座不信以善價買之遽令發掘其下乃麥麴耳以之和泥塗一院牆屋不假他求是知妖由人興向使疑誤神怪則有物憑焉必為村巫酒食之資也正直之人其可欺乎荆十三娘義俠事進士趙中行家於温州以豪俠為事至蘇州旅止支山禪院僧房有一女商荆十三娘為亡夫設大祥齋因慕一作日暮趙遂同載歸揚州趙以氣耗荆之財殊不介意其友人李正朗第一作郎弟三十九愛一妓為其父母奪與諸葛殷李悵恨不已時諸葛殷與吕用之幻惑髙太尉恣行威福李懼禍飲泣而已偶話於荆娘荆娘亦憤惋謂李三十九郎曰此小事我能為郎報讐但請過江於潤州北固山六月六日正午時待我李依之至期荆氏以囊盛妓兼致妓之父母首歸於李後與趙進士同入浙中不知所止李當尚書亡女魂唐李當尚書鎮興元褒城縣有處士陳休復者號陳七子狎於博徒行止非常八座以其妖誕械之於市井之間又有一休復無何殞於狴牢遽睹腐敗轄司申而瘞之爾後宛在褒城八座驚異不敢尋問一旦愛女暴亡其内子追悼成疾無以救療幕客有白八座曰陳處士真道者必有少君之術能祈之乎八座然之因敬信延召陳生曰此小事爾於初夜帷堂設燈炬畫作一門請夫人簾下屏氣至夜分亡者自畫門入堂中行數遭夫人愊臆失聲而哭亡魂倏而滅矣然後戒勉令其抑割八座由是益敬之北夢瑣言卷八
