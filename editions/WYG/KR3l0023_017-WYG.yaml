body:
  text: 北夢瑣言卷十七唐孫光憲撰梁祖為傭保梁祖宋州碭山縣午溝里人本名温賜名全忠建國後改名晃家世為儒祖信父誠皆以教授為業誠蚤卒有三子俱幼母王氏攜養寄於同縣人劉崇家昆弟之中唯温狡猾無行崇母撫養之崇弟兄甞加譴杖一日偷崇家釜而竄為崇追回崇母遮䕶以免朴責善逐走鹿往往及而獲之又崇母常見其有龍蛇之異他日與仲兄存入黄巢中作賊伯兄昱與母王氏尚依劉家温既辭去不知存亡及温領鎮於汴盛飾輿馬使人迎母於崇家王氏皇恐辭避深藏不之信謂人曰朱三落拓無行何處作賊送死焉能自致富貴汴帥非吾子也使者具陳離鄉去里之由歸國立功之事王氏方泣而信是日與崇母並迎歸汴温盛禮郊迎人士改觀崇以舊恩位至列卿為商州刺史王氏以温貴封晉國太夫人仲兄存於賊中為矢石所中而卒温致酒於母歡甚語及家事謂母曰朱五經辛苦業儒不登一命今有子為節度使無忝先人矣母不懌良久謂温曰汝致身及此信謂英特行義未必如先人朱二與汝同入賊軍身死蠻徼孤男稚女艱食無告汝未有恤孤之心英特即有諸無取也温垂涕謝罪即令召諸兄子皆至汴友倫皆立軍功位至方鎮梁祖張夫人梁祖魏國夫人張氏碭山富室女父㽔曽為宋州刺史温時聞張有姿色私心傾慕有麗華之歎及温在同州得張於兵間因以婦禮納之温以其宿欵深加敬異張賢明有禮温雖虎狼其心亦所景伏每軍謀國計必先延訪或已出師中途有所不可張氏一介請旋如期而至其信重如此初収兗鄆得朱瑾妻温告之云彼既無依寓於輜車張氏遣人召之瑾妻再拜張氏荅拜泣下謂之曰兗鄆與司空同姓之國昆仲之間以小故尋戈致吾姒如此設不幸汴州失守妾亦似吾姒之今日也又泣下乃度為尼張恒給其費張既卒繼寵者非人及僭號後大縱朋淫骨肉聚麀帷薄荒􅁾以致友珪之禍起於婦人始能以柔婉之徳制豺虎之心如張氏者不亦賢乎朱邪先代河東李克用其先回紇部人世為蕃中大酋受唐朝官職太宗於北方沙陁磧立沙陁府以招集降戸後克用祖朱邪執宜與其父曽依吐蕃背吐蕃歸朝徳宗於鹽州置隂山府以執宜為都督後遷於神武川黄花堆之别墅即今應州是也執宜生赤心以討徐州龎勛功賜國姓并名號李國昌懿宗問其先世所出云本隴西金城人依寓吐蕃帝曰我先與汝同鄉里勅令編籍鄭王房始為雲州大同軍節度次授鄜延振武代北三節度其姪克讓為羽林將軍其子克用最聞名以破黄巢功為太原節度使子存朂平梁蜀奄有中原追尊執宜號懿祖國昌號獻祖克用號太祖皇帝太祖在姙十三月載誕之夕母后甚危令族人市藥於雁門遇神人教以率部人被介持旄擊鉦鼓躍馬大譟環所居三周而止果如所教而生是日紅一作虹光燭室白氣充庭井水暴溢及能言喜道軍旅年十二三能連射雙鳥至於樹葉針鋒馬鞭皆能中之曽於新城北以酒酹毗沙門塑像請與僕交談天王被甲持矛隱隱出於壁間或所居帳内時如火聚如有龍形人皆異之甞隨獻祖征龎勛軍陣出没如神號為飛虎子眇一目時號獨眼龍功業磊落不可盡述或云睛邪非眇也親王拜蕃侯唐乾寧中鳳翔李茂貞華州韓建邠州王行瑜擁兵脅君誅戮宰輔焚燒宫闕初帝西幸鳳翔昭宗出居石門莎城太原克用領蕃漢馬步入京三鎮大懼是年破邠州斬王行瑜昭宗嘉奬倚賴命延王丕丹王允賫詔賜李公衣服兼令二親王設拜以兄事之近古未有也仍封晉王以寵之延王才識過人聦悟辯慧在晉陽留宴累月每獻酬樂作必為晉王起舞後為韓建所殺李習吉溺黄河太原李克用自渭北班師次河西縣王珂於冰上搆浮航公渡浮航馬足陷橋李習吉從馬軼墜河習吉抱冰舟人拯之獲免王珂懼公謂曰公之於吾非機橋者何嫌之有李諫議有聞於時則不吾知也置酒笑樂而罷習吉右相林甫之後應舉不第黄巢後游於河東攝榆次令李公辟為掌記牋檄之捷無出其右梁祖每讀河東書檄嘉歎其才顧敬翔曰李公計絶一隅何幸有此人如鄙夫之智算得習吉之才筆如虎之得翼也其見重如此周式抗梁祖梁祖陷邢州𦙍軍攻王鎔于常山趙之賔佐有周式者性慷慨有口才謂王鎔曰事急矣速決所向式願為行人即出見之梁祖曰王公朋附并汾違盟爽信弊賦已及於此期於無舍式曰明公為唐室之桓文當以禮義而成霸業王氏今降心納質願脩舊好明公乃欲窮兵黷武殘滅同盟天下其謂公何梁祖笑引式袂謂之曰與公戲耳鎔即送牛酒幣貨數萬犒汴軍仍令其子入質於汴因而解圍近代之魯仲連也宦官隂謀唐昭宗以宦官怙權驕恣難制常有誅翦之意宰相崔允嫉忌尤甚上勅允凡有密奏當進囊封勿於便殿啓奏以是宦者不之察韓全誨等乃訪京城美婦人數十以進求宫中隂事天子不之悟允謀漸泄中官以重賂甘言請藩臣以為城社視崔允眥裂時因伏臘讌聚則相向流涕辭㫖訣别㑹汴人冦同華知崔允之謀於是韓全誨引禁軍陳伏兵逼帝幸鳳翔他日崔允與梁祖叶謀以誅閹宦未久禍亦及之庚午絶滅識者歸罪於崔允先是其季父安潛甞謂親知曰滅吾族者必緇兒也緇兒即允小字河東晉王李克用聞允所為謂賔友曰助賊為虐者其崔允乎破國亡家必在此人也晉王上源驛遇難晉王李克用妻劉夫人常隨軍行至於軍機多所宏益先是汴州上源驛有變晉王憤恨欲回軍攻之夫人曰公為國討賊而以杯酒私忿必若攻城即曲在於我不如回師自有朝廷可以論列於是班退天復中周徳威為汴軍所敗三軍潰散汴軍乗我晉王危懼與周徳威議欲出保雲州夫人曰存信本北方牧羊兒也焉顧成敗王常笑王行瑜棄城失勢被人屠割今復欲效之何也王頃嵗避難達靼㡬遭陷害賴遇朝廷多事方得復歸今一旦出城便有不測之變焉能逺及此晉王止行居數日亡散之士復集軍城安定夫人之力也劉鄩忠于舊主王師範之鎮青州以部將劉鄩竊據兗州先是汴將葛從周鎮於是邦因出征劉鄩將圖兗也詐為茶商苞苴鎧甲大起店肆剖巨木藏兵伏而入竊發之日得其徒千人據其府舍升堂拜從周之母仍以禮待其妻子子弟職掌妻孥供億如常俄而從周攻其城梯䡴雲合鄩以板輿請從周母登城諭從周曰劉將軍待我不異於兒新婦已下並不失所從周在城下歔欷即時退舍及青州兵敗師範納欵梁祖遣使諭鄩鄩曰臣知王公脩好與梁國通盟但臣本受王公之命保有州城一旦見其勢窮擅命不顧非盡心於所事也僕俟王公之命俛首非晩至是師範諭之方以城歸梁祖多其義超擢非次官至方鎮為梁之名將駮昭宗諡號昭宗先諡聖穆景文孝皇帝廟號昭宗起居郎蘇楷等駮議請改為恭靈莊閔皇帝廟號襄宗蘇楷禮部尚書蘇循之子乾寧二年應進士楷人才寢陋兼無才行昭宗惡其濫進率先黜落由是怨望專幸邦國之災其父循姦邪附㑹無譽於時故希㫖茍進梁祖識其險詖滋不悦時為敬翔李振所鄙梁祖建號詔曰蘇楷髙貽休蕭聞禮皆人才寢陋不可塵汚班行並停見任放歸田里蘇循可令致仕河朔人士目蘇楷為衣冠土梟晉世子入覲賜鸂􅈑酒器莊宗年十一從晉王討王行瑜初令入覲獻捷昭宗一見駭異之曰此子有竒表乃撫其背曰我兒將來之國棟勿忘忠孝於吾家乃賜鸂􅈑酒巵翡翠盤十三讀春秋略知大義騎射絶倫其心豁如采録善言聽納容物殆劉聦之比也又云昭宗曰此子可亞其父時人號曰亞子鄴王偷江東詩鄴王羅紹威喜文學好儒士每命幕客作四方書檄小不稱㫖壊裂抵棄自劈牋起草下筆成文又癖於七言詩江東有羅隱為錢鏐客紹威申南阮之敬隱以所著文章詩賦酬寄紹威大傾慕之乃目其所為詩集曰偷江東今鄴中人士多有諷誦魏博衙軍魏博富雄列侯專地唐朝三百年唯姑息之羅紹威憤衙軍制已密聞梁祖表裏應接算殺之楊師厚後入魏城揖出羅周翰因而代之師厚卒梁以賀徳倫領鎮分其土宇創立相貝為節鎮減其力用三軍作亂脅持徳倫背梁歸晉其狀詞云屈原哀郢本非怨望之人樂毅辭燕且異傾邪之行晉王覽狀擁兵親臨先數張彦脅主虐民罪而斬之便以張彦親軍五百人帶甲持仗環馬而行晉王寛衣緩帶略無猜間衆心大服他日資魏博兵力稱健竟平河南也衙軍自羅紹威殺戮後又迫脅賀徳倫復擁兵持趙在禮天成初赴行在于時又殺三千家乃世襲兇惡也縛驢戴旗晉王之入魏博劉鄩先屯洹水寂若無人因令覘之云城上有旗幟來往晉王曰劉鄩一步一計未可輕進更令審探果縛芻為人揷一作縛旗於上以驢負之循堞而行故旗幟嬰城不息問城中羸老者曰軍去已二日矣果趨黄澤欲冦太原以霖潦不克進其計謀如是北夢瑣言卷十七
