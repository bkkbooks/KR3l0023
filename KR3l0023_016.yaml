body:
  text: 北夢瑣言卷十六唐孫光憲撰以酒致禍梁祖圖霸之初夀州刺史江彥溫以郡歸我乃遣親吏張從晦勞其勤而從晦無賴酒酣有飲徒何藏耀者與之偕甚昵每事誤稟從晦致命于郡彥溫大張樂邀不至乃與藏耀食于主將家彥溫果疑恐曰汴王謀我矣不然何使者之如是也乃殺其主將連誅數十人而以狀白其事既而又疑懼曰訴其腹心亡我族矣乃自縊而死梁祖大怒按其事腰斬從晦留藏耀裂其禁械斬於夀春市葆光子曰後唐明宗皇帝時董璋據東川將有跋扈之心于時遣客省使李仁矩出使梓潼仁矩本節使下小校驟居內職性好狎邪元戎張筵託以寒熱召之不至乃與營妓曲宴璋聞説甚怒索馬詣館遽欲害之仁矩鞹足端簡門迎璋怒稍解他日作叛兩川舉兵並由仁矩獻謀於安重誨之所致也蜀使洪飲梁太祖初兼四鎮先主遣押衙潘岏持聘岏飲酒一石不亂每攀宴飲禮容益莊梁祖愛之飲酣梁祖曰押衙能飲一盤器物乎岏曰不敢乃簇在席器皿次第注酌岏並飲之岏愈溫克梁祖謂其歸館多應傾瀉困卧俾人偵之岏簪筍籜冠子稱所得酒器滌而藏之他日又遣押衙鄭頊持聘梁祖問以劒閣道路頊極言危峻梁祖曰賢主人可以過得頊對曰若不上聞恐誤令公軍機梁祖大笑此亦近代使令之美者也朱瑾殺兄朱瑾之據兖州梁祖攻之未克其從父兄齊州刺史瓊先降與瓊同詣壁下以曉之瑾乃遣都虞候胡規出獻欵曰兄已降願貸瑾不死請以鎮委吏既而啓延夀門陳牌印于笥曰兄來請先奉此梁祖命瓊受之葛從周疑詐選勇士孫少迪等仗劒以馭瓊曰彼力屈不足疑瓊進前受印籥瑾單馬曰兄獨來密語耳始相及瑾令驍卒董懷進勾曵瓊墜馬乃發所匿刃殺瓊勾曵突出牽入之須臾城上鼓譟擲瓊首於埤也我軍失色梁祖哀慟久之斬軍謀徐厚署瓊弟玭為齊州防禦使恩禮殊厚瑾竟棄城投揚州馬景設詐梁祖宿兵岐下以迎昭宗敵壘尚堅旦思班退親從指揮使髙季昌抗言曰天下雄傑窺此舉者一載矣今姦黨已窘更少俟之季昌乃密募人入岐為告事者有騎卒馬景應命因朱友倫總騎軍且一作因至將大出兵迓景請其時給駿駟雜所出隊中十許里躍馬西逸叩岐闉以軍怨東遁為告且言列寨留卒尚方俟夕將逝宜速掩之當落我機內矣失是往也決無生理願録其妻孥梁祖悽然止其行景固請乃徇之明日軍出諸寨屏匿如無人不十里果風騎卻走岐人納之不失厥料岐軍啓兩扉悉衆來我師宿已秣馬飽士中軍一鼓百營俱進大破岐軍十不存三四焉李茂貞喪膽昭宗降詔還京始遂奉迎矣功歸髙公而馬景妻孥倍加軫恤且解揚以守正而忠不顧其身也馬景以死命行詐非圖身也人之難事唯景有之朱延夀妻王烈女宣州田頵夀州朱延夀將舉軍以背楊行密請杜荀鶴持箋詣淮都俄而事泄行密悉兵攻宛陵延夀飛騎以赴俱為淮軍所殺延夀之將行也其室王氏勉延夀曰願日致一介以寧所懷一日介不致王氏曰事可知矣乃部分家僮悉授兵器遽闔州中之扉而捕騎已至不得入遂集家僮私阜帑發百燎廬舍州廨焚之急而稽首上告曰妾誓不以皎然之軀為仇者所辱乃投火而死古之烈女無以過也木星入斗唐乾符中荆州節度使晉公王鐸後為諸道都統時木星入南斗數夕不退晉公觀之問諸知星者吉凶安在咸曰金火土犯斗即為災唯木當應為福耳咸或然之時有術士邊岡洞曉天文精通厯數謂晉公曰唯斗帝王之宫宿唯木為福神當以帝王占之然則非福於今必當有驗於後未敢言之他日晉公屏左右密問岡曰木星入斗帝王之兆木在斗中朱字也識者言唐世嘗有緋衣之讖或言將來革運或姓裴或姓牛以為裴字為緋衣牛字著人即朱也所以裴晉公度牛相國僧孺每罹此謗李衛公斥周秦行紀乃斯事也安知鍾於碭山之朱乎木中異文梁開平中潞州軍前李思安奏壺關縣庶穰鄉人因伐樹倒分為兩片內有六字皆如左書曰天十四載石進乃圖其狀以獻仍付史館爾後唐莊宗皇帝自晉王登位以為應之中間石氏自并門受國稱首朝湖南馬希範解釋此字表聞焉薛貽矩畫讚梁相國薛貽矩名家子擢進士第在唐至御史大夫先是南班官忌與北司交通天復中翦戮閹官貽矩嘗與韓全誨等作寫真讚悉紀於內侍省屋壁間坐是謫官他日齎唐帝命禪于梁仕至宰相舂磨寨黃巢自長安遁歸與其衆屯於陳蔡間溵河下寨連絡號八山營于時蔡州秦宗權懼巢以城降之時既飢乏野無所掠唯捕人為食肉盡繼之以骨或碓搗或磑磨咸用充飢天軍四合巢軍不利其黨駭散頻為雷電大雨淹浸其營乃與妻孥昆弟奔於泰山狼虎谷為外甥林言斬首送徐州時溥下禆將李師鋭函首送成都行在也梁祖脫難梁祖親征鄆州軍次衛南時築新壘土工畢因登眺其上見飛鳥止於峻堞之間而噪其聲甚厲副使李璠曰是烏鳥也將有不如意之事其前軍朱友裕為朱瑄掩撲拔軍南去我軍不知因北行遇朱瑄軍來迎一作趂梁祖策馬南走入村落間為賊所迫前有溝坑頗極深廣倉一作匆遽之際忽見溝內蜀黍稈積以為道正在馬前遂騰躍而過因獲免焉副使李璠都將髙行思為賊所殺張歸宇為殿騎授戈力戰僅得生還被十四五箭乃知衛南之烏先見之驗也梁祖夢丁會丁會為昭義節帥常懼梁祖雄猜疑忌功臣忽謂敬翔曰吾夢丁會在前祗候吾將乘馬欲出圉人以馬就臺忽為丁會跨之以出時夢中怒叱喝數聲因驚覺甚惡之是月丁會舉潞州軍民歸河東矣殿棟折墜梁祖末年多行誅戮一夕寢殿大棟忽墜於御榻之上初聞土落於寢帳上乃驚覺久之又聞有小木墜於帳頂間遂矍然下牀未出殿門其棟乃墜遲明召諸王近臣令觀之夜來驚危幾不相見由是君臣相泣又曰驚憂之時如有人引頭於寢閣門內云裏面莫有人否所以匆忙奔起得非宫殿神乎他日又遊於大內西九曲池泛鷁舟於池上忽聞傾側上墮於池中宫嬪并內侍從官並躍入池扶策登岸移時方安爾後發痼疾竟罹其子郢王友圭弒逆之禍舟傾棟折非佳事也梁祖圍棗強事梁祖末年用軍不利河北數鎮不順其命一旦躁撓堅要親征師次深州界遂令楊師厚分兵攻棗強縣半浹旬方拔其壘是邑也池湟堅牢人心獷悍晝夜攻擊以至疲竭既陷之日無少長皆屠之時有一百姓來投軍中李周彛收於部伍間乃謂周彛曰請一劒願先登以收其城未許間忽然抽茶擔子揮擊周彛頭上中簷幾仆于地左右乃擒之原是棗強城中遣來令詐降本意欲窺弄梁軍招討使楊師厚斯人不能辨誤中周彛是知河朔之民勇徑如此仇殷召課梁司天監仇殷術數精妙每見吉凶不敢明言稍關逆耳祕而不説往往罰俸蓋懼梁祖之好殺也梁自昭義失守符道昭就擒柏一作百下同鄉不利王景仁大敗皆為太原節使嗣晉王李存朂之所挫也方懷子孫之憂唯柏鄉狼狽亦自咎云違犯天道不取仇殷之言也北夢瑣言卷十六
