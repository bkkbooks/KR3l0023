body:
  text: 北夢瑣言卷十唐孫光憲撰狄右丞鄙著紫僧僧鸞附唐狄歸昌右丞愛與僧遊每誦前輩詩云因過竹院逢僧話略得浮生半日間其有服紫袈裟者乃疏之鄭谷郎中亦愛僧用比蜀茶乃曰蜀茶與僧未必皆美不欲舍之僧鸞有逸才而不拘檢早嵗稱卿御謁薛氏能尚書於嘉州八座以其顛率難為舉子乃俾出家自於百尺大像前披剃不肯師於常僧也後入京為文章供奉賜紫栁玭大夫甚愛其才租庸張相亦曾加敬盛言其大用由是反初號鮮于鳳修刺謁栁公公鄙之不接又謁張相張相亦拒之於是失望而為李鋋江西判官後為西班小將軍竟於黃州遇害張翺輕傲李堅白蔣貽恭附唐乾寧中宿州刺史陳璠以軍旅出身擅行威斷進士張翶恃才傲物席上調璠寵妓張小泰怒而揖起付吏責其無禮狀云有張翺兮寓止淮隂來綺席兮放恣胸襟璠益怒云據此分析合喫幾下翺云只此兩句合喫乎三下五下切求一笑宜費乎千金萬金金鞭響背十三長逝惜其恃才而取禍也出劉山甫間談詞多不載蜀綿州刺史李忘其名時號嗑咀以軍功致郡符好賔客有酒徒李堅白者粗有文筆李侯謂曰足下何以名為堅白對曰莫要改為士元亮君雄是權耶又有蔣貽恭者好嘲詠頻以此痛遭檟楚竟不能改蜀中士子好著襪頭袴蔣謂之曰仁賢既裹將仕郎頭為何作散子蔣腳他皆類此蔣生雖嗜嘲咏然談笑儒雅凡遭譏刺皆輕薄之徒以此縉紳中咸惡之近聞官至令佐而卒斯亦幸矣劉李愚甥唐劉瞻相公有清德大名與弟阿初皆得道已入仙傳先婚李氏生一子即劉贊也相國薨後贊且孤幼性甚懵一作魯鈍教其讀書終不記憶其舅即李殷衡侍郎也以劉氏之門一作子不可無後常加楚箠終不長進李夫人慈念不忍苦之歎其宿分也一旦不告他適無以訪尋聖善憶念淚如綆縻莫審其存亡數年方歸子母團聚且曰因入嵩山遇一白衣叟謂曰與汝開心將來必保聰明自是日誦一卷兼有文藻擢進士第梁時登朝充崇政院學士預時俊之流其渭陽李侍郎充使番禺為越王劉氏所縻為廣相而薨僕與劉贊猶子慤通熟自言家世合有一人得道矣即白衣叟其髣佛乎李鵬遇桑道茂唐盛唐縣令李鵬遇桑道茂曰長官只此一邑而已賢郎二人大者位極人臣次者殆於數鎮子孫百氏後如其言長男名石出將入相子孫兩世及第至今無間次即諱福揚歷七鎮終於使相凡八男三人及第至尚書給諫郡牧見有諸孫皆朱紫不墜士風何先見之妙如是孔侍郎借油衣唐孔拯侍郎作遺補時朝回遇雨不齎油衣乃避雨於坊叟之廡下滂注愈甚已過食時民家意其朝飢延入廳事俄有一叟烏帽紗巾而出迎候甚恭因備酒饌一一精珍乃公侯家不若也孔公慚謝之且借油衣叟曰某寒不出熱不出風不出雨不出未嘗置油衣然已令鋪上取去可以供借也孔公賞羡不覺頓忘宦情他日説於僚友為大隱之美也古之富者擬於封君洪範五福一曰富先賢以無事當貴豈斯人之徒耶復有一丞郎馬上內逼急詣一空宅徑登溷軒斯乃大優穆刀綾空屋也優忽至丞郎慚謝之優曰侍郎他日內逼但請光訪人聞之莫不絶倒前賢戲調唐裴晉公度風貌不揚自撰真讚云爾身不長爾貌不揚胡為而將胡為而相幕下從事遜以美之且曰明公以內相為優公笑曰諸賢好信謙也幕僚皆悚而退李洸者渤海人昆仲皆有文章洸因旅次至江村宿於民家見覆斗上安錫佛一軀洸詭詞以贊之民曰偶未慶贊為去僧院地逺爾洸曰何必須僧只我而已民信之明發隨分具齋餐炷香虔誠洸俯仰朗稱曰錫鑞佛子柔軟世尊斗上莊嚴為有十升功德念摩訶般若波羅密又趙璘員外為裴坦相漢南從事璘甚陋裴公戲之曰趙公本不醜孩抱時乳母憐惜往往撫弄云作醜子作醜子因此一定趙公大咍薛侍郎昭緯氣貌昏濁杜紫微脣厚溫庭筠號溫鍾馗一作夔不稱才名也薛侍郎未登第前就肆買鞋鞋主曰秀士腳第幾對曰與昭緯作腳來未曾與立行第也杜德祥侍郎昆弟力困要舉息利錢濟急用召同坊富民到宅且問曰子本對是幾錢其人拂袖而出又孔昭緯拜官教坊優伶繼至各求利市石野豬獨先行到公有所賜謂曰宅中甚闕不得厚致若有諸野豬幸勿言也復有一伶繼來公索其笛喚近階指笛竅問之曰何者是浣溪紗孔籠子笛伶大笑之又道士陳子霄登華山上方偶有顛仆宇文翰郎中致書戲之曰不知上得不得且怪玄之又玄斯皆清賢雅戲以之羣居又何傷也京兆府鴉挽鈴唐溫璋為京兆尹勇於殺戮京邑憚之時聞挽鈴聲俾看架下不見有人凡三度挽掣乃見鴉一隻尹曰是必有人探其雛而訴寃也命吏隨鴉所在捕之其鴉盤旋引吏至城外樹間果有人探其雛尚憩樹下吏乃執之送府以禽鳥訴寃事異於常乃斃捕雛者而報之天帝召棊客唐僖宗朝翰林待詔滑能棊品甚髙少逢敵手有一張小子年僅十四來謁覔棊請饒一路滑生棊思甚遲沈吟良久方下一子張生隨手應之都不介意仍於庭際取適候滑生更下又隨手著應之一旦黃冦犯闕僖宗幸蜀滑以待詔供職謀赴行在欲取金州路入辦裝挈家將行張生曰不必前邁某非棊客天帝命我取公著棊請指揮家事滑生驚愕妻子啜泣奄然而逝他日京都共知也昔顔回卜商為地下修文郎又李長吉為帝召撰樂府豈斯類耶所言天帝者非北極天皇大帝也按真誥又非北方玄天黑帝道君此鬼都北帝又號鬼帝世人有大功德者北帝得以辟請四明公之流是也召棊之命乃酆宫帝君乎與真誥髣佛故梗槩而言之梁趙意醫醫者意也古人有不因切脈隨知病源者必愈之矣唐崔魏公鎮渚宫有富商船居中夜暴亡逮曉氣猶未絶鄰房有武陵醫士一作工梁新聞之乃與診視曰此乃食毒也三兩日得非外食耶僕夫曰主公少出船亦不食於他人梁新曰尋常嗜食何物僕夫曰好食竹雞每年不下數百隻近買竹雞併將充饌梁新曰竹雞吃半夏必是半夏毒也命搗薑捩汁折齒而灌之由是方蘇崔魏公聞而異之召到衙安慰稱奬資以僕馬錢帛入京致書朝士聲名大振仕至尚醫奉御有一朝士詣之梁奉御曰何不早見示風疾已深矣請速歸處置家事委順而已朝士聞而惶遽告退策馬而歸時有鄜州馬醫趙鄂者新到京都於通衢自榜姓名云攻醫術士此朝士下馬告之趙鄂亦言病已危與梁生所説同矣謂曰只有一法請官人剩吃消梨不限多少時咀齕不及捩汁而飲或希萬一此朝士又策馬歸以書筒質消梨馬上旋齕到家旬日唯喫消梨頓覺爽朗其恙不作卻訪趙生感謝又訪梁奉御具言得趙生教也梁公驚異且曰大國必有一人相繼者遂召趙生資以僕馬錢帛廣為延譽官至太僕卿療疑病元頑博士話唐時中表間有一婦人從夫南中效官曽誤食一蟲常疑之由是成疾頻療不愈京城醫者忘其姓名知其所患乃請主人姨妳中謹密者一人預戒之曰今以藥吐瀉但以盤盂盛之當吐之時但言有一小蝦蟆走去然切勿令娘子知之是誑語也其妳僕遵之此疾永除又説有一年少眼中常見一小鏡子醫工趙卿診之與少年期來晨以魚膾奉候少年及期赴之延於閣子內且令從容俟客退後方得攀接俄而設臺于上施一甌芥醋更無他味卿亦未出逮日一作禺中久候不至少年飢甚且聞醋香不免輕啜之逡巡又啜之覺胸中豁然眼花不見因竭甌啜之趙卿探知方出少年以啜醋慚謝卿曰郎君啜鱠太多非醬醋不快又有魚鱗在胸中所以眼花適來所備醬醋只欲郎君因飢以啜之果愈此疾烹鮮一作鱗之會乃權誑也請退謀餐他妙多斯類也非庸醫所及也凡欲以倉扁之術求食者得不勉之哉非意致禍唐時杜彥林為朝官一日馬驚蹶倒踏鐙既深抽腳不出為馬拖行一步一踏以至于卒古人云乘船走馬去死一分是知跨御常宜介意也杜相審權弟延美亦登朝序乘馬入門為門楣所軋項頸低曲伸脰前引肩髙於頂乃一生之疾也荆州文獻王好馬不惜千金沒世不遇周先帝命內臣李廷玉賜馬與南平王且問所好何馬乃曰良馬千萬無一若駿者即可得而選茍要坐下坦一作且穩免勞控制唯騸庶幾也既免蹄齧不假銜枚兩軍列陳萬騎如一茍未經騸亂氣狡憤介胄在身與馬爭力磬控不暇安能左旋右抽舍轡揮兵乎自是江南蜀馬往往學騸甚便乘跨是知蹀躞者誇於目馴柔者便於身此一作比君子之難逢假翦剔者抑其次也哉崔樞食龍子唐崔樞為小朝官家人於井中汲得一魚樞本好鮮食意是厨人治魚誤落井中乃令烹而啖之忽夢為冥官領過讀判云人間小臣輒食龍子所有官爵並削除後一年卒樞甚有聲不躋顯位誤有所食豈命也夫薛準隂誅唐薛準官至員外郎喪亂後不養繼母盤桓江淮間道門寄榻遊江南至吉州閣皂觀遇修黃籙齋道士升壇行法事準亦就列忽失聲痛叫云中箭速請筆硯口占一詩曰蓋國深恩不易讐又離繼母出他州誰知天怒無因息積惡終身乞命休頃便卒天復辛酉年事斯人也必有隱慝而致隂誅古者史籍皆以至孝繼母聞於列傳蓋以常人難行而已能行即親母可知也豈可以繼母而同行路哉薛死倉卒可用垂戒也崔雍食子肉李紹蘇循附唐咸通中龎勛反於徐州時崔雍典和州為勛所陷執到彭門雍善談笑遜詞以從之冀紓其禍勛亦見待甚厚其子少俊飲博擊拂自得親近更無阻猜雍以失節於賊以門戶為憂謂其子曰汝善狎之或得方便能倳刃乎人皆有死但得其所吾復何恨其子承命密懷利刃忽色變身戰勛疑訝因搜懷袖得匕首焉乃令烹之翌日召雍赴飲一作飯既徹問雍曰肉美乎對曰以味珍且飽勛曰此即賢郎肉也亦命殺之後黃巢入廣州執節度使李紹隨軍至荆州令紹草表述其所懷紹曰某骨肉滿朝世受國恩腕即可斷表終不為尋於江津害之唐宋蘇循尚書諂一作譎媚茍且梁太祖鄙之他日至并門謁晉王時張承業方以匡復為意而循忽獻晉王畫敕筆一對承業愈鄙薄之與夫雍紹為人視蘇循誠逺矣王迪車輾事王迪舍人早負才業未卜騫翔一日謁宰相杜太尉於宅門十字通衢街路稍狹有二牛車東西交至迪馬夾在其間馬驚仆而臥為車轍輾靴鼻踰寸而不傷腳指三日後入拜翰林雖幸而免亦神助也杜孺休種青蓮花唐韓文公愈之甥有種花之異聞於小説杜給事孺休典湖州有染戶家池生青蓮花刺史致書問染工曰我家有三世治靛甕常以蓮子浸於甕底俟經嵗年然後種之若以所種青蓮子為種即為紅矣蓋還本質又何足怪乃以所浸蓮子寄奉之道士田匡圖親看此花為愚話之愚見今一作人以雞糞和土培芍藥花叢其淡紅者悉成深紅染之所言益信矣哉蜀王先主將晏駕其年峨嵋山娑羅花悉開白花又荆州之獻王未薨前數年溝港城隍悉開白蓮花一則染以氣類一則表於凶兆斯又何哉嚴軍容貓犬怪唐左軍容使嚴遵美於閹宦中仁人也自言北司馬一作為供奉官袴衫給事無秉簡入侍之儀又云樞密使廨署三間屋書匱而已亦無視事廳堂狀後貼黃指揮公事乃是楊復恭奪宰相權也自是常思退休一旦發狂手足舞蹈家人咸訝傍有一貓一犬貓謂犬曰軍容改常也顛發也犬曰莫管他從他俄而舞定自驚自笑且異貓犬之言遇昭宗播遷鳯翔乃求致仕梁川一作州蜀軍收降興元因徙於劒南依王先主優待甚異於青城山下卜别墅以居之年過八十而終其忠正謙約與西門季元為季孟也于時誅宦官唯西川不奉詔由是脫禍家有北司治亂記八卷備載閹宦忠佞好惡嘗聞此傳偶未得見即巷伯之流未必俱邪良由南班輕忌太過以致參商蓋邦國之不幸也先是路巖相自成都移鎮渚宫所乘馬忽作人語且曰蘆荻花此花開後路無家不久及禍然畜類之語豈有物憑之乎石言於晉殆斯比也竇家酒炙地唐崇賢竇公家罕有名第璟僕射先人不善治生事力甚困京城內有隙地一段與大閹相鄰閹貴欲之然其地止值五六百千而已竇公欣然以此地奉之殊不言地價乃曰將軍所便不敢奉違某有故欲往江淮上希三兩處護戎緘題其閹喜而致書凡獲三千緡由是幸濟東市有隙地一片窪下渟汙乃以廉值市之俾妳嫗將煎餅盤就彼誘兒童若拋磚瓦中一紙標得一箇餅兒童奔走拋磚瓦博煎餅不久十分填其六七乃以好土填之起一店停波斯日獲一緡他皆效此由是致富延客朝士時皆謂之輕薄號為酒炙地亦能為人求名第酒食聚人亦希利之一端也竇回竇雍無文藝而取名蓋飲啖之力也得於元中凡數賢御史臺記説裴明禮買宅事與竇氏同疑竇效裴之為也李昌符詠婢僕唐咸通中前進士李昌符有詩名久不登第常嵗卷軸怠於裝修因出一奇乃作婢僕詩五十首於公卿間行之有詩云春娘愛上酒家樓不怕歸遲總不留推道那家娘子臥且留教住待梳頭又云不論秋菊與春花個個能噇空肚茶無事莫教頻入庫一名間物要些些諸篇皆中婢僕之諱浹旬京城盛傳其詩篇為妳嫗輩怪罵騰沸盡要摑其面是年登第與夫桃杖虎靴事雖不同用奇即無異也鍾大夫知命丹效唐廣南節度使下元隨軍將鍾大夫忘其名晚年流落旅寓一作於陵州多止佛寺有仁壽縣主簿歐陽術愍其衰老常延待之三伏間患腹疾臥於歐陽之家踰月不食歐主簿慮其旦夕溘然欲陳牒州衙希取鍾公一狀以明行止鍾公曰病即病矣死即未也既此奉煩何妨申報於是聞於官中爾後疾愈葆光子時為郡倅鍾公惠然來訪因問所告之由乃曰曾在湘潭遇干戈不進與同行商人數輩就嶽麓寺設齋寺僧有新合知命丹者且云服此藥後要退即飲海藻湯或大期將至即肋下微痛此丹自下便須指揮家事以俟終焉遂各奉一緡吞一丸他日入蜀至樂溫縣遇同服丹者商人寄寓樂溫得與話舊且説所服之藥大效無何此公來報肋下痛不日其藥果下急區分家事後凡二十日卒某方神其藥用海藻湯下之香水沐浴卻吞之昨來所苦藥且未下所以知未死兼出藥相示然鍾公面色紅潤強飲啖似得藥力也他日不知其所終以其知命有驗故記之成都覺性院有僧合此藥賣之人多服也北夢瑣言卷十
