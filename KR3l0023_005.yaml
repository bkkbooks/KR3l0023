body:
  text: 北夢瑣言卷五唐孫光憲撰令狐公密狀木團頭附唐太和中閹官恣橫因甘露事王涯等皆罹其禍竟未昭雪宣宗即位深抑其權末年嘗授㫖於宰相令狐公公欲盡誅之慮其寃乃密奏榜子曰但有罪莫舍有闕莫填自然無遺類矣後為宦者所見於是南北益相水火洎昭宗末崔侍中得行其志然而一作以玉石俱焚也已乾符後宫娥皆以木團一作圍頭自是四方效之唯內官各自出樣匠人曰斫軍容頭特進頭至是果驗也李逺譏曹唐唐進士曹唐游仙詩才情縹眇嶽陽李逺貟外每吟其詩而思其人一日曹往謁之李倒屣而迎曹生人質充偉李戲之曰昔者未睹標儀將謂可乘鸞鶴此際拜見安知壯水牛亦恐不勝其載時人聞而笑之世謂渾詩逺賦不如不做言其無才藻鄙其無教化也中書蕃人事李肇國史補云貞元末有郎官四人自行軍司馬賜紫而登粉署省中謔之為四君子也唐自大中至咸通白中令入拜相次畢相諴曹相確羅相劭權使相也繼升巖廊崔相慎猷曰可以歸矣近日中書盡是蕃人蓋以畢白曹羅為蕃姓也始蔣伸相登庸李景遜尚書西川覽報狀而歎曰不能伏事斯人也遽託疾離鎮有詩曰成都十萬户拋若一鴻毛亦博陵之比也近代吳融侍郎乃趙崇大夫門生即世日天水歎曰本以畢白待之何乖於所望歉其不大拜也徐相譏成中令唐乾寧中荆南成令公汭曾為僧盜據渚宫尋即真命末年騁辨每事標特初以澧朗舊在巡屬為土豪雷滿所據奏請割𨽻相國徐公彥若在中書不為處置由是銜之相國出鎮番禺路由渚宫成令雖加接延而常怏怏饌後更席而坐詭辨鋒起相國曰令公位尊方面自比桓文雷滿者偏州一夥草賊耳令公不能加兵而怨朝廷乎成公赧焉而屈東海文雅髙談聽之亹亹成令雖甚敬憚猶以嶺外黃茅瘴患者髮落而戲曰黃茅瘴望相公保重相國曰南廣海黃茅瘴不死成和尚蓋譏成令曽為僧也終席慚恥之韋尚書鑒盧相唐大中初盧攜舉進士風貌不揚語亦不正呼攜為彗平聲蓋短舌也韋氏昆弟皆輕侮之獨韋岫尚書加欽謂其昆弟曰盧雖人物甚陋觀其文章有首尾斯人也以是卜之他日必為大用乎爾後盧果䇿名竟登廊廟奬拔京兆至福建觀察使向時輕薄諸弟卒不展分所謂以貌失人者其韋諸季乎薛逢賞王助唐大中初綿州魏城縣人王助舉進士有竒文蜀自李白陳子昻後繼之者乃此侯也嘗撰魏城縣道觀碑詞華典贍於時薛逢牧綿州見而賞之以其邑子延遇因以改名助字次安壯其文類王勃也自幼婦刋建薛使君列銜於碑隂以光其文雖兵亂焚蕩而螭首巋然好事者經過皆稅駕而覽之助後以瞽廢無聞於世賴河東公振發增價而子孫榮之其子朴仕蜀至翰林學士陳陶癖書大中年洪州處士陳陶者有逸才歌詩中似負神仙之術或露王霸之說雖文章之士亦未足憑而以詩見志乃宣父之遺訓也其詩句云江湖水深淺不足掉鯨尾又云飲冰狼子瘦思日鷓鴣寒又云中原不是無麟鳳自是皇家結網疏又云一鼎雄雌金液火十年寒暑鹿皮衣寄與東流任班鬢向隅終守鐵梭飛諸如此例不可殫記著癖書十卷聞其名而未嘗見之或云癖書是鍾離從事陳嶽所箸今兩存之陽朔山水王贊侍郎中朝名士有宏農楊蘧者曾到嶺外見陽朔荔浦山水談不容口以階緣嘗得接琅琊從容不覺形於言曰侍郎曾見陽朔荔浦山水乎琅琊曰某未曾打人脣綻齒落安得而見因之大笑楊宰俄而選求彼邑挈家南去亦州縣官中一髙士也淮浙解紛詔唐僖宗皇帝蒙塵於蜀朝士未集闕人掌誥樂朋龜侯翮輩雖居翰林而排難解紛之才非所長也髙太尉鎮淮海擁兵不進與浙西周寶不睦表章遞奏各述短長朝廷欲降詔和之學士草詞殊不愜旨前進士李端有壯筆軍容田令孜知之召而與語授以毫翰李仍請酒飲數杯詔書一筆而成文藻之外乃竒辨也深稱上㫖除行在知制誥官至省郎舊說李紳相鎮淮海奏薦副使章服纍表不允有一舉人候謁紳相知其文詞請撰一表其略云當道地管八州軍雄千乘副使著緑不稱其宜相國大喜果以此章而獲恩命也李太尉破昭義自草詔意而宣付翰林至如鄭文公自草髙太尉詔皆務集事非侵局奪美也吳融天幸錢尚父始殺董昌奄有兩浙得行其志士人恥之吳侍郎越州蕭山縣人舉進士場中甚有聲采屢遭維縶不遂觀光乃脫身西上將及蘇臺界回顧有紫綬者二人追之吳謂必遭籠罩須臾紫綬者殊不相顧促遽前去至一津渡喚船命吳共濟比逹岸杳然失之由是獲免爾後䇿名升朝是知分定者必有神明助之沈蔣人物沈詢侍郎清粹端美神仙中人也制除山北節旄京城誦曹唐游仙詩云玉詔新除沈侍郎便分茅土領東方不知今夜游何處侍從皆騎白鳯凰即風姿可知也蔣凝侍郎亦有人物每到朝士家人以為祥瑞號水月觀音前代潘安仁衛叔寶何以加此唐末朝士中有人物者時號玉笋班沈詢字仁偉官至丞郎人物酷似先德所謂世濟其美又外郎班者棨不雜亦號玉笋班也張濬樂朋龜與田軍容中外事舊例士子不與內官交游十軍軍容田令孜擅回天之力僖皇播遷行至洋源百官未集闕人掌誥樂朋龜侍郎亦及行在因謁中尉仍請中外由是薦之充翰林學士張濬相自處士除起居郎亦出子方之門皆申一作由中外之敬洎車駕到蜀朝士畢集一日中尉為宰相開筵學士洎張起居同預焉張公恥於對衆設拜乃先謁中尉便施謝酒之敬中尉訝之俄而賓主即席坐定中尉白諸相曰某與起居清濁異流曾蒙中外既慮玷辱何憚改更今日猥地謝酒即又不可張公慚懼交集自此甚為羣彥薄之樂公舉進士初陳啓事謁李昭侍郎自媒云别於九經書及老莊洎八都賦外著八百卷書請垂比試誠有學問也然於制誥不甚簡當時人或未可之薛少師拒中外事唐薛廷圭少師右族名流仕於衰世梁太祖兵力日強朝廷傾動漸自尊大天下懼之孤卿為四鎮官告使夷門客將劉翰先來類㑹恐申中外孤卿佯言不㑹謂謁者曰某無德安敢輒受令公拜竟不為屈洎受禪之後勉事於梁而太祖優容之夀考而終也中間奉命册蜀先主為司徒館中舊疾發動蜀人送當醫人楊僕俾攻療之孤卿致書感謝其書末請借肩輿歸京尋醫蜀主訝之乃曰幸有方藥何不俟愈而行堅請且駐行軒公謂客將曰夜來問此醫官殊不識字安可以性命委之乎竟不服藥而北歸後唐相國韋公說仕梁為中書舍人倅軺於錢塘先是錢尚父自據一方每要姑息梁主以河北關西悉為勍敵又頻失利於淮海甚藉兩浙牽掎之其次又資貢賦凡命使臣逺泛滄溟一則希其豐遺二則懼不周旋悉皆拜之錢公亦自尊大唯京兆公長揖而已既不辱命識者異之竟有巖廊之拜也楊晟義母安師建附唐楊晟始事鳳翔節度李昌符纍立軍功因而疑之潛欲加害昌符愛妾周氏愍其無辜密告之由是亡去而獲免也後為駕前五十四軍都指揮使除威勝軍節度使建節於彭州撫綏士民延敬賓客洎僧道輩各得其所厚於禮敬人甚懷之李昌符之敗因令求訪周氏既至以義母事之周氏自以少年復有美色恐有好合之請宏農告誓天地終不以非禮偶之每旦未視事前必伸問安之禮雖厄在重圍未嘗廢也新理之所兵力未完遽為王蜀先主攻圍保守孤城救兵不至十日而為西川所破而害焉有馬步使安師建者楊氏之腹心也城克執之蜀先主知其忠烈冀為其用欲寬之師建曰某受楊司徒提拔不敢惜死先主歎一作嗟賞而行戮為設祭而葬之成令公和州載唐天祐中淮師圍武昌不解杜洪令公乞師於梁王梁王與荆方睦乃諷成令帥兵救之於是禀奉霸主欲親征乃以巡屬五州事力造巨艦一艘三年而成號曰和州載艦上列㕔事洎司局有若衙府之制又有齊山截海之名其於華壯即可知也飾非拒諫斷自其意幕寮俯仰不措一詞唯孔目官楊厚贊成之舟次破軍山下為吳師縱燎而焚之中令溺死兵士潰散先是改名曰汭汭字即水內也水內之死豈非前兆乎湖南及朗州軍入江陵俘載軍人百姓職掌伎巧僧道伶官並歸長沙改汭之名和州之說蓋前定也韋太尉伐西川唐陳敬瑄據成都府拒命韋太尉昭度充招討使率東川兵以伐之王蜀先主時為草賊剽掠諸縣乃擁守下兵投掌武署為衙內指揮使資其爪牙也因奏請割西川數州就臨邛建節以授之蜀主卑謙多智事韋公甚謹掌武量其事勢終不能駕御况軍旅之事又非所長每欲攻城請戎服臨陳慮矢石所及不敢近前掌武曰軍人安敢無禮東川都顯有唐喫人者呼而戒之曰人肉何如猪羊乃賜一緡俾充肉價他皆倣此重圍二年蜀城已困不日將下一旦門外喧譁以軍糧闕乏兵士擒曳掌武親吏駱别駕忘名者臠而噉之由是懼罹其禍遽託疾以西川牌印付蜀主而歸朝雖曰不武斯亦用智自免也章魯封不幸屯難之世君子遭遇不幸往往有之唐進士章魯封與羅隱齊名皆浙中人頻舉不第聲采甚著錢尚父土豪倔起號錢塘八都洎破董昌奄有杭越於是章羅二士罹其籠罩然其出於草萊未諳事體重縣宰而輕郎官嘗曰某人非才只可作郎官不堪作縣令即可知也以章魯封為表奏孔目官章拒而見笞差羅隱宰錢塘皆畏死禀命也章羅以之為恥錢公用之為榮一作禁玉石俱焚吁可惜也或云章魯封後典蘇州著章子三卷行於世羅隱為中朝所重錢公尋倍加欽官至給事中享夀考溫飽而卒裴氏再行歸登尚書附唐裴司徒璩性靳嗇亷問江西日凡什器圗障皆新其製閉屋緘貯未嘗施用每有宴㑹即於朝士家借之在番禺時鍾愛一女選滎陽鄭進士以壻之才過禮期遽屬秋薦不免隨計無何到京尋報物故五教念女及壻不勝悲痛而鄭偶笑之蓋夫婦之愛未深不解思慮非有他故也大凡士族女郎無改醮之禮五教念女早寡不能忘情乃召門生故吏而告之因一作曰别適人亂倫再醮自河東始也元禎一作頑少監蘇涯中丞賜紫楊玭少尹與五教親吏别駕說皆同歸登尚書每浴皆屏左右自於浴斛中坐移時或有窺者見一巨龜吹水也性甚鄙嗇嘗爛一羊脾旋割旋噉封其殘者一旦內子於封處割食八座不見元封大怒其內由是沒身不食肉斯亦愈於和嶠之流也閉門避蠻王先主附西川自唐劉闢搆逆後久無干戈人不習戰每嵗諸道差兵屯戍大渡河蠻旗才舉望風而潰咸通中長驅直抵府城居人有扃户而拒之蠻亦不敢扣門也嘗有一蠻迷路入廣都縣村墅里人相率數百輩呌譟而逐之蠻一回顧卻走如堵墻崩焉自晝及暝終不能擒致其怯懦如此王蜀先主時雲南冦蜀蜀軍勇鋭欲吞之俘擒噉食不以為敵與向前之兵百倍其勇也髙太尉機詐咸通中南蠻圍西川朝廷命太尉渤海髙公駢自天平軍移鎮成都戎車未届乃先以帛書軍號其上仍畫一符於郵亭遞之以壯軍聲蠻酋懲交趾之敗望驛一作鐸而遁先是府無羅郭南冦才臨遂成煨燼士民無久安之計渤海規畫地勢圗版築焉慮畚鍤將施亭堠有警乃命山僧景山此僧多為掌武決䇿人謂是龎勛漏網而變名也奉使入南詔宣言駢自巡邉自下手築城日舉烽直至大渡河凡九十三日樓櫓矗然旌斾竟不行而驃信讋栗不暇兵以詐勝斯之謂也張道古題墓唐天復中張道古滄州蒲臺縣人擢進士第拜左補闕文學甚富介僻不羣因上五危二亂表左授施掾爾後入蜀先是所陳二亂疏云只今劉備孫權已生於世矣懼為蜀主所憾無路棲託洎逢開創誠思徵召為幕寮排擯卒不齒録竟罹非命也嘗自筮遇凶卦預造一穴題表云唐左補闕張道古墓後果遇害而瘞之人有獲其上蜀主書遺藁極言幕寮掩其才學不為延譽又非違一作逹時變盤桓取禍之流也補闕深於彖象著書號易題數卷行於世叙巢居子唐貞元中秭歸人覃正夫頃棲廬嶽帥符載徵召為文竟汨沒於巴巫也或有以其文數篇示愚辭韻挺特風調凛然真得武都之刀尺也號巢居子有二十卷愚因致書於歸州之衙校李玩俾搜訪之書未逹前三日里人有家藏全集者適遇延爇而煨燼之嗟乎鄙於覃生異時也茍得繕寫流布振彼聲光而焚如之酷何不幸之甚也羅衮不就西川辟李頻黃匪躬附唐羅貟外衮成都臨邛人應進士舉文學優贍操尚甚髙唐大順中䇿名不歸故鄉時屬喪亂朝廷多故契濶兵難備歷饑寒蜀先主致書於翰林令狐學士吳侍郎選書記一貟欲以桂陽應聘外郎謂知己曰誓擁馬通衢服弊布衣以俟外朝無復西歸為魯國東家丘也一作乎竟通朝籍終於梁禮部貟外郎也蜀人有志者唯外郎乎揚子雲二息亡遺體葬於蜀與夫延陵季子何相逺哉近代李頻黃匪躬皆嶺表人頻即遺其糟糠别婚士族黃即三十年不返鄉里於時妻母俱在又何心乎髙測啓事韓昭附唐髙測彭州人聰明博識文翰縱橫至於天文厯數琴棊書畫長笛胡琴率皆精巧乃梁朝朱异之流嘗謁髙燕公上啓事自序其要云讀書萬卷飲酒百杯燕公曰萬卷書不易徵詰一作不暇徵召百杯酒得以奉試乃飲以酒果如所言僖皇帝幸蜀因進所著書除祕校卒於威勝軍節度判官也韓昭仕蜀至禮部尚書文思殿大學士粗有文章至於琴棊書算射法悉皆涉獵以此承恩於後主時有朝士李台嘏曰韓八座事藝如拆襪線無一條長時人韙之符載侯翮歸隱趙㽔附唐武都符載字厚之本蜀人有竒才始與楊衡宋濟棲青城山以習業楊衡擢進士第宋濟老死無成唯符公以王霸自許恥於常調懷㑹之望韋南康鎮蜀辟為支使雖曰受知尚多偃蹇韋公於二十四化設醮請撰齊詞於時陪飲於摩訶之池符公離席盥潄命使院小吏十二人捧硯人分兩題繞一作緩步池濱各授口占其敏速如此劉闢時為金吾倉曹參軍依棲韋公特與撰真讚其詞云矯矯化初氣傑文雄靈螭出水秋鶚乘風行義則固輔仁乃通他年良覿麟閣之中洎京兆變故彭城知留務起雄據之意符為其所縻凡有代奏愈更恭順劉闢之敗也幕寮多罹其禍唯符生以箋奏藁草一篋呈髙崇文相公長揖東下棲於廬山即前之真讚可謂有先鑒也居潯陽二林間優游卒嵗南昌軍奏請為副倅授奉禮郎不赴命小僮持一幅上于襄陽乞百萬錢買山四方交辟羔鴈盈於山門草堂中以女妓二十人娛侍聲名籍甚於時守道循常者號曰凶人曾覽符公全集其文簡舉清便入其堂奧者唯建平覃正夫耳至宋濟雖有詞學其文冗泛非符之流湛賁卒於彭山宰墓銘即宋文也唐光啓中成都人侯翮風儀端秀有若氷壺以拔萃出身為邠寧從事僖皇播遷擢拜中書舍人翰林學士內試數題目其詞立就舊族朝士潛推服之僖宗歸闕除郡不赴歸隱導江别墅號臥龍館王蜀先主圗霸屈致幕府先俾節度判官馮㳙候一作俟其可否馮有文章大名除眉州刺史田令孜拒朝命不放之任羇寓成都為侯公軫恤甚德之其辭一作辟書即馮㳙極筆也侯有謝上王先主其自負云可以行修箋表坐了檄書其先人蜀之小將也趙㽔者梓州鹽亭縣人也博學韜鈐長於經世夫婦俱有節操不受交辟撰長短經十卷王霸之道見行於世北夢瑣言卷五
